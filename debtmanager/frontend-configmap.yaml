          function filterDebts() {
            const q = document.getElementById('search-debts').value.toLowerCase();
            const status = document.getElementById('filter-status').value;
            let filtered = allDebtsCache.filter(d =>
              d.customer_name.toLowerCase().includes(q) || d.description.toLowerCase().includes(q)
            );
            if (status === 'paid') filtered = filtered.filter(d => d.status === 'paid');
            else if (status === 'unpaid') filtered = filtered.filter(d => d.status !== 'paid' && parseFloat(d.amount_paid) === 0);
            else if (status === 'partial') filtered = filtered.filter(d => parseFloat(d.amount_paid) > 0 && d.status !== 'paid');
            else if (status === 'overdue') filtered = filtered.filter(d => d.due_date && new Date(d.due_date) < new Date() && d.status !== 'paid');
            renderDebts(filtered);
          }

          async function addDebt() {
            const customer_id = document.getElementById('debt-customer').value;
            const description = document.getElementById('debt-desc').value.trim();
            const total_amount = document.getElementById('debt-amount').value;
