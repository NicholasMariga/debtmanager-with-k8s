apiVersion: v1
kind: ConfigMap
metadata:
  name: nginx-html
  namespace: debtmanager
data:
  index.html: |
    <!DOCTYPE html>
    <html>
      <head>
        <title>Debt Manager - Mariga Shop</title>
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
        <style>
          * { margin: 0; padding: 0; box-sizing: border-box; }

          body {
            font-family: Arial, sans-serif;
            background: #0f0c29;
            color: white;
            min-height: 100vh;
          }

          /* Sidebar */
          .sidebar {
            position: fixed;
            top: 0; left: 0;
            width: 220px; height: 100%;
            background: rgba(255,255,255,0.05);
            border-right: 1px solid rgba(255,255,255,0.1);
            padding: 20px 0;
            z-index: 100;
          }

          .logo {
            text-align: center;
            padding: 0 20px 20px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            margin-bottom: 20px;
          }

          .logo i { font-size: 2em; color: #a78bfa; margin-bottom: 8px; display: block; }
          .logo h2 { font-size: 1em; color: white; }
          .logo p { font-size: 0.75em; color: #c4b5fd; }

          .nav-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 20px;
            cursor: pointer;
            transition: all 0.3s;
            color: #c4b5fd;
            font-size: 0.9em;
          }

          .nav-item:hover, .nav-item.active {
            background: rgba(167,139,250,0.2);
            color: white;
            border-left: 3px solid #a78bfa;
          }

          .nav-item i { width: 20px; text-align: center; }

          /* Main Content */
          .main {
            margin-left: 220px;
            padding: 25px;
            min-height: 100vh;
          }

          .page { display: none; }
          .page.active { display: block; }

          .page-title {
            font-size: 1.5em;
            margin-bottom: 20px;
            color: white;
            display: flex;
            align-items: center;
            gap: 10px;
          }

          .page-title i { color: #a78bfa; }

          /* Stats Cards */
          .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 15px;
            margin-bottom: 25px;
          }

          .stat-card {
            background: rgba(255,255,255,0.08);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px;
            padding: 20px;
            text-align: center;
            transition: all 0.3s;
          }

          .stat-card:hover {
            transform: translateY(-3px);
            border-color: #a78bfa;
          }

          .stat-card i { font-size: 1.8em; color: #a78bfa; margin-bottom: 8px; display: block; }
          .stat-value { font-size: 1.8em; font-weight: bold; color: white; }
          .stat-label { font-size: 0.8em; color: #c4b5fd; margin-top: 4px; }

          /* Forms */
          .card {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
          }

          .card h3 {
            color: #a78bfa;
            margin-bottom: 15px;
            font-size: 1em;
            display: flex;
            align-items: center;
            gap: 8px;
          }

          .form-row {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 12px;
            margin-bottom: 12px;
          }

          .form-group { display: flex; flex-direction: column; gap: 5px; }

          label { font-size: 0.8em; color: #c4b5fd; }

          input, select, textarea {
            background: rgba(255,255,255,0.08);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 8px;
            padding: 10px 12px;
            color: white;
            font-size: 0.9em;
            outline: none;
            transition: border 0.3s;
          }

          input:focus, select:focus {
            border-color: #a78bfa;
          }

          select option { background: #1a1a2e; }

          .btn {
            background: linear-gradient(135deg, #a78bfa, #7c3aed);
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.9em;
            transition: all 0.3s;
            display: inline-flex;
            align-items: center;
            gap: 8px;
          }

          .btn:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(167,139,250,0.4); }
          .btn-sm { padding: 6px 12px; font-size: 0.8em; }
          .btn-green { background: linear-gradient(135deg, #34d399, #059669); }
          .btn-red { background: linear-gradient(135deg, #f87171, #dc2626); }
          .btn-blue { background: linear-gradient(135deg, #60a5fa, #2563eb); }

          /* Table */
          table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.88em;
          }

          th {
            background: rgba(167,139,250,0.2);
            padding: 10px 12px;
            text-align: left;
            color: #c4b5fd;
            font-weight: normal;
          }

          td {
            padding: 10px 12px;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            color: #e5e7eb;
          }

          tr:hover td { background: rgba(255,255,255,0.03); }

          /* Badges */
          .badge {
            padding: 3px 10px;
            border-radius: 20px;
            font-size: 0.78em;
            font-weight: bold;
          }

          .badge-paid { background: rgba(52,211,153,0.2); color: #34d399; }
          .badge-unpaid { background: rgba(248,113,113,0.2); color: #f87171; }
          .badge-partial { background: rgba(251,191,36,0.2); color: #fbbf24; }
          .badge-overdue { background: rgba(239,68,68,0.3); color: #fca5a5; }

          /* Alert */
          .alert {
            padding: 12px 16px;
            border-radius: 8px;
            margin-bottom: 15px;
            font-size: 0.88em;
            display: none;
          }

          .alert-success { background: rgba(52,211,153,0.15); border: 1px solid #34d399; color: #34d399; }
          .alert-error { background: rgba(248,113,113,0.15); border: 1px solid #f87171; color: #f87171; }

          /* Reminders */
          .reminder-card {
            background: rgba(251,191,36,0.1);
            border: 1px solid rgba(251,191,36,0.3);
            border-radius: 10px;
            padding: 15px;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
          }

          .reminder-card .name { font-weight: bold; color: #fbbf24; }
          .reminder-card .details { font-size: 0.85em; color: #c4b5fd; margin-top: 3px; }
          .reminder-card .balance { font-size: 1.2em; font-weight: bold; color: #f87171; }

          /* Modal */
          .modal {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.7);
            z-index: 1000;
            align-items: center;
            justify-content: center;
          }

          .modal.open { display: flex; }

          .modal-box {
            background: #1a1a2e;
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 16px;
            padding: 25px;
            width: 400px;
            max-width: 90%;
          }

          .modal-box h3 { color: #a78bfa; margin-bottom: 15px; }
          .modal-close { float: right; cursor: pointer; color: #c4b5fd; }
        </style>
      </head>
      <body>

        <!-- Sidebar -->
        <div class="sidebar">
          <div class="logo">
            <i class="fa-solid fa-store"></i>
            <h2>Mariga Shop</h2>
            <p>Debt Manager</p>
          </div>
          <div class="nav-item active" onclick="showPage('dashboard')">
            <i class="fa-solid fa-chart-pie"></i> Dashboard
          </div>
          <div class="nav-item" onclick="showPage('customers')">
            <i class="fa-solid fa-users"></i> Customers
          </div>
          <div class="nav-item" onclick="showPage('debts')">
            <i class="fa-solid fa-file-invoice-dollar"></i> Debts
          </div>
          <div class="nav-item" onclick="showPage('payments')">
            <i class="fa-solid fa-money-bill-wave"></i> Payments
          </div>
          <div class="nav-item" onclick="showPage('reminders')">
            <i class="fa-solid fa-bell"></i> Reminders
          </div>
          <div class="nav-item" onclick="showPage('reports')">
            <i class="fa-solid fa-chart-bar"></i> Reports
          </div>
        </div>

        <!-- Main Content -->
        <div class="main">

          <!-- DASHBOARD -->
          <div class="page active" id="page-dashboard">
            <div class="page-title">
              <i class="fa-solid fa-chart-pie"></i> Dashboard
            </div>
            <div class="stats" id="dashboard-stats">
              <div class="stat-card">
                <i class="fa-solid fa-users"></i>
                <div class="stat-value" id="stat-customers">-</div>
                <div class="stat-label">Total Customers</div>
              </div>
              <div class="stat-card">
                <i class="fa-solid fa-file-invoice-dollar"></i>
                <div class="stat-value" id="stat-debts">-</div>
                <div class="stat-label">Total Debts</div>
              </div>
              <div class="stat-card">
                <i class="fa-solid fa-triangle-exclamation"></i>
                <div class="stat-value" id="stat-outstanding">-</div>
                <div class="stat-label">Outstanding (KES)</div>
              </div>
              <div class="stat-card">
                <i class="fa-solid fa-circle-check"></i>
                <div class="stat-value" id="stat-collected">-</div>
                <div class="stat-label">Collected (KES)</div>
              </div>
              <div class="stat-card">
                <i class="fa-solid fa-clock"></i>
                <div class="stat-value" id="stat-overdue">-</div>
                <div class="stat-label">Overdue Debts</div>
              </div>
            </div>
            <div class="card">
              <h3><i class="fa-solid fa-clock-rotate-left"></i> Recent Debts</h3>
              <table>
                <thead>
                  <tr>
                    <th>Customer</th>
                    <th>Description</th>
                    <th>Amount (KES)</th>
                    <th>Balance (KES)</th>
                    <th>Status</th>
                  </tr>
                </thead>
                <tbody id="recent-debts"></tbody>
              </table>
            </div>
          </div>

          <!-- CUSTOMERS -->
          <div class="page" id="page-customers">
            <div class="page-title">
              <i class="fa-solid fa-users"></i> Customers
            </div>
            <div class="card">
              <h3><i class="fa-solid fa-user-plus"></i> Add Customer</h3>
              <div id="alert-customer" class="alert"></div>
              <div class="form-row">
                <div class="form-group">
                  <label>Full Name *</label>
                  <input type="text" id="cust-name" placeholder="e.g. John Kamau">
                </div>
                <div class="form-group">
                  <label>Phone</label>
                  <input type="text" id="cust-phone" placeholder="e.g. 0712345678">
                </div>
                <div class="form-group">
                  <label>Email</label>
                  <input type="email" id="cust-email" placeholder="e.g. john@email.com">
                </div>
              </div>
              <button class="btn" onclick="addCustomer()">
                <i class="fa-solid fa-plus"></i> Add Customer
              </button>
            </div>
            <div class="card">
              <h3><i class="fa-solid fa-list"></i> All Customers</h3>
              <table>
                <thead>
                  <tr>
                    <th>Name</th>
                    <th>Phone</th>
                    <th>Email</th>
                    <th>Outstanding (KES)</th>
                    <th>Joined</th>
                  </tr>
                </thead>
                <tbody id="customers-table"></tbody>
              </table>
            </div>
          </div>

          <!-- DEBTS -->
          <div class="page" id="page-debts">
            <div class="page-title">
              <i class="fa-solid fa-file-invoice-dollar"></i> Debts
            </div>
            <div class="card">
              <h3><i class="fa-solid fa-plus"></i> Record New Debt</h3>
              <div id="alert-debt" class="alert"></div>
              <div class="form-row">
                <div class="form-group">
                  <label>Customer *</label>
                  <select id="debt-customer"></select>
                </div>
                <div class="form-group">
                  <label>Description *</label>
                  <input type="text" id="debt-desc" placeholder="e.g. Groceries, Electronics">
                </div>
                <div class="form-group">
                  <label>Amount (KES) *</label>
                  <input type="number" id="debt-amount" placeholder="e.g. 5000">
                </div>
                <div class="form-group">
                  <label>Due Date</label>
                  <input type="date" id="debt-due">
                </div>
              </div>
              <button class="btn" onclick="addDebt()">
                <i class="fa-solid fa-plus"></i> Record Debt
              </button>
            </div>
            <div class="card">
              <h3><i class="fa-solid fa-list"></i> All Debts</h3>
              <table>
                <thead>
                  <tr>
                    <th>Customer</th>
                    <th>Description</th>
                    <th>Total (KES)</th>
                    <th>Paid (KES)</th>
                    <th>Balance (KES)</th>
                    <th>Due Date</th>
                    <th>Status</th>
                    <th>Action</th>
                  </tr>
                </thead>
                <tbody id="debts-table"></tbody>
              </table>
            </div>
          </div>

          <!-- PAYMENTS -->
          <div class="page" id="page-payments">
            <div class="page-title">
              <i class="fa-solid fa-money-bill-wave"></i> Payments
            </div>
            <div class="card">
              <h3><i class="fa-solid fa-plus"></i> Record Payment</h3>
              <div id="alert-payment" class="alert"></div>
              <div class="form-row">
                <div class="form-group">
                  <label>Select Debt *</label>
                  <select id="pay-debt"></select>
                </div>
                <div class="form-group">
                  <label>Amount (KES) *</label>
                  <input type="number" id="pay-amount" placeholder="e.g. 1000">
                </div>
                <div class="form-group">
                  <label>Note</label>
                  <input type="text" id="pay-note" placeholder="e.g. Cash payment">
                </div>
              </div>
              <button class="btn btn-green" onclick="makePayment()">
                <i class="fa-solid fa-money-bill-wave"></i> Record Payment
              </button>
            </div>
            <div class="card">
              <h3><i class="fa-solid fa-history"></i> Payment History</h3>
              <div class="form-row" style="margin-bottom:15px">
                <div class="form-group">
                  <label>Filter by Debt</label>
                  <select id="filter-debt" onchange="loadPaymentHistory()">
                    <option value="">All Payments</option>
                  </select>
                </div>
              </div>
              <table>
                <thead>
                  <tr>
                    <th>Debt ID</th>
                    <th>Amount (KES)</th>
                    <th>Note</th>
                    <th>Date</th>
                  </tr>
                </thead>
                <tbody id="payments-table"></tbody>
              </table>
            </div>
          </div>

          <!-- REMINDERS -->
          <div class="page" id="page-reminders">
            <div class="page-title">
              <i class="fa-solid fa-bell"></i> Reminders
            </div>
            <div class="card">
              <h3><i class="fa-solid fa-triangle-exclamation"></i> Debts Due Within 7 Days</h3>
              <div id="reminders-list"></div>
            </div>
          </div>

          <!-- REPORTS -->
          <div class="page" id="page-reports">
            <div class="page-title">
              <i class="fa-solid fa-chart-bar"></i> Reports
            </div>
            <div class="stats" id="report-stats">
              <div class="stat-card">
                <i class="fa-solid fa-money-bill-trend-up"></i>
                <div class="stat-value" id="rep-total-amount">-</div>
                <div class="stat-label">Total Debt Issued (KES)</div>
              </div>
              <div class="stat-card">
                <i class="fa-solid fa-hand-holding-dollar"></i>
                <div class="stat-value" id="rep-collected">-</div>
                <div class="stat-label">Total Collected (KES)</div>
              </div>
              <div class="stat-card">
                <i class="fa-solid fa-triangle-exclamation"></i>
                <div class="stat-value" id="rep-outstanding">-</div>
                <div class="stat-label">Outstanding (KES)</div>
              </div>
              <div class="stat-card">
                <i class="fa-solid fa-circle-check"></i>
                <div class="stat-value" id="rep-paid-debts">-</div>
                <div class="stat-label">Fully Paid Debts</div>
              </div>
              <div class="stat-card">
                <i class="fa-solid fa-circle-xmark"></i>
                <div class="stat-value" id="rep-unpaid-debts">-</div>
                <div class="stat-label">Unpaid Debts</div>
              </div>
              <div class="stat-card">
                <i class="fa-solid fa-clock"></i>
                <div class="stat-value" id="rep-overdue">-</div>
                <div class="stat-label">Overdue Debts</div>
              </div>
            </div>
          </div>

        </div>

        <!-- Payment Modal -->
        <div class="modal" id="payment-modal">
          <div class="modal-box">
            <span class="modal-close" onclick="closeModal()">
              <i class="fa-solid fa-xmark"></i>
            </span>
            <h3><i class="fa-solid fa-money-bill-wave"></i> Quick Payment</h3>
            <p style="color:#c4b5fd; font-size:0.85em; margin-bottom:15px" id="modal-debt-info"></p>
            <div class="form-group" style="margin-bottom:12px">
              <label>Amount (KES)</label>
              <input type="number" id="modal-amount" placeholder="Enter amount">
            </div>
            <div class="form-group" style="margin-bottom:15px">
              <label>Note</label>
              <input type="text" id="modal-note" placeholder="e.g. Cash, M-Pesa">
            </div>
            <button class="btn btn-green" onclick="submitModalPayment()">
              <i class="fa-solid fa-check"></i> Confirm Payment
            </button>
          </div>
        </div>

        <script>
          const API = '/api';
          let selectedDebtId = null;
          let allDebts = [];

          // ── Navigation ──
          function showPage(page) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById('page-' + page).classList.add('active');
            event.currentTarget.classList.add('active');
            if (page === 'dashboard') loadDashboard();
            if (page === 'customers') loadCustomers();
            if (page === 'debts') { loadDebts(); loadCustomerDropdown(); }
            if (page === 'payments') { loadDebtDropdowns(); loadPaymentHistory(); }
            if (page === 'reminders') loadReminders();
            if (page === 'reports') loadReports();
          }

          function fmt(n) { return parseFloat(n || 0).toLocaleString('en-KE', {minimumFractionDigits: 2}); }
          function fmtDate(d) { return d ? new Date(d).toLocaleDateString('en-KE') : '-'; }

          function statusBadge(debt) {
            if (debt.status === 'paid') return '<span class="badge badge-paid">Paid</span>';
            if (parseFloat(debt.amount_paid) > 0) return '<span class="badge badge-partial">Partial</span>';
            if (debt.due_date && new Date(debt.due_date) < new Date()) return '<span class="badge badge-overdue">Overdue</span>';
            return '<span class="badge badge-unpaid">Unpaid</span>';
          }

          function showAlert(id, msg, type) {
            const el = document.getElementById(id);
            el.className = 'alert alert-' + type;
            el.style.display = 'block';
            el.innerHTML = '<i class="fa-solid fa-' + (type === 'success' ? 'circle-check' : 'circle-xmark') + '"></i> ' + msg;
            setTimeout(() => el.style.display = 'none', 3000);
          }

          // ── Dashboard ──
          async function loadDashboard() {
            const [rep, debts] = await Promise.all([
              fetch(API + '/reports').then(r => r.json()),
              fetch(API + '/debts').then(r => r.json())
            ]);
            document.getElementById('stat-customers').textContent = rep.total_customers;
            document.getElementById('stat-debts').textContent = rep.total_debts;
            document.getElementById('stat-outstanding').textContent = fmt(rep.total_outstanding);
            document.getElementById('stat-collected').textContent = fmt(rep.total_collected);
            document.getElementById('stat-overdue').textContent = rep.overdue_debts;
            allDebts = debts;
            const tbody = document.getElementById('recent-debts');
            tbody.innerHTML = debts.slice(0,5).map(d => `
              <tr>
                <td>${d.customer_name}</td>
                <td>${d.description}</td>
                <td>${fmt(d.total_amount)}</td>
                <td>${fmt(d.balance)}</td>
                <td>${statusBadge(d)}</td>
              </tr>
            `).join('');
          }

          // ── Customers ──
          async function loadCustomers() {
            const customers = await fetch(API + '/customers').then(r => r.json());
            document.getElementById('customers-table').innerHTML = customers.map(c => `
              <tr>
                <td><i class="fa-solid fa-user" style="color:#a78bfa;margin-right:6px"></i>${c.name}</td>
                <td>${c.phone || '-'}</td>
                <td>${c.email || '-'}</td>
                <td style="color:${parseFloat(c.total_outstanding) > 0 ? '#f87171' : '#34d399'}">${fmt(c.total_outstanding)}</td>
                <td>${fmtDate(c.created_at)}</td>
              </tr>
            `).join('');
          }

          async function addCustomer() {
            const name = document.getElementById('cust-name').value.trim();
            if (!name) return showAlert('alert-customer', 'Name is required', 'error');
            await fetch(API + '/customers', {
              method: 'POST',
              headers: {'Content-Type': 'application/json'},
              body: JSON.stringify({
                name,
                phone: document.getElementById('cust-phone').value,
                email: document.getElementById('cust-email').value
              })
            });
            showAlert('alert-customer', 'Customer added successfully!', 'success');
            document.getElementById('cust-name').value = '';
            document.getElementById('cust-phone').value = '';
            document.getElementById('cust-email').value = '';
            loadCustomers();
          }

          // ── Debts ──
          async function loadCustomerDropdown() {
            const customers = await fetch(API + '/customers').then(r => r.json());
            const sel = document.getElementById('debt-customer');
            sel.innerHTML = '<option value="">Select customer</option>' +
              customers.map(c => `<option value="${c.id}">${c.name}</option>`).join('');
          }

          async function loadDebts() {
            const debts = await fetch(API + '/debts').then(r => r.json());
            allDebts = debts;
            document.getElementById('debts-table').innerHTML = debts.map(d => `
              <tr>
                <td>${d.customer_name}</td>
                <td>${d.description}</td>
                <td>${fmt(d.total_amount)}</td>
                <td style="color:#34d399">${fmt(d.amount_paid)}</td>
                <td style="color:${parseFloat(d.balance) > 0 ? '#f87171' : '#34d399'}">${fmt(d.balance)}</td>
                <td>${fmtDate(d.due_date)}</td>
                <td>${statusBadge(d)}</td>
                <td>
                  ${d.status !== 'paid' ? `
                    <button class="btn btn-green btn-sm" onclick="openPayModal(${d.id}, '${d.customer_name}', ${d.balance})">
                      <i class="fa-solid fa-money-bill-wave"></i> Pay
                    </button>` : ''}
                </td>
              </tr>
            `).join('');
          }

          async function addDebt() {
            const customer_id = document.getElementById('debt-customer').value;
            const description = document.getElementById('debt-desc').value.trim();
            const total_amount = document.getElementById('debt-amount').value;
            if (!customer_id || !description || !total_amount)
              return showAlert('alert-debt', 'Please fill all required fields', 'error');
            await fetch(API + '/debts', {
              method: 'POST',
              headers: {'Content-Type': 'application/json'},
              body: JSON.stringify({
                customer_id, description, total_amount,
                due_date: document.getElementById('debt-due').value || null
              })
            });
            showAlert('alert-debt', 'Debt recorded successfully!', 'success');
            document.getElementById('debt-desc').value = '';
            document.getElementById('debt-amount').value = '';
            document.getElementById('debt-due').value = '';
            loadDebts();
          }

          // ── Payments ──
          async function loadDebtDropdowns() {
            const debts = await fetch(API + '/debts').then(r => r.json());
            const unpaid = debts.filter(d => d.status !== 'paid');
            const opts = '<option value="">Select debt</option>' +
              unpaid.map(d => `<option value="${d.id}">${d.customer_name} - ${d.description} (KES ${fmt(d.balance)})</option>`).join('');
            document.getElementById('pay-debt').innerHTML = opts;
            document.getElementById('filter-debt').innerHTML =
              '<option value="">All Payments</option>' +
              debts.map(d => `<option value="${d.id}">${d.customer_name} - ${d.description}</option>`).join('');
          }

          async function makePayment() {
            const debt_id = document.getElementById('pay-debt').value;
            const amount = document.getElementById('pay-amount').value;
            if (!debt_id || !amount) return showAlert('alert-payment', 'Please fill all required fields', 'error');
            await fetch(API + '/payments', {
              method: 'POST',
              headers: {'Content-Type': 'application/json'},
              body: JSON.stringify({ debt_id, amount, note: document.getElementById('pay-note').value })
            });
            showAlert('alert-payment', 'Payment recorded successfully!', 'success');
            document.getElementById('pay-amount').value = '';
            document.getElementById('pay-note').value = '';
            loadDebtDropdowns();
            loadPaymentHistory();
          }

          async function loadPaymentHistory() {
            const debtId = document.getElementById('filter-debt') ? document.getElementById('filter-debt').value : '';
            const url = debtId ? `${API}/payments/${debtId}` : `${API}/payments/all`;
            try {
              const payments = await fetch(debtId ? `${API}/payments/${debtId}` : `${API}/payments/0`).then(r => r.json());
              document.getElementById('payments-table').innerHTML = payments.map(p => `
                <tr>
                  <td>#${p.debt_id}</td>
                  <td style="color:#34d399">${fmt(p.amount)}</td>
                  <td>${p.note || '-'}</td>
                  <td>${fmtDate(p.paid_at)}</td>
                </tr>
              `).join('');
            } catch(e) {
              document.getElementById('payments-table').innerHTML = '<tr><td colspan="4" style="color:#c4b5fd;text-align:center">Select a debt to view payments</td></tr>';
            }
          }

          // ── Quick Pay Modal ──
          function openPayModal(debtId, customerName, balance) {
            selectedDebtId = debtId;
            document.getElementById('modal-debt-info').textContent =
              `Customer: ${customerName} | Balance: KES ${fmt(balance)}`;
            document.getElementById('payment-modal').classList.add('open');
          }

          function closeModal() {
            document.getElementById('payment-modal').classList.remove('open');
            selectedDebtId = null;
          }

          async function submitModalPayment() {
            const amount = document.getElementById('modal-amount').value;
            if (!amount) return;
            await fetch(API + '/payments', {
              method: 'POST',
              headers: {'Content-Type': 'application/json'},
              body: JSON.stringify({
                debt_id: selectedDebtId,
                amount,
                note: document.getElementById('modal-note').value
              })
            });
            closeModal();
            loadDebts();
            loadDashboard();
          }

          // ── Reminders ──
          async function loadReminders() {
            const reminders = await fetch(API + '/reminders').then(r => r.json());
            const el = document.getElementById('reminders-list');
            if (!reminders.length) {
              el.innerHTML = '<p style="color:#34d399"><i class="fa-solid fa-circle-check"></i> No upcoming due debts!</p>';
              return;
            }
            el.innerHTML = reminders.map(r => `
              <div class="reminder-card">
                <div>
                  <div class="name"><i class="fa-solid fa-user"></i> ${r.customer_name}</div>
                  <div class="details">
                    ${r.description} | Due: ${fmtDate(r.due_date)} | Phone: ${r.customer_phone || 'N/A'}
                  </div>
                </div>
                <div class="balance">KES ${fmt(r.balance)}</div>
              </div>
            `).join('');
          }

          // ── Reports ──
          async function loadReports() {
            const rep = await fetch(API + '/reports').then(r => r.json());
            document.getElementById('rep-total-amount').textContent = fmt(rep.total_debt_amount);
            document.getElementById('rep-collected').textContent = fmt(rep.total_collected);
            document.getElementById('rep-outstanding').textContent = fmt(rep.total_outstanding);
            document.getElementById('rep-paid-debts').textContent = rep.paid_debts;
            document.getElementById('rep-unpaid-debts').textContent = rep.unpaid_debts;
            document.getElementById('rep-overdue').textContent = rep.overdue_debts;
          }

          // ── Init ──
          loadDashboard();
        </script>
      </body>
    </html>

  nginx.conf: |
    server {
      listen 80;
      location / {
        root /usr/share/nginx/html;
        index index.html;
      }
      location /api/ {
        proxy_pass http://flask-service:5000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
      }
    }