            await fetch(API+'/debts', {
              method:'POST', headers:headers(),
              body:JSON.stringify({ customer_id, description, total_amount, due_date:document.getElementById('debt-due').value||null })
            });
            showAlert('alert-debt','Debt recorded successfully!','success');
