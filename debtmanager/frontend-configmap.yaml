          async function addCustomer() {
            const name = document.getElementById('cust-name').value.trim();
            if (!name) return showAlert('alert-customer','Name is required','error');
            const res = await fetch(API+'/customers', {
              method:'POST', headers:headers(),
              body:JSON.stringify({ name, phone:document.getElementById('cust-phone').value, email:document.getElementById('cust-email').value })
            });
