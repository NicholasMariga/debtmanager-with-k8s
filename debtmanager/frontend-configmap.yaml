apiVersion: v1
kind: ConfigMap
metadata:
  name: nginx-html
  namespace: debtmanager
data:
  index.html: |
    <!DOCTYPE html>
    <html>
      <head>
        <title>Happywise Ent - Debt Manager</title>
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
        <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
        <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
        <style>
          * { margin: 0; padding: 0; box-sizing: border-box; }

          body {
            font-family: Arial, sans-serif;
            background: #0f0c29;
            color: white;
            min-height: 100vh;
          }

          .login-page {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(-45deg, #0f0c29, #302b63, #24243e, #1a1a2e);
            background-size: 400% 400%;
            animation: gradientBG 10s ease infinite;
          }

          @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
          }

          .login-box {
            background: rgba(255,255,255,0.07);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.15);
            border-radius: 20px;
            padding: 40px;
            width: 380px;
            text-align: center;
            box-shadow: 0 25px 50px rgba(0,0,0,0.5);
          }

          .login-logo { font-size: 3em; color: #a78bfa; margin-bottom: 10px; }
          .login-title { font-size: 1.5em; font-weight: bold; color: white; margin-bottom: 5px; }
          .login-subtitle { font-size: 0.85em; color: #c4b5fd; margin-bottom: 30px; }
          .login-form .form-group { margin-bottom: 15px; text-align: left; }
          .login-form label { font-size: 0.8em; color: #c4b5fd; display: block; margin-bottom: 6px; }
          .login-form .input-wrap { position: relative; }
          .login-form .input-wrap i { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); color: #a78bfa; font-size: 0.9em; }
          .login-form input { width: 100%; background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.2); border-radius: 10px; padding: 12px 12px 12px 38px; color: white; font-size: 0.9em; outline: none; transition: border 0.3s; }
          .login-form input:focus { border-color: #a78bfa; }
          .login-btn { width: 100%; background: linear-gradient(135deg, #a78bfa, #7c3aed); color: white; padding: 13px; border: none; border-radius: 10px; cursor: pointer; font-size: 1em; margin-top: 10px; transition: all 0.3s; display: flex; align-items: center; justify-content: center; gap: 8px; }
          .login-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 25px rgba(167,139,250,0.5); }
          .login-error { background: rgba(248,113,113,0.15); border: 1px solid #f87171; color: #f87171; padding: 10px; border-radius: 8px; font-size: 0.85em; margin-bottom: 15px; display: none; }
          .role-badges { display: flex; gap: 8px; justify-content: center; margin-top: 20px; flex-wrap: wrap; }
          .role-badge { background: rgba(167,139,250,0.15); border: 1px solid rgba(167,139,250,0.3); color: #c4b5fd; padding: 4px 12px; border-radius: 20px; font-size: 0.75em; }

          .app-page { display: none; }
          .topbar { position: fixed; top: 0; left: 0; right: 0; height: 60px; background: rgba(15,12,41,0.95); border-bottom: 1px solid rgba(255,255,255,0.1); display: flex; align-items: center; justify-content: space-between; padding: 0 20px; z-index: 200; }
          .topbar-left { display: flex; align-items: center; gap: 12px; }
          .topbar-logo i { color: #a78bfa; font-size: 1.4em; }
          .topbar-title { font-size: 1em; font-weight: bold; }
          .topbar-title span { color: #a78bfa; }
          .topbar-right { display: flex; align-items: center; gap: 15px; }
          .user-info { display: flex; align-items: center; gap: 8px; font-size: 0.85em; }
          .user-info i { color: #a78bfa; }
          .user-role { padding: 3px 10px; border-radius: 20px; font-size: 0.75em; font-weight: bold; }
          .role-owner { background: rgba(167,139,250,0.3); color: #a78bfa; }
          .role-manager { background: rgba(52,211,153,0.2); color: #34d399; }
          .role-cashier { background: rgba(251,191,36,0.2); color: #fbbf24; }
          .logout-btn { background: rgba(248,113,113,0.15); border: 1px solid rgba(248,113,113,0.3); color: #f87171; padding: 6px 14px; border-radius: 8px; cursor: pointer; font-size: 0.82em; transition: all 0.3s; display: flex; align-items: center; gap: 6px; }
          .logout-btn:hover { background: rgba(248,113,113,0.3); }

          .sidebar { position: fixed; top: 60px; left: 0; width: 220px; height: calc(100% - 60px); background: rgba(255,255,255,0.03); border-right: 1px solid rgba(255,255,255,0.08); padding: 15px 0; z-index: 100; overflow-y: auto; }
          .nav-section { font-size: 0.7em; color: rgba(255,255,255,0.3); padding: 10px 20px 5px; text-transform: uppercase; letter-spacing: 1px; }
          .nav-item { display: flex; align-items: center; gap: 12px; padding: 11px 20px; cursor: pointer; transition: all 0.3s; color: #c4b5fd; font-size: 0.88em; }
          .nav-item:hover, .nav-item.active { background: rgba(167,139,250,0.15); color: white; border-left: 3px solid #a78bfa; }
          .nav-item i { width: 18px; text-align: center; }
          .nav-item.hidden { display: none; }

          .main { margin-left: 220px; margin-top: 60px; padding: 25px; min-height: calc(100vh - 60px); }
          .page { display: none; }
          .page.active { display: block; }
          .page-title { font-size: 1.4em; margin-bottom: 20px; display: flex; align-items: center; gap: 10px; }
          .page-title i { color: #a78bfa; }

          .stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 15px; margin-bottom: 25px; }
          .stat-card { background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; padding: 18px; text-align: center; transition: all 0.3s; }
          .stat-card:hover { transform: translateY(-3px); border-color: #a78bfa; }
          .stat-card i { font-size: 1.6em; color: #a78bfa; margin-bottom: 8px; display: block; }
          .stat-value { font-size: 1.6em; font-weight: bold; }
          .stat-label { font-size: 0.78em; color: #c4b5fd; margin-top: 4px; }

          .card { background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08); border-radius: 12px; padding: 20px; margin-bottom: 20px; }
          .card h3 { color: #a78bfa; margin-bottom: 15px; font-size: 0.95em; display: flex; align-items: center; gap: 8px; }

          .form-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(170px, 1fr)); gap: 12px; margin-bottom: 15px; }
          .form-group { display: flex; flex-direction: column; gap: 5px; }
          label { font-size: 0.8em; color: #c4b5fd; }
          input, select { background: rgba(255,255,255,0.07); border: 1px solid rgba(255,255,255,0.15); border-radius: 8px; padding: 9px 12px; color: white; font-size: 0.88em; outline: none; transition: border 0.3s; }
          input:focus, select:focus { border-color: #a78bfa; }
          select option { background: #1a1a2e; }

          .btn { background: linear-gradient(135deg, #a78bfa, #7c3aed); color: white; padding: 9px 18px; border: none; border-radius: 8px; cursor: pointer; font-size: 0.88em; transition: all 0.3s; display: inline-flex; align-items: center; gap: 7px; text-decoration: none; white-space: nowrap; }
          .btn:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(167,139,250,0.4); }
          .btn-sm { padding: 5px 10px; font-size: 0.78em; }
          .btn-green { background: linear-gradient(135deg, #34d399, #059669); }
          .btn-red { background: linear-gradient(135deg, #f87171, #dc2626); }
          .btn-whatsapp { background: linear-gradient(135deg, #25d366, #128c7e); }
          .btn-sms { background: linear-gradient(135deg, #60a5fa, #2563eb); }
          .btn-orange { background: linear-gradient(135deg, #fb923c, #ea580c); }
          .btn-yellow { background: linear-gradient(135deg, #fbbf24, #d97706); color: #1a1a2e; }

          table { width: 100%; border-collapse: collapse; font-size: 0.85em; }
          th { background: rgba(167,139,250,0.15); padding: 10px 12px; text-align: left; color: #c4b5fd; font-weight: normal; }
          td { padding: 10px 12px; border-bottom: 1px solid rgba(255,255,255,0.04); vertical-align: middle; }
          tr:hover td { background: rgba(255,255,255,0.02); }

          .badge { padding: 3px 9px; border-radius: 20px; font-size: 0.75em; font-weight: bold; }
          .badge-paid { background: rgba(52,211,153,0.2); color: #34d399; }
          .badge-unpaid { background: rgba(248,113,113,0.2); color: #f87171; }
          .badge-partial { background: rgba(251,191,36,0.2); color: #fbbf24; }
          .badge-overdue { background: rgba(239,68,68,0.3); color: #fca5a5; }
          .badge-age30 { background: rgba(251,191,36,0.2); color: #fbbf24; }
          .badge-age60 { background: rgba(251,146,60,0.2); color: #fb923c; }
          .badge-age90 { background: rgba(248,113,113,0.2); color: #f87171; }

          .alert { padding: 10px 14px; border-radius: 8px; margin-bottom: 12px; font-size: 0.85em; display: none; }
          .alert-success { background: rgba(52,211,153,0.15); border: 1px solid #34d399; color: #34d399; }
          .alert-error { background: rgba(248,113,113,0.15); border: 1px solid #f87171; color: #f87171; }

          /* Search bar */
          .search-bar { display: flex; gap: 10px; margin-bottom: 15px; flex-wrap: wrap; align-items: center; }
          .search-bar input { flex: 1; min-width: 200px; }
          .search-bar select { min-width: 140px; }

          /* Action buttons in table - always show text */
          .action-btns { display: flex; gap: 5px; flex-wrap: wrap; align-items: center; }
          .action-btns .btn { font-size: 0.78em; padding: 5px 10px; }

          /* Charts */
          .charts-row { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 25px; }
          .chart-card { background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08); border-radius: 12px; padding: 20px; }
          .chart-card h4 { color: #a78bfa; font-size: 0.88em; margin-bottom: 15px; display: flex; align-items: center; gap: 8px; }
          .chart-container { position: relative; height: 200px; }
          @media (max-width: 768px) { .charts-row { grid-template-columns: 1fr; } }

          /* Reminder cards */
          .reminder-card { background: rgba(251,191,36,0.08); border: 1px solid rgba(251,191,36,0.25); border-radius: 12px; padding: 16px; margin-bottom: 12px; }

          /* Statement */
          .statement-header { background: rgba(167,139,250,0.1); border-radius: 10px; padding: 15px; margin-bottom: 15px; }

          /* Receipt */
          .receipt-box { background: white; color: #1a1a2e; border-radius: 10px; padding: 25px; font-family: monospace; font-size: 0.85em; }
          .receipt-box h2 { text-align: center; font-size: 1.1em; margin-bottom: 5px; }
          .receipt-box .receipt-sub { text-align: center; color: #666; margin-bottom: 15px; font-size: 0.85em; }
          .receipt-box .receipt-row { display: flex; justify-content: space-between; padding: 4px 0; border-bottom: 1px dashed #eee; }
          .receipt-box .receipt-total { display: flex; justify-content: space-between; padding: 8px 0; font-weight: bold; font-size: 1.1em; border-top: 2px solid #1a1a2e; margin-top: 8px; }
          .receipt-box .receipt-footer { text-align: center; margin-top: 15px; color: #666; font-size: 0.8em; }

          /* Modal */
          .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.75); z-index: 1000; align-items: center; justify-content: center; }
          .modal.open { display: flex; }
          .modal-box { background: #1a1a2e; border: 1px solid rgba(255,255,255,0.15); border-radius: 16px; padding: 25px; width: 500px; max-width: 95%; max-height: 90vh; overflow-y: auto; }
          .modal-box h3 { color: #a78bfa; margin-bottom: 15px; display: flex; align-items: center; gap: 8px; }
          .modal-close { float: right; cursor: pointer; color: #c4b5fd; }

          /* Log entries */
          .log-entry { display: flex; align-items: center; gap: 10px; padding: 8px 0; border-bottom: 1px solid rgba(255,255,255,0.05); font-size: 0.83em; }
          .log-entry:last-child { border-bottom: none; }
          .log-icon { width: 28px; height: 28px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 0.85em; flex-shrink: 0; }
          .log-whatsapp { background: rgba(37,211,102,0.2); color: #25d366; }
          .log-sms { background: rgba(96,165,250,0.2); color: #60a5fa; }
          .log-info { flex: 1; }
          .log-name { color: white; font-weight: bold; }
          .log-desc { color: #c4b5fd; font-size: 0.9em; }
          .log-time { color: rgba(255,255,255,0.3); font-size: 0.8em; white-space: nowrap; }
        </style>
      </head>
      <body>

        <!-- LOGIN PAGE -->
        <div class="login-page" id="login-page">
          <div class="login-box">
            <div class="login-logo"><i class="fa-solid fa-store"></i></div>
            <div class="login-title">Happywise Ent</div>
            <div class="login-subtitle">Debt Management System</div>
            <div class="login-error" id="login-error">
              <i class="fa-solid fa-circle-xmark"></i>
              <span id="login-error-msg">Invalid credentials</span>
            </div>
            <div class="login-form">
              <div class="form-group">
                <label>Username</label>
                <div class="input-wrap">
                  <i class="fa-solid fa-user"></i>
                  <input type="text" id="login-username" placeholder="Enter username" onkeypress="if(event.key==='Enter') doLogin()">
                </div>
              </div>
              <div class="form-group">
                <label>Password</label>
                <div class="input-wrap">
                  <i class="fa-solid fa-lock"></i>
                  <input type="password" id="login-password" placeholder="Enter password" onkeypress="if(event.key==='Enter') doLogin()">
                </div>
              </div>
              <button class="login-btn" onclick="doLogin()">
                <i class="fa-solid fa-right-to-bracket"></i> Sign In
              </button>
            </div>
            <div class="role-badges">
              <span class="role-badge"><i class="fa-solid fa-crown"></i> Owner</span>
              <span class="role-badge"><i class="fa-solid fa-user-tie"></i> Manager</span>
              <span class="role-badge"><i class="fa-solid fa-cash-register"></i> Cashier</span>
            </div>
          </div>
        </div>

        <!-- APP PAGE -->
        <div class="app-page" id="app-page">

          <!-- Top Bar -->
          <div class="topbar">
            <div class="topbar-left">
              <div class="topbar-logo"><i class="fa-solid fa-store"></i></div>
              <div class="topbar-title">Happywise <span>Ent</span></div>
            </div>
            <div class="topbar-right">
              <div class="user-info">
                <i class="fa-solid fa-circle-user"></i>
                <span class="user-name" id="topbar-name">-</span>
                <span class="user-role" id="topbar-role">-</span>
              </div>
              <button class="logout-btn" onclick="doLogout()">
                <i class="fa-solid fa-right-from-bracket"></i> Logout
              </button>
            </div>
          </div>

          <!-- Sidebar -->
          <div class="sidebar">
            <div class="nav-section">Main</div>
            <div class="nav-item active" onclick="showPage('dashboard', event)">
              <i class="fa-solid fa-chart-pie"></i> Dashboard
            </div>
            <div class="nav-item" onclick="showPage('customers', event)">
              <i class="fa-solid fa-users"></i> Customers
            </div>
            <div class="nav-item" onclick="showPage('debts', event)">
              <i class="fa-solid fa-file-invoice-dollar"></i> Debts
            </div>
            <div class="nav-item" onclick="showPage('payments', event)">
              <i class="fa-solid fa-money-bill-wave"></i> Payments
            </div>
            <div class="nav-section">Management</div>
            <div class="nav-item nav-reminders" onclick="showPage('reminders', event)">
              <i class="fa-solid fa-bell"></i> Reminders
            </div>
            <div class="nav-item nav-reports" onclick="showPage('reports', event)">
              <i class="fa-solid fa-chart-bar"></i> Reports
            </div>
            <div class="nav-item nav-aging" onclick="showPage('aging', event)">
              <i class="fa-solid fa-hourglass-half"></i> Debt Aging
            </div>
            <div class="nav-item nav-staff" onclick="showPage('staff', event)">
              <i class="fa-solid fa-user-gear"></i> Staff
            </div>
          </div>

          <!-- Main Content -->
          <div class="main">

            <!-- DASHBOARD -->
            <div class="page active" id="page-dashboard">
              <div class="page-title"><i class="fa-solid fa-chart-pie"></i> Dashboard</div>
              <div class="stats">
                <div class="stat-card">
                  <i class="fa-solid fa-users"></i>
                  <div class="stat-value" id="stat-customers">-</div>
                  <div class="stat-label">Customers</div>
                </div>
                <div class="stat-card">
                  <i class="fa-solid fa-file-invoice-dollar"></i>
                  <div class="stat-value" id="stat-debts">-</div>
                  <div class="stat-label">Total Debts</div>
                </div>
                <div class="stat-card">
                  <i class="fa-solid fa-triangle-exclamation"></i>
                  <div class="stat-value" id="stat-outstanding">-</div>
                  <div class="stat-label">Outstanding (KES)</div>
                </div>
                <div class="stat-card">
                  <i class="fa-solid fa-circle-check"></i>
                  <div class="stat-value" id="stat-collected">-</div>
                  <div class="stat-label">Collected (KES)</div>
                </div>
                <div class="stat-card">
                  <i class="fa-solid fa-clock"></i>
                  <div class="stat-value" id="stat-overdue">-</div>
                  <div class="stat-label">Overdue</div>
                </div>
              </div>

              <!-- Charts -->
              <div class="charts-row">
                <div class="chart-card">
                  <h4><i class="fa-solid fa-chart-bar"></i> Collected vs Outstanding (KES)</h4>
                  <div class="chart-container"><canvas id="barChart"></canvas></div>
                </div>
                <div class="chart-card">
                  <h4><i class="fa-solid fa-chart-pie"></i> Debt Status Breakdown</h4>
                  <div class="chart-container"><canvas id="donutChart"></canvas></div>
                </div>
              </div>

              <div class="card">
                <h3><i class="fa-solid fa-clock-rotate-left"></i> Recent Debts</h3>
                <table>
                  <thead>
                    <tr>
                      <th>Customer</th><th>Description</th>
                      <th>Amount (KES)</th><th>Balance (KES)</th><th>Status</th>
                    </tr>
                  </thead>
                  <tbody id="recent-debts"></tbody>
                </table>
              </div>
            </div>

            <!-- CUSTOMERS -->
            <div class="page" id="page-customers">
              <div class="page-title"><i class="fa-solid fa-users"></i> Customers</div>
              <div class="card">
                <h3><i class="fa-solid fa-user-plus"></i> Add Customer</h3>
                <div id="alert-customer" class="alert"></div>
                <div class="form-row">
                  <div class="form-group">
                    <label>Full Name *</label>
                    <input type="text" id="cust-name" placeholder="e.g. John Kamau">
                  </div>
                  <div class="form-group">
                    <label>Phone (07...) *</label>
                    <input type="text" id="cust-phone" placeholder="e.g. 0712345678">
                  </div>
                  <div class="form-group">
                    <label>Email</label>
                    <input type="email" id="cust-email" placeholder="e.g. john@email.com">
                  </div>
                </div>
                <button class="btn" onclick="addCustomer()">
                  <i class="fa-solid fa-plus"></i> Add Customer
                </button>
              </div>
              <div class="card">
                <h3><i class="fa-solid fa-list"></i> All Customers</h3>
                <div class="search-bar">
                  <input type="text" id="search-customers" placeholder="Search by name or phone..." oninput="filterCustomers()">
                  <button class="btn btn-yellow btn-sm" onclick="exportCustomersCSV()">
                    <i class="fa-solid fa-file-csv"></i> Export CSV
                  </button>
                </div>
                <table>
                  <thead>
                    <tr>
                      <th>Name</th><th>Phone</th><th>Email</th>
                      <th>Outstanding (KES)</th><th>Actions</th>
                    </tr>
                  </thead>
                  <tbody id="customers-table"></tbody>
                </table>
              </div>
            </div>

            <!-- DEBTS -->
            <div class="page" id="page-debts">
              <div class="page-title"><i class="fa-solid fa-file-invoice-dollar"></i> Debts</div>
              <div class="card">
                <h3><i class="fa-solid fa-plus"></i> Record New Debt</h3>
                <div id="alert-debt" class="alert"></div>
                <div class="form-row">
                  <div class="form-group">
                    <label>Customer *</label>
                    <select id="debt-customer"></select>
                  </div>
                  <div class="form-group">
                    <label>Description *</label>
                    <input type="text" id="debt-desc" placeholder="e.g. Groceries">
                  </div>
                  <div class="form-group">
                    <label>Amount (KES) *</label>
                    <input type="number" id="debt-amount" placeholder="e.g. 5000">
                  </div>
                  <div class="form-group">
                    <label>Due Date</label>
                    <input type="date" id="debt-due">
                  </div>
                </div>
                <button class="btn" onclick="addDebt()">
                  <i class="fa-solid fa-plus"></i> Record Debt
                </button>
              </div>
              <div class="card">
                <h3><i class="fa-solid fa-list"></i> All Debts</h3>
                <div class="search-bar">
                  <input type="text" id="search-debts" placeholder="Search by customer or description..." oninput="filterDebts()">
                  <select id="filter-status" onchange="filterDebts()">
                    <option value="">All Statuses</option>
                    <option value="unpaid">Unpaid</option>
                    <option value="partial">Partial</option>
                    <option value="paid">Paid</option>
                    <option value="overdue">Overdue</option>
                  </select>
                  <button class="btn btn-yellow btn-sm" onclick="exportDebtsCSV()">
                    <i class="fa-solid fa-file-csv"></i> Export CSV
                  </button>
                  <button class="btn btn-green btn-sm" onclick="exportDebtsExcel()">
                    <i class="fa-solid fa-file-excel"></i> Export Excel
                  </button>
                </div>
                <div style="overflow-x:auto">
                  <table>
                    <thead>
                      <tr>
                        <th>Customer</th><th>Description</th><th>Date Taken</th>
                        <th>Total (KES)</th><th>Paid (KES)</th><th>Balance (KES)</th>
