        <!-- Receipt Modal -->
        <div class="modal" id="receipt-modal">
          <div class="modal-box">
            <span class="modal-close" onclick="closeModal('receipt-modal')">
              <i class="fa-solid fa-xmark"></i>
            </span>
            <h3><i class="fa-solid fa-receipt"></i> Payment Receipt</h3>
            <div id="receipt-content"></div>
            <div style="display:flex;gap:10px;margin-top:15px;flex-wrap:wrap">
              <button class="btn btn-orange" onclick="printReceipt()">
                <i class="fa-solid fa-print"></i> Print Receipt
              </button>
              <button class="btn btn-whatsapp" onclick="shareReceiptWhatsApp()">
                <i class="fa-brands fa-whatsapp"></i> Share on WhatsApp
              </button>
            </div>
          </div>
        </div>

        <!-- Message Preview Modal -->
        <div class="modal" id="message-modal">
          <div class="modal-box">
            <span class="modal-close" onclick="closeModal('message-modal')">
              <i class="fa-solid fa-xmark"></i>
            </span>
            <h3 id="msg-modal-title">
              <i class="fa-solid fa-paper-plane"></i> Send Reminder
            </h3>
            <p style="color:#c4b5fd;font-size:0.82em;margin-bottom:5px">
              Message preview — edit if needed before sending:
            </p>
            <textarea id="msg-preview-text"
              style="width:100%;height:200px;background:rgba(255,255,255,0.05);
              border:1px solid rgba(255,255,255,0.15);border-radius:8px;
              padding:10px;color:white;font-size:0.82em;resize:vertical;
              outline:none;line-height:1.6;font-family:monospace"></textarea>
            <div style="display:flex;gap:10px;margin-top:15px;flex-wrap:wrap">
              <a id="whatsapp-link" href="#" target="_blank"
                class="btn btn-whatsapp" onclick="logMessage('whatsapp')">
                <i class="fa-brands fa-whatsapp"></i> Open in WhatsApp
              </a>
              <a id="sms-link" href="#"
                class="btn btn-sms" onclick="logMessage('sms')">
                <i class="fa-solid fa-message"></i> Open in SMS
              </a>
            </div>
            <p style="color:rgba(255,255,255,0.3);font-size:0.75em;margin-top:10px">
              <i class="fa-solid fa-circle-info"></i>
              WhatsApp/SMS opens with message pre-filled. You press Send.
            </p>
          </div>
        </div>

        <script>
          const API = '/api';
          let token = localStorage.getItem('hw_token');
          let currentUser = JSON.parse(localStorage.getItem('hw_user') || 'null');
          let selectedDebtId = null;
          let currentReminderPhone = null;
          let currentReminderName = null;
          let messageLog = JSON.parse(localStorage.getItem('hw_msg_log') || '[]');
          let allDebtsCache = [];
          let allCustomersCache = [];
          let allPaymentsCache = [];
          let barChartInstance = null;
          let donutChartInstance = null;
          let lastReceiptData = null;

          if (token && currentUser) showApp();

          // ── Login ──
          async function doLogin() {
            const username = document.getElementById('login-username').value.trim();
            const password = document.getElementById('login-password').value;
            if (!username || !password) return showLoginError('Please enter username and password');
            try {
              const res = await fetch(API + '/login', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({username, password})
              });
              const data = await res.json();
              if (!res.ok) return showLoginError(data.error || 'Login failed');
              token = data.token;
              currentUser = data.user;
              localStorage.setItem('hw_token', token);
              localStorage.setItem('hw_user', JSON.stringify(currentUser));
              showApp();
            } catch(e) { showLoginError('Cannot connect to server'); }
          }

          function showLoginError(msg) {
            const el = document.getElementById('login-error');
            document.getElementById('login-error-msg').textContent = msg;
            el.style.display = 'block';
          }

          function doLogout() {
            localStorage.removeItem('hw_token');
            localStorage.removeItem('hw_user');
            token = null; currentUser = null;
            document.getElementById('app-page').style.display = 'none';
            document.getElementById('login-page').style.display = 'flex';
            document.getElementById('login-password').value = '';
            document.getElementById('login-error').style.display = 'none';
          }

          function showApp() {
            document.getElementById('login-page').style.display = 'none';
            document.getElementById('app-page').style.display = 'block';
            document.getElementById('topbar-name').textContent = currentUser.name;
            const roleEl = document.getElementById('topbar-role');
            roleEl.textContent = currentUser.role.charAt(0).toUpperCase() + currentUser.role.slice(1);
            roleEl.className = 'user-role role-' + currentUser.role;
            const isOwner = currentUser.role === 'owner';
            const isMgrOrOwner = ['owner','manager'].includes(currentUser.role);
            document.querySelectorAll('.nav-reminders').forEach(el => el.classList.toggle('hidden', !isMgrOrOwner));
            document.querySelectorAll('.nav-reports').forEach(el => el.classList.toggle('hidden', !isMgrOrOwner));
            document.querySelectorAll('.nav-aging').forEach(el => el.classList.toggle('hidden', !isMgrOrOwner));
            document.querySelectorAll('.nav-staff').forEach(el => el.classList.toggle('hidden', !isOwner));
            loadDashboard();
          }

          function headers() {
            return {'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token};
          }

          function showPage(page, event) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById('page-' + page).classList.add('active');
            if (event) event.currentTarget.classList.add('active');
            if (page === 'dashboard') loadDashboard();
            if (page === 'customers') loadCustomers();
            if (page === 'debts') { loadDebts(); loadCustomerDropdown(); }
            if (page === 'payments') { loadDebtDropdowns(); }
            if (page === 'reminders') loadReminders();
            if (page === 'reports') { loadReports(); loadStatementDropdown(); }
            if (page === 'aging') loadAging();
            if (page === 'staff') loadStaff();
          }

          // ── Helpers ──
          function fmt(n) { return parseFloat(n||0).toLocaleString('en-KE', {minimumFractionDigits:2}); }
          function fmtDate(d) { return d ? new Date(d).toLocaleDateString('en-KE') : '-'; }
          function fmtPhone(phone) {
            if (!phone) return '';
            if (phone.startsWith('0')) return '254' + phone.slice(1);
            if (phone.startsWith('+')) return phone.slice(1);
            return phone;
          }

          function statusBadge(d) {
            if (d.status==='paid') return '<span class="badge badge-paid">Paid</span>';
            if (parseFloat(d.amount_paid)>0) return '<span class="badge badge-partial">Partial</span>';
            if (d.due_date && new Date(d.due_date)<new Date()) return '<span class="badge badge-overdue">Overdue</span>';
            return '<span class="badge badge-unpaid">Unpaid</span>';
          }

          function agingBadge(days) {
            if (days <= 30) return '<span class="badge badge-age30">0-30 Days</span>';
            if (days <= 60) return '<span class="badge badge-age60">31-60 Days</span>';
            return '<span class="badge badge-age90">60+ Days</span>';
          }

          function showAlert(id, msg, type) {
            const el = document.getElementById(id);
            el.className = 'alert alert-' + type;
            el.style.display = 'block';
            el.innerHTML = '<i class="fa-solid fa-' + (type==='success'?'circle-check':'circle-xmark') + '"></i> ' + msg;
            setTimeout(() => el.style.display = 'none', 3000);
          }

          function closeModal(id) { document.getElementById(id).classList.remove('open'); }

          // ── Build Full Message (ALL debts for customer) ──
          async function buildMessage(debt) {
            document.getElementById('msg-preview-text').value = 'Loading all debts for ' + debt.customer_name + '...';
            const allDebts = await fetch(API + '/debts', {headers: headers()}).then(r => r.json());
            const customerDebts = allDebts.filter(d => d.customer_id === debt.customer_id && d.status !== 'paid');
            let debtLines = '';
            let grandTotal = 0;
            let grandPaid = 0;
            for (let i = 0; i < customerDebts.length; i++) {
              const d = customerDebts[i];
              grandTotal += parseFloat(d.total_amount);
              grandPaid += parseFloat(d.amount_paid);
              debtLines += `${i + 1}. ${d.description}\n`;
              debtLines += `   Date Taken : ${fmtDate(d.created_at)}\n`;
              debtLines += `   Total      : KES ${fmt(d.total_amount)}\n`;
              debtLines += `   Due Date   : ${fmtDate(d.due_date)}\n`;
              if (parseFloat(d.amount_paid) > 0) {
                try {
                  const payments = await fetch(API + '/payments/' + d.id, {headers: headers()}).then(r => r.json());
                  payments.forEach(p => {
                    debtLines += `   Paid       : KES ${fmt(p.amount)} via ${p.note || 'N/A'} on ${fmtDate(p.paid_at)}\n`;
                  });
                } catch(e) { debtLines += `   Paid       : KES ${fmt(d.amount_paid)}\n`; }
                debtLines += `   Balance    : KES ${fmt(d.balance)}\n`;
              } else {
                debtLines += `   Balance    : KES ${fmt(d.total_amount)} (not yet paid)\n`;
              }
              debtLines += '\n';
            }
            const grandBalance = grandTotal - grandPaid;
            return `Happywise Ent - Debt Reminder\n\nDear ${debt.customer_name},\n\nThis is a friendly reminder about your outstanding debt(s) with us:\n\n${debtLines}---------------------\nTOTAL BALANCE DUE: KES ${fmt(grandBalance)}\n---------------------\n\nKindly make your payment at your earliest convenience.\nYou can reach us for any queries.\n\nThank you for your business!\nHappywise Ent`;
          }

          // ── Open Reminder Modal ──
          async function openReminderModal(debt) {
            currentReminderPhone = debt.customer_phone;
            currentReminderName = debt.customer_name;
            document.getElementById('msg-modal-title').innerHTML =
              `<i class="fa-solid fa-paper-plane"></i> Send Reminder to ${debt.customer_name}`;
            document.getElementById('msg-preview-text').value = 'Loading all debts...';
            document.getElementById('whatsapp-link').href = '#';
            document.getElementById('sms-link').href = '#';
            document.getElementById('message-modal').classList.add('open');
            const message = await buildMessage(debt);
            const encodedMsg = encodeURIComponent(message);
            const phone = fmtPhone(debt.customer_phone);
            document.getElementById('msg-preview-text').value = message;
            document.getElementById('whatsapp-link').href = `https://wa.me/${phone}?text=${encodedMsg}`;
            document.getElementById('sms-link').href = `sms:${debt.customer_phone}?body=${encodedMsg}`;
            document.getElementById('whatsapp-link').dataset.debtId = debt.id;
            document.getElementById('whatsapp-link').dataset.customerName = debt.customer_name;
            document.getElementById('sms-link').dataset.debtId = debt.id;
            document.getElementById('sms-link').dataset.customerName = debt.customer_name;
          }

          async function openSmsOnly(debt) {
            const message = await buildMessage(debt);
            const encodedMsg = encodeURIComponent(message);
            const entry = { type:'sms', customerName:debt.customer_name, debtId:debt.id, phone:debt.customer_phone, message, time:new Date().toISOString() };
            messageLog.unshift(entry);
            if (messageLog.length > 50) messageLog = messageLog.slice(0, 50);
            localStorage.setItem('hw_msg_log', JSON.stringify(messageLog));
            renderMessageHistory();
            window.open(`sms:${debt.customer_phone}?body=${encodedMsg}`);
          }

          function logMessage(type) {
            const msg = document.getElementById('msg-preview-text').value;
            const customerName = document.getElementById('whatsapp-link').dataset.customerName;
            const debtId = document.getElementById('whatsapp-link').dataset.debtId;
            const entry = { type, customerName, debtId, phone:currentReminderPhone, message:msg, time:new Date().toISOString() };
            messageLog.unshift(entry);
            if (messageLog.length > 50) messageLog = messageLog.slice(0, 50);
            localStorage.setItem('hw_msg_log', JSON.stringify(messageLog));
            setTimeout(() => closeModal('message-modal'), 500);
            renderMessageHistory();
          }

          function renderMessageHistory() {
            const el = document.getElementById('message-history');
            if (!el) return;
            if (!messageLog.length) { el.innerHTML = '<p style="color:#c4b5fd;font-size:0.85em">No messages sent yet.</p>'; return; }
            el.innerHTML = messageLog.map(m => `
              <div class="log-entry">
                <div class="log-icon ${m.type==='whatsapp'?'log-whatsapp':'log-sms'}">
                  <i class="fa-${m.type==='whatsapp'?'brands fa-whatsapp':'solid fa-message'}"></i>
                </div>
                <div class="log-info">
                  <div class="log-name">${m.customerName}</div>
                  <div class="log-desc">${m.type==='whatsapp'?'WhatsApp':'SMS'} sent to ${m.phone}</div>
                </div>
                <div class="log-time">${fmtDate(m.time)}</div>
              </div>`).join('');
          }

          // ── Dashboard with Charts ──
          async function loadDashboard() {
            try {
              const [rep, debts] = await Promise.all([
                fetch(API+'/reports', {headers:headers()}).then(r=>r.json()),
                fetch(API+'/debts', {headers:headers()}).then(r=>r.json())
              ]);
              allDebtsCache = debts;
              document.getElementById('stat-customers').textContent = rep.total_customers || 0;
              document.getElementById('stat-debts').textContent = rep.total_debts || 0;
              document.getElementById('stat-outstanding').textContent = fmt(rep.total_outstanding);
              document.getElementById('stat-collected').textContent = fmt(rep.total_collected);
              document.getElementById('stat-overdue').textContent = rep.overdue_debts || 0;
              document.getElementById('recent-debts').innerHTML = debts.slice(0,5).map(d=>`
                <tr>
                  <td>${d.customer_name}</td>
                  <td>${d.description}</td>
                  <td>${fmt(d.total_amount)}</td>
                  <td>${fmt(d.balance)}</td>
                  <td>${statusBadge(d)}</td>
                </tr>`).join('');

              // Bar Chart
              const barCtx = document.getElementById('barChart').getContext('2d');
              if (barChartInstance) barChartInstance.destroy();
              barChartInstance = new Chart(barCtx, {
                type: 'bar',
                data: {
                  labels: ['Total Issued', 'Collected', 'Outstanding'],
                  datasets: [{
                    label: 'KES',
                    data: [parseFloat(rep.total_debt_amount||0), parseFloat(rep.total_collected||0), parseFloat(rep.total_outstanding||0)],
                    backgroundColor: ['rgba(167,139,250,0.7)','rgba(52,211,153,0.7)','rgba(248,113,113,0.7)'],
                    borderColor: ['#a78bfa','#34d399','#f87171'],
                    borderWidth: 1, borderRadius: 6
                  }]
                },
                options: {
                  responsive: true, maintainAspectRatio: false,
                  plugins: {
                    legend: { display: false },
                    tooltip: { callbacks: { label: ctx => 'KES ' + ctx.parsed.y.toLocaleString('en-KE', {minimumFractionDigits:2}) } }
                  },
                  scales: {
                    x: { ticks: { color:'#c4b5fd', font:{size:11} }, grid: { color:'rgba(255,255,255,0.05)' } },
                    y: { ticks: { color:'#c4b5fd', font:{size:11}, callback: val => 'KES ' + val.toLocaleString() }, grid: { color:'rgba(255,255,255,0.05)' } }
                  }
                }
              });

              // Donut Chart
              const donutCtx = document.getElementById('donutChart').getContext('2d');
              if (donutChartInstance) donutChartInstance.destroy();
              const paidCount = parseInt(rep.paid_debts||0);
              const unpaidCount = parseInt(rep.unpaid_debts||0);
              const partialCount = debts.filter(d => parseFloat(d.amount_paid)>0 && d.status!=='paid').length;
              const trueUnpaid = Math.max(0, unpaidCount - partialCount);
              donutChartInstance = new Chart(donutCtx, {
                type: 'doughnut',
                data: {
                  labels: ['Paid','Partial','Unpaid','Overdue'],
                  datasets: [{
                    data: [paidCount, partialCount, trueUnpaid, parseInt(rep.overdue_debts||0)],
                    backgroundColor: ['rgba(52,211,153,0.8)','rgba(251,191,36,0.8)','rgba(167,139,250,0.8)','rgba(248,113,113,0.8)'],
                    borderColor: ['#34d399','#fbbf24','#a78bfa','#f87171'],
                    borderWidth: 2
                  }]
                },
                options: {
                  responsive: true, maintainAspectRatio: false, cutout: '65%',
                  plugins: {
                    legend: { position:'bottom', labels: { color:'#c4b5fd', font:{size:11}, padding:10, boxWidth:12 } },
                    tooltip: { callbacks: { label: ctx => ctx.label + ': ' + ctx.parsed + ' debts' } }
                  }
                }
              });
            } catch(e) { console.error('Dashboard error:', e); }
          }

          // ── Customers ──
