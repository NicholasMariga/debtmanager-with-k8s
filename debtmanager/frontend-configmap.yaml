          // ── Debt Aging ──
          async function loadAging() {
            const debts = await fetch(API+'/debts', {headers:headers()}).then(r=>r.json());
            const now = new Date();
            const unpaid = debts.filter(d => d.status !== 'paid');
            const aged = unpaid.map(d => {
              const taken = new Date(d.created_at);
              const days = Math.floor((now - taken) / (1000 * 60 * 60 * 24));
              return { ...d, days };
            });
            const band30 = aged.filter(d => d.days <= 30);
            const band60 = aged.filter(d => d.days > 30 && d.days <= 60);
            const band90 = aged.filter(d => d.days > 60);
            const sumBalance = arr => arr.reduce((s,d) => s + parseFloat(d.balance), 0);
            document.getElementById('age-30-count').textContent = band30.length;
            document.getElementById('age-30-amount').textContent = fmt(sumBalance(band30));
            document.getElementById('age-60-count').textContent = band60.length;
            document.getElementById('age-60-amount').textContent = fmt(sumBalance(band60));
            document.getElementById('age-90-count').textContent = band90.length;
            document.getElementById('age-90-amount').textContent = fmt(sumBalance(band90));
            document.getElementById('aging-table').innerHTML = aged
              .sort((a,b) => b.days - a.days)
              .map(d => `
                <tr>
                  <td>${d.customer_name}</td>
                  <td>${d.description}</td>
                  <td>${fmtDate(d.created_at)}</td>
                  <td style="color:#f87171">${fmt(d.balance)}</td>
                  <td>${d.days} days</td>
                  <td>${agingBadge(d.days)}</td>
                </tr>`).join('');
          }

          // ── Export CSV ──
          function downloadCSV(filename, rows, hdrs) {
            const csv = [hdrs.join(','), ...rows.map(r => hdrs.map(h => `"${r[h]||''}"`).join(','))].join('\n');
            const a = document.createElement('a');
            a.href = 'data:text/csv;charset=utf-8,' + encodeURIComponent(csv);
            a.download = filename;
            a.click();
          }

          function exportCustomersCSV() {
            downloadCSV('customers.csv', allCustomersCache.map(c => ({
              Name: c.name, Phone: c.phone||'', Email: c.email||'', Outstanding: fmt(c.total_outstanding)
            })), ['Name','Phone','Email','Outstanding']);
          }

          function exportDebtsCSV() {
            downloadCSV('debts.csv', allDebtsCache.map(d => ({
              Customer: d.customer_name, Description: d.description,
              'Date Taken': fmtDate(d.created_at), Total: fmt(d.total_amount),
              Paid: fmt(d.amount_paid), Balance: fmt(d.balance),
              'Due Date': fmtDate(d.due_date), Status: d.status
            })), ['Customer','Description','Date Taken','Total','Paid','Balance','Due Date','Status']);
          }

          function exportPaymentsCSV() {
            downloadCSV('payments.csv', allPaymentsCache.map(p => ({
              Amount: fmt(p.amount), Method: p.note||'', 'Recorded By': p.recorded_by_name||'', Date: fmtDate(p.paid_at)
            })), ['Amount','Method','Recorded By','Date']);
          }

          function exportAgingCSV() {
            const rows = Array.from(document.querySelectorAll('#aging-table tr')).map(tr => {
              const cells = tr.querySelectorAll('td');
              return {
                Customer: cells[0]?.innerText||'', Description: cells[1]?.innerText||'',
                'Date Taken': cells[2]?.innerText||'', Balance: cells[3]?.innerText||'',
                Days: cells[4]?.innerText||'', Band: cells[5]?.innerText||''
              };
            });
            downloadCSV('aging-report.csv', rows, ['Customer','Description','Date Taken','Balance','Days','Band']);
          }

          // ── Export Excel ──
          function exportDebtsExcel() {
            const data = allDebtsCache.map(d => ({
              Customer: d.customer_name, Description: d.description,
              'Date Taken': fmtDate(d.created_at), 'Total (KES)': parseFloat(d.total_amount),
              'Paid (KES)': parseFloat(d.amount_paid), 'Balance (KES)': parseFloat(d.balance),
              'Due Date': fmtDate(d.due_date), Status: d.status
            }));
            const ws = XLSX.utils.json_to_sheet(data);
            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, 'Debts');
            XLSX.writeFile(wb, 'happywise-debts.xlsx');
          }

          async function exportReportExcel() {
            const [rep, debts, customers] = await Promise.all([
              fetch(API+'/reports', {headers:headers()}).then(r=>r.json()),
              fetch(API+'/debts', {headers:headers()}).then(r=>r.json()),
              fetch(API+'/customers', {headers:headers()}).then(r=>r.json())
            ]);
            const wb = XLSX.utils.book_new();
            const summary = XLSX.utils.json_to_sheet([{
              'Total Customers': rep.total_customers, 'Total Debts': rep.total_debts,
              'Total Issued (KES)': parseFloat(rep.total_debt_amount),
              'Total Collected (KES)': parseFloat(rep.total_collected),
              'Outstanding (KES)': parseFloat(rep.total_outstanding),
              'Paid Debts': rep.paid_debts, 'Unpaid Debts': rep.unpaid_debts,
              'Overdue': rep.overdue_debts
            }]);
            XLSX.utils.book_append_sheet(wb, summary, 'Summary');
            const debtsSheet = XLSX.utils.json_to_sheet(debts.map(d => ({
              Customer: d.customer_name, Description: d.description,
              'Date Taken': fmtDate(d.created_at), 'Total (KES)': parseFloat(d.total_amount),
              'Paid (KES)': parseFloat(d.amount_paid), 'Balance (KES)': parseFloat(d.balance),
              'Due Date': fmtDate(d.due_date), Status: d.status
            })));
            XLSX.utils.book_append_sheet(wb, debtsSheet, 'Debts');
            const custSheet = XLSX.utils.json_to_sheet(customers.map(c => ({
              Name: c.name, Phone: c.phone||'', Email: c.email||'',
              'Outstanding (KES)': parseFloat(c.total_outstanding)
            })));
            XLSX.utils.book_append_sheet(wb, custSheet, 'Customers');
            XLSX.writeFile(wb, 'happywise-full-report.xlsx');
          }

          // ── Staff ──
          async function loadStaff() {
            const staff = await fetch(API+'/staff', {headers:headers()}).then(r=>r.json());
            document.getElementById('staff-table').innerHTML = staff.map(s=>`
              <tr>
                <td>${s.name}</td>
                <td>${s.username}</td>
                <td><span class="badge" style="background:rgba(167,139,250,0.2);color:#a78bfa">${s.role}</span></td>
                <td style="color:${s.active?'#34d399':'#f87171'}">${s.active?'Active':'Inactive'}</td>
                <td>${fmtDate(s.created_at)}</td>
                <td>${s.username!=='owner'?`
                  <button class="btn btn-red btn-sm" onclick="deleteStaff(${s.id})">
                    <i class="fa-solid fa-trash"></i>
                  </button>`:'-'}</td>
              </tr>`).join('');
          }

          async function addStaff() {
            const name = document.getElementById('staff-name').value.trim();
            const username = document.getElementById('staff-username').value.trim();
            const password = document.getElementById('staff-password').value;
            const role = document.getElementById('staff-role').value;
            if (!name||!username||!password) return showAlert('alert-staff','Please fill all fields','error');
            const res = await fetch(API+'/staff', {
              method:'POST', headers:headers(),
              body:JSON.stringify({name, username, password, role})
            });
            const data = await res.json();
            if (!res.ok) return showAlert('alert-staff', data.error||'Error','error');
            showAlert('alert-staff','Staff added successfully!','success');
            ['staff-name','staff-username','staff-password'].forEach(id=>document.getElementById(id).value='');
            loadStaff();
          }

          async function deleteStaff(id) {
            if (!confirm('Deactivate this staff member?')) return;
            await fetch(API+'/staff/'+id, {method:'DELETE', headers:headers()});
            loadStaff();
          }
        </script>
      </body>
    </html>

  nginx.conf: |
    server {
      listen 80;
      location / {
        root /usr/share/nginx/html;
        index index.html;
      }
      location /api/ {
        proxy_pass http://flask-service:5000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
      }
    }