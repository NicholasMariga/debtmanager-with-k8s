            document.getElementById('customers-table').innerHTML = customers.map(c=>`
              <tr>
                <td><i class="fa-solid fa-user" style="color:#a78bfa;margin-right:6px"></i>${c.name}</td>
                <td>${c.phone||'-'}</td>
