apiVersion: v1
kind: ConfigMap
metadata:
  name: nginx-html
  namespace: debtmanager
data:
  index.html: |
    <!DOCTYPE html>
    <html>
      <head>
        <title>Happywise Ent - Debt Manager</title>
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
        <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
        <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
        <link rel="stylesheet" href="/styles.css">
      </head>
      <body>

        <!-- LOGIN PAGE -->
        <div class="login-page" id="login-page">
          <div class="login-box">
            <div class="login-logo"><i class="fa-solid fa-store"></i></div>
            <div class="login-title">Happywise Ent</div>
            <div class="login-subtitle">Debt Management System</div>
            <div class="login-error" id="login-error">
              <i class="fa-solid fa-circle-xmark"></i>
              <span id="login-error-msg">Invalid credentials</span>
            </div>
            <div class="login-form">
              <div class="form-group">
                <label>Username</label>
                <div class="input-wrap">
                  <i class="fa-solid fa-user"></i>
                  <input type="text" id="login-username" placeholder="Enter username" onkeypress="if(event.key==='Enter') doLogin()">
                </div>
              </div>
              <div class="form-group">
                <label>Password</label>
                <div class="input-wrap">
                  <i class="fa-solid fa-lock"></i>
                  <input type="password" id="login-password" placeholder="Enter password" onkeypress="if(event.key==='Enter') doLogin()">
                </div>
              </div>
              <button class="login-btn" onclick="doLogin()">
                <i class="fa-solid fa-right-to-bracket"></i> Sign In
              </button>
            </div>
            <div class="role-badges">
              <span class="role-badge"><i class="fa-solid fa-crown"></i> Owner</span>
              <span class="role-badge"><i class="fa-solid fa-user-tie"></i> Manager</span>
              <span class="role-badge"><i class="fa-solid fa-cash-register"></i> Cashier</span>
            </div>
          </div>
        </div>

        <!-- APP PAGE -->
        <div class="app-page" id="app-page">

          <div class="topbar">
            <div class="topbar-left">
              <div class="topbar-logo"><i class="fa-solid fa-store"></i></div>
              <div class="topbar-title">Happywise <span>Ent</span></div>
            </div>
            <div class="topbar-right">
              <div class="user-info">
                <i class="fa-solid fa-circle-user"></i>
                <span class="user-name" id="topbar-name">-</span>
                <span class="user-role" id="topbar-role">-</span>
              </div>
              <button class="logout-btn" onclick="doLogout()">
                <i class="fa-solid fa-right-from-bracket"></i> Logout
              </button>
            </div>
          </div>

          <div class="sidebar">
            <div class="nav-section">Main</div>
            <div class="nav-item active" onclick="showPage('dashboard', event)">
              <i class="fa-solid fa-chart-pie"></i> Dashboard
            </div>
            <div class="nav-item" onclick="showPage('customers', event)">
              <i class="fa-solid fa-users"></i> Customers
            </div>
            <div class="nav-item" onclick="showPage('debts', event)">
              <i class="fa-solid fa-file-invoice-dollar"></i> Debts
            </div>
            <div class="nav-item" onclick="showPage('payments', event)">
              <i class="fa-solid fa-money-bill-wave"></i> Payments
            </div>
            <div class="nav-section">Management</div>
            <div class="nav-item nav-reminders" onclick="showPage('reminders', event)">
              <i class="fa-solid fa-bell"></i> Reminders
              <span id="reminders-badge" style="display:none;background:#f87171;color:white;border-radius:10px;padding:1px 7px;font-size:0.72em;margin-left:4px;font-weight:bold;vertical-align:middle"></span>
            </div>
            <div class="nav-item nav-reports" onclick="showPage('reports', event)">
              <i class="fa-solid fa-chart-bar"></i> Reports
            </div>
            <div class="nav-item nav-aging" onclick="showPage('aging', event)">
              <i class="fa-solid fa-hourglass-half"></i> Debt Aging
            </div>
            <div class="nav-item nav-staff" onclick="showPage('staff', event)">
              <i class="fa-solid fa-user-gear"></i> Staff
            </div>
          </div>

          <div class="main">

            <!-- DASHBOARD -->
            <div class="page active" id="page-dashboard">
              <div class="page-title"><i class="fa-solid fa-chart-pie"></i> Dashboard</div>
              <div class="dash-filter">
                <span style="font-size:0.82em;color:#c4b5fd"><i class="fa-solid fa-filter"></i> Filter:</span>
                <button class="btn btn-sm active" id="dflt-all" onclick="setDashFilter('all')">All Time</button>
                <button class="btn btn-sm" id="dflt-week" onclick="setDashFilter('week')">This Week</button>
                <button class="btn btn-sm" id="dflt-month" onclick="setDashFilter('month')">This Month</button>
                <button class="btn btn-sm" id="dflt-year" onclick="setDashFilter('year')">This Year</button>
                <button class="btn btn-sm" id="dflt-custom" onclick="setDashFilter('custom')">Custom</button>
                <div id="dflt-custom-inputs" style="display:none;gap:6px;align-items:center">
                  <input type="date" id="dflt-from" style="width:130px">
                  <span style="color:#c4b5fd;font-size:0.82em">to</span>
                  <input type="date" id="dflt-to" style="width:130px">
                  <button class="btn btn-sm" onclick="loadDashboard()"><i class="fa-solid fa-check"></i> Go</button>
                </div>
              </div>
              <div class="stats">
                <div class="stat-card"><i class="fa-solid fa-users"></i><div class="stat-value" id="stat-customers">-</div><div class="stat-label">Customers</div></div>
                <div class="stat-card"><i class="fa-solid fa-file-invoice-dollar"></i><div class="stat-value" id="stat-debts">-</div><div class="stat-label">Total Debts</div></div>
                <div class="stat-card"><i class="fa-solid fa-triangle-exclamation"></i><div class="stat-value" id="stat-outstanding">-</div><div class="stat-label">Outstanding (KES)</div></div>
                <div class="stat-card"><i class="fa-solid fa-circle-check"></i><div class="stat-value" id="stat-collected">-</div><div class="stat-label">Collected (KES)</div></div>
                <div class="stat-card"><i class="fa-solid fa-clock"></i><div class="stat-value" id="stat-overdue">-</div><div class="stat-label">Overdue</div></div>
                <div class="stat-card"><i class="fa-solid fa-calendar-days" style="color:#fbbf24"></i><div class="stat-value" id="stat-duesoon" style="color:#fbbf24">-</div><div class="stat-label">Due in 7 Days</div></div>
                <div class="stat-card"><i class="fa-solid fa-ban" style="color:#9ca3af"></i><div class="stat-value" id="stat-writeoff" style="color:#9ca3af">-</div><div class="stat-label">Written Off (KES)</div></div>
                <div class="stat-card"><i class="fa-solid fa-percent" style="color:#34d399"></i><div class="stat-value" id="stat-collrate" style="color:#34d399">-</div><div class="stat-label">Collection Rate</div></div>
              </div>
              <div class="charts-row">
                <div class="chart-card">
                  <h4><i class="fa-solid fa-chart-bar"></i> Collected vs Outstanding (KES)</h4>
                  <div class="chart-container"><canvas id="barChart"></canvas></div>
                </div>
                <div class="chart-card">
                  <h4><i class="fa-solid fa-chart-pie"></i> Debt Status Breakdown</h4>
                  <div class="chart-container"><canvas id="donutChart"></canvas></div>
                </div>
              </div>
              <div class="card">
                <h3><i class="fa-solid fa-ranking-star"></i> Top 5 Debtors</h3>
                <div id="top-debtors-list"><p style="color:#c4b5fd;font-size:.85em">Loading...</p></div>
              </div>
              <div class="card">
                <h3><i class="fa-solid fa-clock-rotate-left"></i> Recent Debts</h3>
                <table>
                  <thead><tr><th>Customer</th><th>Description</th><th>Amount (KES)</th><th>Balance (KES)</th><th>Status</th></tr></thead>
                  <tbody id="recent-debts"></tbody>
                </table>
              </div>
            </div>

            <!-- CUSTOMERS -->
            <div class="page" id="page-customers">
              <div class="page-title"><i class="fa-solid fa-users"></i> Customers</div>
              <div class="card">
                <h3><i class="fa-solid fa-user-plus"></i> Add Customer</h3>
                <div id="alert-customer" class="alert"></div>
                <div class="form-row">
                  <div class="form-group"><label>Full Name *</label><input type="text" id="cust-name" placeholder="e.g. John Kamau"></div>
                  <div class="form-group"><label>Phone (07...) *</label><input type="text" id="cust-phone" placeholder="e.g. 0712345678"></div>
                  <div class="form-group"><label>Email</label><input type="email" id="cust-email" placeholder="e.g. john@email.com"></div>
                </div>
                <button class="btn" onclick="addCustomer()"><i class="fa-solid fa-plus"></i> Add Customer</button>
              </div>
              <div class="card">
                <h3><i class="fa-solid fa-list"></i> All Customers</h3>
                <div class="search-bar">
                  <input type="text" id="search-customers" placeholder="Search by name or phone..." oninput="filterCustomers()">
                  <button class="btn btn-yellow btn-sm" onclick="exportCustomersCSV()"><i class="fa-solid fa-file-csv"></i> Export CSV</button>
                </div>
                <table>
                  <thead><tr><th style="cursor:pointer;user-select:none" onclick="sortCustomers('name')">Name <i class="fa-solid fa-sort" id="sort-cust-name" style="opacity:0.4;font-size:.75em"></i></th><th>Phone</th><th>Email</th><th style="cursor:pointer;user-select:none" onclick="sortCustomers('total_outstanding')">Outstanding (KES) <i class="fa-solid fa-sort" id="sort-cust-bal" style="opacity:0.4;font-size:.75em"></i></th><th>Actions</th></tr></thead>
                  <tbody id="customers-table"></tbody>
                </table>
              </div>
              <div class="card">
                <div style="display:flex;align-items:center;justify-content:space-between;cursor:pointer" onclick="toggleArchivedCustomers()">
                  <h3 style="margin:0"><i class="fa-solid fa-box-archive" style="color:#6b7280"></i> Archived Customers <span id="archived-count" style="font-size:0.75em;color:#6b7280;font-weight:normal"></span></h3>
                  <i class="fa-solid fa-chevron-down" id="archived-chevron" style="color:#6b7280;transition:transform 0.2s"></i>
                </div>
                <div id="archived-section" style="display:none;margin-top:14px">
                  <table>
                    <thead><tr><th>Name</th><th>Phone</th><th>Email</th><th>Total Debt History</th><th>Actions</th></tr></thead>
                    <tbody id="archived-customers-table"></tbody>
                  </table>
                </div>
              </div>
            </div>

            <!-- DEBTS -->
            <div class="page" id="page-debts">
              <div class="page-title"><i class="fa-solid fa-file-invoice-dollar"></i> Debts</div>
              <div class="card">
                <h3><i class="fa-solid fa-plus"></i> Record New Debt</h3>
                <div id="alert-debt" class="alert"></div>
                <div class="form-row">
                  <div class="form-group"><label>Customer *</label><select id="debt-customer"></select></div>
                  <div class="form-group"><label>Description *</label><input type="text" id="debt-desc" placeholder="e.g. Groceries"></div>
                  <div class="form-group"><label>Payment Terms</label><select id="debt-category"><option value="">No Terms</option><option value="Weekly">Weekly</option><option value="After Two Weeks">After Two Weeks</option><option value="End of Month">End of Month</option><option value="One-off">One-off</option></select></div>
                  <div class="form-group"><label>Amount (KES) *</label><input type="number" id="debt-amount" placeholder="e.g. 5000"></div>
                  <div class="form-group"><label>Date Taken *</label><input type="datetime-local" id="debt-date"></div>
                  <div class="form-group"><label>Due Date</label><input type="date" id="debt-due"></div>
                </div>
                <button class="btn" onclick="addDebt()"><i class="fa-solid fa-plus"></i> Record Debt</button>
              </div>
              <div class="card">
                <h3><i class="fa-solid fa-list"></i> All Debts</h3>
                <div class="search-bar">
                  <input type="text" id="search-debts" placeholder="Search by customer or description..." oninput="filterDebts()">
                  <select id="filter-status" onchange="filterDebts()">
                    <option value="">All Statuses</option>
                    <option value="unpaid">Unpaid</option>
                    <option value="partial">Partial</option>
                    <option value="paid">Paid</option>
                    <option value="overdue">Overdue</option>
                    <option value="writeoff">Written Off</option>
                  </select>
                  <select id="filter-category" onchange="filterDebts()">
                    <option value="">All Payment Terms</option>
                    <option value="Weekly">Weekly</option>
                    <option value="After Two Weeks">After Two Weeks</option>
                    <option value="End of Month">End of Month</option>
                    <option value="One-off">One-off</option>
                  </select>
                  <button class="btn btn-yellow btn-sm" onclick="exportDebtsCSV()"><i class="fa-solid fa-file-csv"></i> Export CSV</button>
                  <button class="btn btn-green btn-sm" onclick="exportDebtsExcel()"><i class="fa-solid fa-file-excel"></i> Export Excel</button>
                </div>
                <div style="overflow-x:auto">
                  <table>
                    <thead><tr><th style="cursor:pointer;user-select:none" onclick="sortDebts('customer_name')">Customer <i class="fa-solid fa-sort" id="sort-debt-cust" style="opacity:0.4;font-size:.75em"></i></th><th>Description</th><th>Terms</th><th style="cursor:pointer;user-select:none" onclick="sortDebts('created_at')">Date Taken <i class="fa-solid fa-sort" id="sort-debt-date" style="opacity:0.4;font-size:.75em"></i></th><th style="cursor:pointer;user-select:none" onclick="sortDebts('total_amount')">Total (KES) <i class="fa-solid fa-sort" id="sort-debt-total" style="opacity:0.4;font-size:.75em"></i></th><th>Paid (KES)</th><th style="cursor:pointer;user-select:none" onclick="sortDebts('balance')">Balance (KES) <i class="fa-solid fa-sort" id="sort-debt-bal" style="opacity:0.4;font-size:.75em"></i></th><th style="cursor:pointer;user-select:none" onclick="sortDebts('due_date')">Due Date <i class="fa-solid fa-sort" id="sort-debt-due" style="opacity:0.4;font-size:.75em"></i></th><th>Status</th><th>Actions</th></tr></thead>
                    <tbody id="debts-table"></tbody>
                  </table>
                </div>
              </div>
            </div>

            <!-- PAYMENTS -->
            <div class="page" id="page-payments">
              <div class="page-title"><i class="fa-solid fa-money-bill-wave"></i> Payments</div>
              <div class="card">
                <h3><i class="fa-solid fa-plus"></i> Record Payment</h3>
                <div id="alert-payment" class="alert"></div>
                <div class="form-row">
                  <div class="form-group"><label>Select Debt *</label><select id="pay-debt"></select></div>
                  <div class="form-group"><label>Amount (KES) *</label><input type="number" id="pay-amount" placeholder="e.g. 1000"></div>
                  <div class="form-group">
                    <label>Payment Method *</label>
                    <select id="pay-note">
                      <option value="Cash">Cash</option>
                      <option value="M-Pesa">M-Pesa</option>
                      <option value="Bank Transfer">Bank Transfer</option>
                    </select>
                  </div>
                </div>
                <button class="btn btn-green" onclick="makePayment()"><i class="fa-solid fa-money-bill-wave"></i> Record Payment</button>
              </div>
              <div class="card">
                <h3><i class="fa-solid fa-history"></i> Payment History</h3>
                <div class="search-bar">
                  <select id="filter-debt" onchange="loadPaymentHistory()"><option value="">Select debt to view history</option></select>
                  <button class="btn btn-yellow btn-sm" onclick="exportPaymentsCSV()"><i class="fa-solid fa-file-csv"></i> Export CSV</button>
                </div>
                <table>
                  <thead><tr><th>Amount (KES)</th><th>Method</th><th>Recorded By</th><th>Date</th></tr></thead>
                  <tbody id="payments-table"></tbody>
                </table>
              </div>
            </div>

            <!-- REMINDERS -->
            <div class="page" id="page-reminders">
              <div class="page-title"><i class="fa-solid fa-bell"></i> Reminders</div>
              <div class="card">
                <h3><i class="fa-solid fa-triangle-exclamation"></i> Overdue Debts</h3>
                <p style="color:#c4b5fd;font-size:0.85em;margin-bottom:15px">
                  <i class="fa-solid fa-circle-info"></i>
                  Click WhatsApp or SMS to send a reminder with ALL debts, date taken and payment history. You just press Send.
                </p>
                <div id="reminders-list"></div>
              </div>
              <div class="card">
                <h3><i class="fa-solid fa-clock-rotate-left"></i> Message History</h3>
                <div id="message-history"><p style="color:#c4b5fd;font-size:0.85em">No messages sent yet.</p></div>
              </div>
            </div>

            <!-- REPORTS -->
            <div class="page" id="page-reports">
              <div class="page-title"><i class="fa-solid fa-chart-bar"></i> Reports</div>
              <div style="display:flex;gap:10px;margin-bottom:20px;flex-wrap:wrap">
                <button class="btn btn-yellow" onclick="exportReportExcel()"><i class="fa-solid fa-file-excel"></i> Export Full Report</button>
              </div>
              <div class="stats">
                <div class="stat-card"><i class="fa-solid fa-money-bill-trend-up"></i><div class="stat-value" id="rep-total">-</div><div class="stat-label">Total Issued (KES)</div></div>
                <div class="stat-card"><i class="fa-solid fa-hand-holding-dollar"></i><div class="stat-value" id="rep-collected">-</div><div class="stat-label">Collected (KES)</div></div>
                <div class="stat-card"><i class="fa-solid fa-triangle-exclamation"></i><div class="stat-value" id="rep-outstanding">-</div><div class="stat-label">Outstanding (KES)</div></div>
                <div class="stat-card"><i class="fa-solid fa-circle-check"></i><div class="stat-value" id="rep-paid">-</div><div class="stat-label">Paid Debts</div></div>
                <div class="stat-card"><i class="fa-solid fa-circle-xmark"></i><div class="stat-value" id="rep-unpaid">-</div><div class="stat-label">Unpaid Debts</div></div>
                <div class="stat-card"><i class="fa-solid fa-clock"></i><div class="stat-value" id="rep-overdue">-</div><div class="stat-label">Overdue</div></div>
                <div class="stat-card"><i class="fa-solid fa-ban" style="color:#9ca3af"></i><div class="stat-value" id="rep-writeoff" style="color:#9ca3af">-</div><div class="stat-label">Written Off (KES)</div></div>
                <div class="stat-card"><i class="fa-solid fa-percent" style="color:#34d399"></i><div class="stat-value" id="rep-collrate" style="color:#34d399">-</div><div class="stat-label">Collection Rate</div></div>
              </div>
              <div class="card">
                <h3><i class="fa-solid fa-chart-line"></i> Monthly Trend (Last 6 Months)</h3>
                <div class="chart-container"><canvas id="trendChart"></canvas></div>
              </div>
              <div class="card">
                <h3><i class="fa-solid fa-file-lines"></i> Customer Statement</h3>
                <div class="search-bar">
                  <select id="statement-customer" onchange="loadStatement()"><option value="">Select customer to view statement</option></select>
                  <button class="btn btn-orange btn-sm" onclick="printStatement()"><i class="fa-solid fa-print"></i> Print Statement</button>
                </div>
                <div id="statement-content"></div>
              </div>
            </div>

            <!-- DEBT AGING -->
            <div class="page" id="page-aging">
              <div class="page-title"><i class="fa-solid fa-hourglass-half"></i> Debt Aging Report</div>
              <div class="card">
                <h3><i class="fa-solid fa-circle-info"></i> Aging Summary</h3>
                <div class="stats" style="grid-template-columns:repeat(3,1fr)">
                  <div class="stat-card" style="border-color:#fbbf24"><i class="fa-solid fa-hourglass-start" style="color:#fbbf24"></i><div class="stat-value" id="age-30-count" style="color:#fbbf24">-</div><div class="stat-label">0-30 Days (KES <span id="age-30-amount">-</span>)</div></div>
                  <div class="stat-card" style="border-color:#fb923c"><i class="fa-solid fa-hourglass-half" style="color:#fb923c"></i><div class="stat-value" id="age-60-count" style="color:#fb923c">-</div><div class="stat-label">31-60 Days (KES <span id="age-60-amount">-</span>)</div></div>
                  <div class="stat-card" style="border-color:#f87171"><i class="fa-solid fa-hourglass-end" style="color:#f87171"></i><div class="stat-value" id="age-90-count" style="color:#f87171">-</div><div class="stat-label">60+ Days (KES <span id="age-90-amount">-</span>)</div></div>
                </div>
              </div>
              <div class="card">
                <h3><i class="fa-solid fa-list"></i> Aging Details</h3>
                <div style="margin-bottom:15px;display:flex;gap:10px">
                  <button class="btn btn-yellow btn-sm" onclick="exportAgingCSV()"><i class="fa-solid fa-file-csv"></i> Export CSV</button>
                  <button class="btn btn-orange btn-sm" onclick="printAging()"><i class="fa-solid fa-print"></i> Print</button>
                </div>
                <table>
                  <thead><tr><th>Customer</th><th>Description</th><th>Date Taken</th><th>Balance (KES)</th><th>Days Outstanding</th><th>Aging Band</th></tr></thead>
                  <tbody id="aging-table"></tbody>
                </table>
              </div>
            </div>

            <!-- STAFF -->
            <div class="page" id="page-staff">
              <div class="page-title"><i class="fa-solid fa-user-gear"></i> Staff Management</div>
              <div class="card">
                <h3><i class="fa-solid fa-user-plus"></i> Add Staff</h3>
                <div id="alert-staff" class="alert"></div>
                <div class="form-row">
                  <div class="form-group"><label>Full Name *</label><input type="text" id="staff-name" placeholder="e.g. Jane Wanjiku"></div>
                  <div class="form-group"><label>Username *</label><input type="text" id="staff-username" placeholder="e.g. jane2024"></div>
                  <div class="form-group"><label>Password *</label><input type="password" id="staff-password" placeholder="Set password"></div>
                  <div class="form-group"><label>Role *</label><select id="staff-role"><option value="cashier">Cashier</option><option value="manager">Manager</option></select></div>
                </div>
                <button class="btn" onclick="addStaff()"><i class="fa-solid fa-plus"></i> Add Staff</button>
              </div>
              <div class="card">
                <h3><i class="fa-solid fa-list"></i> All Staff</h3>
                <table>
                  <thead><tr><th>Name</th><th>Username</th><th>Role</th><th>Status</th><th>Joined</th><th>Action</th></tr></thead>
                  <tbody id="staff-table"></tbody>
                </table>
              </div>
            </div>

          </div>
        </div>

        <!-- Payment Modal -->
        <div class="modal" id="payment-modal">
          <div class="modal-box">
            <span class="modal-close" onclick="closeModal('payment-modal')"><i class="fa-solid fa-xmark"></i></span>
            <h3><i class="fa-solid fa-money-bill-wave"></i> Quick Payment</h3>
            <p style="color:#c4b5fd;font-size:0.83em;margin-bottom:15px" id="modal-debt-info"></p>
            <div class="form-group" style="margin-bottom:12px"><label>Amount (KES)</label><input type="number" id="modal-amount" placeholder="Enter amount"></div>
            <div class="form-group" style="margin-bottom:15px">
              <label>Payment Method</label>
              <select id="modal-note">
                <option value="Cash">Cash</option>
                <option value="M-Pesa">M-Pesa</option>
                <option value="Bank Transfer">Bank Transfer</option>
              </select>
            </div>
            <button class="btn btn-green" onclick="submitModalPayment()"><i class="fa-solid fa-check"></i> Confirm Payment</button>
          </div>
        </div>

        <!-- Receipt Modal -->
        <div class="modal" id="receipt-modal">
          <div class="modal-box">
            <span class="modal-close" onclick="closeModal('receipt-modal')"><i class="fa-solid fa-xmark"></i></span>
            <h3><i class="fa-solid fa-receipt"></i> Payment Receipt</h3>
            <div id="receipt-content"></div>
            <div style="display:flex;gap:10px;margin-top:15px;flex-wrap:wrap">
              <button class="btn btn-orange" onclick="printReceipt()"><i class="fa-solid fa-print"></i> Print Receipt</button>
              <button class="btn btn-whatsapp" onclick="shareReceiptWhatsApp()"><i class="fa-brands fa-whatsapp"></i> Share on WhatsApp</button>
            </div>
          </div>
        </div>

        <!-- Message Preview Modal -->
        <div class="modal" id="message-modal">
          <div class="modal-box">
            <span class="modal-close" onclick="closeModal('message-modal')"><i class="fa-solid fa-xmark"></i></span>
            <h3 id="msg-modal-title"><i class="fa-solid fa-paper-plane"></i> Send Reminder</h3>
            <p style="color:#c4b5fd;font-size:0.82em;margin-bottom:5px">Message preview — edit if needed before sending:</p>
            <textarea id="msg-preview-text"
              style="width:100%;height:200px;background:rgba(255,255,255,0.05);
              border:1px solid rgba(255,255,255,0.15);border-radius:8px;
              padding:10px;color:white;font-size:0.82em;resize:vertical;
              outline:none;line-height:1.6;font-family:monospace"></textarea>
            <div style="display:flex;gap:10px;margin-top:15px;flex-wrap:wrap">
              <a id="whatsapp-link" href="#" target="_blank" class="btn btn-whatsapp" onclick="logMessage('whatsapp')">
                <i class="fa-brands fa-whatsapp"></i> Open in WhatsApp
              </a>
              <a id="sms-link" href="#" class="btn btn-sms" onclick="logMessage('sms')">
                <i class="fa-solid fa-message"></i> Open in SMS
              </a>
            </div>
            <p style="color:rgba(255,255,255,0.3);font-size:0.75em;margin-top:10px">
              <i class="fa-solid fa-circle-info"></i> WhatsApp/SMS opens with message pre-filled. You press Send.
            </p>
          </div>
        </div>

        <!-- Customer Note Modal -->
        <div class="modal" id="note-modal">
          <div class="modal-box">
            <span class="modal-close" onclick="closeModal('note-modal')"><i class="fa-solid fa-xmark"></i></span>
            <h3><i class="fa-solid fa-note-sticky"></i> Customer Note</h3>
            <p style="color:#c4b5fd;font-size:0.83em;margin-bottom:12px" id="note-customer-name"></p>
            <div class="form-group" style="margin-bottom:15px">
              <label>Note</label>
              <textarea id="note-text" style="width:100%;height:110px;background:rgba(255,255,255,0.07);border:1px solid rgba(255,255,255,0.15);border-radius:8px;padding:10px;color:white;font-size:0.88em;resize:vertical;outline:none" placeholder="e.g. Calls after 5pm, disputes charges..."></textarea>
            </div>
            <div style="display:flex;gap:10px">
              <button class="btn" onclick="saveCustomerNote()"><i class="fa-solid fa-floppy-disk"></i> Save</button>
              <button class="btn btn-red" onclick="clearCustomerNote()"><i class="fa-solid fa-trash"></i> Clear</button>
            </div>
          </div>
        </div>

        <!-- Write-Off Modal -->
        <div class="modal" id="writeoff-modal">
          <div class="modal-box">
            <span class="modal-close" onclick="closeModal('writeoff-modal')"><i class="fa-solid fa-xmark"></i></span>
            <h3><i class="fa-solid fa-ban"></i> Write Off Debt</h3>
            <p style="color:#c4b5fd;font-size:0.83em;margin-bottom:12px" id="writeoff-debt-info"></p>
            <div class="form-group" style="margin-bottom:15px">
              <label>Reason *</label>
              <input type="text" id="writeoff-reason" placeholder="e.g. Bad debt, customer relocated...">
            </div>
            <button class="btn btn-red" onclick="confirmWriteOff()"><i class="fa-solid fa-ban"></i> Write Off</button>
          </div>
        </div>

        <!-- Edit Debt Modal -->
        <div class="modal" id="edit-debt-modal">
          <div class="modal-box">
            <span class="modal-close" onclick="closeModal('edit-debt-modal')"><i class="fa-solid fa-xmark"></i></span>
            <h3><i class="fa-solid fa-pen"></i> Edit Debt</h3>
            <p style="color:#c4b5fd;font-size:0.83em;margin-bottom:12px" id="edit-debt-info"></p>
            <div class="form-row">
              <div class="form-group"><label>Description</label><input type="text" id="edit-debt-desc"></div>
              <div class="form-group"><label>Payment Terms</label><select id="edit-debt-category"><option value="">No Terms</option><option value="Weekly">Weekly</option><option value="After Two Weeks">After Two Weeks</option><option value="End of Month">End of Month</option><option value="One-off">One-off</option></select></div>
              <div class="form-group"><label>Amount (KES)</label><input type="number" id="edit-debt-amount"></div>
              <div class="form-group"><label>Date Taken</label><input type="datetime-local" id="edit-debt-date"></div>
              <div class="form-group"><label>Due Date</label><input type="date" id="edit-debt-due"></div>
            </div>
            <button class="btn" onclick="saveDebtEdit()"><i class="fa-solid fa-floppy-disk"></i> Save Changes</button>
          </div>
        </div>

        <script src="/app.js"></script>
      </body>
    </html>

  nginx.conf: |
    server {
      listen 80;
      location / {
        root /usr/share/nginx/html;
        index index.html;
      }
      location /api/ {
        proxy_pass http://flask-service:5000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
      }
    }
