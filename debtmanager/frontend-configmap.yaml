          async function loadStatement() {
            const customerId = document.getElementById('statement-customer').value;
            if (!customerId) { document.getElementById('statement-content').innerHTML = ''; return; }
            const [debts, customers] = await Promise.all([
              fetch(API+'/debts', {headers:headers()}).then(r=>r.json()),
              fetch(API+'/customers', {headers:headers()}).then(r=>r.json())
            ]);
            const customer = customers.find(c => c.id == customerId);
            const customerDebts = debts.filter(d => d.customer_id == customerId);
            let statementRows = '';
            let totalDebt = 0;
            let totalPaid = 0;
            for (const d of customerDebts) {
              totalDebt += parseFloat(d.total_amount);
              totalPaid += parseFloat(d.amount_paid);
              statementRows += `<tr>
                <td>${fmtDate(d.created_at)}</td>
                <td>${d.description}</td>
                <td>${fmt(d.total_amount)}</td>
                <td style="color:#34d399">${fmt(d.amount_paid)}</td>
                <td style="color:${parseFloat(d.balance)>0?'#f87171':'#34d399'}">${fmt(d.balance)}</td>
                <td>${fmtDate(d.due_date)}</td>
                <td>${statusBadge(d)}</td>
              </tr>`;
              if (parseFloat(d.amount_paid) > 0) {
                const payments = await fetch(API+'/payments/'+d.id, {headers:headers()}).then(r=>r.json());
                payments.forEach(p => {
                  statementRows += `<tr style="background:rgba(52,211,153,0.03)">
                    <td style="color:#34d399;font-size:0.82em">${fmtDate(p.paid_at)}</td>
                    <td style="color:#34d399;font-size:0.82em">
                      <i class="fa-solid fa-arrow-right"></i> Payment via ${p.note||'N/A'}
                    </td>
                    <td>-</td>
                    <td style="color:#34d399">KES ${fmt(p.amount)}</td>
                    <td>-</td><td>-</td><td>-</td>
                  </tr>`;
                });
              }
            }
            document.getElementById('statement-content').innerHTML = `
              <div class="statement-header">
                <div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:10px">
                  <div>
                    <div style="font-size:1.1em;font-weight:bold">${customer?customer.name:'Customer'}</div>
                    <div style="color:#c4b5fd;font-size:0.85em">${customer?customer.phone||'':''}</div>
                  </div>
                  <div style="text-align:right">
                    <div style="color:#c4b5fd;font-size:0.8em">Statement Date</div>
                    <div style="font-weight:bold">${fmtDate(new Date())}</div>
                  </div>
                </div>
                <div style="display:flex;gap:20px;margin-top:12px;flex-wrap:wrap">
                  <div>
                    <div style="font-size:0.75em;color:#c4b5fd">Total Debt</div>
                    <div style="font-weight:bold">KES ${fmt(totalDebt)}</div>
                  </div>
                  <div>
                    <div style="font-size:0.75em;color:#c4b5fd">Total Paid</div>
                    <div style="font-weight:bold;color:#34d399">KES ${fmt(totalPaid)}</div>
                  </div>
                  <div>
                    <div style="font-size:0.75em;color:#c4b5fd">Balance Due</div>
                    <div style="font-weight:bold;color:#f87171">KES ${fmt(totalDebt-totalPaid)}</div>
                  </div>
                </div>
              </div>
              <table>
                <thead>
                  <tr>
                    <th>Date</th><th>Description</th><th>Debt (KES)</th>
                    <th>Paid (KES)</th><th>Balance (KES)</th><th>Due Date</th><th>Status</th>
                  </tr>
                </thead>
                <tbody>${statementRows}</tbody>
              </table>`;
          }

