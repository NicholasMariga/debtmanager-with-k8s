apiVersion: apps/v1
kind: Deployment
metadata:
  name: flask-backend
  namespace: debtmanager
spec:
  replicas: 2
  selector:
    matchLabels:
      app: flask-backend
  template:
    metadata:
      labels:
        app: flask-backend
    spec:
      containers:
      - name: flask-backend
        image: python:3.11-slim
        ports:
        - containerPort: 5000
        command: ["/bin/sh", "-c"]
        args:
          - |
            pip install flask flask-cors psycopg2-binary --quiet &&
            python /app/app.py
        envFrom:
        - configMapRef:
            name: postgres-config
        env:
        - name: POSTGRES_PASSWORD
          valueFrom:
            secretKeyRef:
              name: postgres-secret
              key: POSTGRES_PASSWORD
        - name: POSTGRES_HOST
          value: postgres-service
        volumeMounts:
        - name: app-volume
          mountPath: /app
      volumes:
      - name: app-volume
        configMap:
          name: flask-app-config