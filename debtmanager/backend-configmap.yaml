apiVersion: v1
kind: ConfigMap
metadata:
  name: flask-app-config
  namespace: debtmanager
data:
  app.py: |
    from flask import Flask, jsonify, request
    from flask_cors import CORS
    import psycopg2
    import psycopg2.extras
    import os
    from datetime import datetime

    app = Flask(__name__)
    CORS(app)

    def get_db():
      return psycopg2.connect(
        host=os.environ.get('POSTGRES_HOST'),
        database=os.environ.get('POSTGRES_DB'),
        user=os.environ.get('POSTGRES_USER'),
        password=os.environ.get('POSTGRES_PASSWORD')
      )

    def init_db():
      conn = get_db()
      cur = conn.cursor()
      cur.execute('''
        CREATE TABLE IF NOT EXISTS customers (
          id SERIAL PRIMARY KEY,
          name VARCHAR(100) NOT NULL,
          phone VARCHAR(20),
          email VARCHAR(100),
          created_at TIMESTAMP DEFAULT NOW()
        );
        CREATE TABLE IF NOT EXISTS debts (
          id SERIAL PRIMARY KEY,
          customer_id INTEGER REFERENCES customers(id),
          description VARCHAR(255),
          total_amount DECIMAL(10,2) NOT NULL,
          amount_paid DECIMAL(10,2) DEFAULT 0,
          due_date DATE,
          status VARCHAR(20) DEFAULT 'unpaid',
          created_at TIMESTAMP DEFAULT NOW()
        );
        CREATE TABLE IF NOT EXISTS payments (
          id SERIAL PRIMARY KEY,
          debt_id INTEGER REFERENCES debts(id),
          amount DECIMAL(10,2) NOT NULL,
          note VARCHAR(255),
          paid_at TIMESTAMP DEFAULT NOW()
        );
      ''')
      conn.commit()
      cur.close()
      conn.close()

    # ── Health ──
    @app.route('/health')
    def health():
      return jsonify({"status": "healthy", "message": "Debt Manager API running"})

    # ── Customers ──
    @app.route('/customers', methods=['GET'])
    def get_customers():
      conn = get_db()
      cur = conn.cursor(cursor_factory=psycopg2.extras.RealDictCursor)
      cur.execute('''
        SELECT c.*, 
          COALESCE(SUM(d.total_amount - d.amount_paid), 0) as total_outstanding
        FROM customers c
        LEFT JOIN debts d ON c.id = d.customer_id AND d.status != 'paid'
        GROUP BY c.id ORDER BY c.name
      ''')
      customers = cur.fetchall()
      cur.close(); conn.close()
      return jsonify([dict(c) for c in customers])

    @app.route('/customers', methods=['POST'])
    def add_customer():
      data = request.json
      conn = get_db()
      cur = conn.cursor(cursor_factory=psycopg2.extras.RealDictCursor)
      cur.execute(
        'INSERT INTO customers (name, phone, email) VALUES (%s, %s, %s) RETURNING *',
        (data['name'], data.get('phone',''), data.get('email',''))
      )
      customer = cur.fetchone()
      conn.commit(); cur.close(); conn.close()
      return jsonify(dict(customer)), 201

    # ── Debts ──
    @app.route('/debts', methods=['GET'])
    def get_debts():
      conn = get_db()
      cur = conn.cursor(cursor_factory=psycopg2.extras.RealDictCursor)
      cur.execute('''
        SELECT d.*, c.name as customer_name, c.phone as customer_phone,
          (d.total_amount - d.amount_paid) as balance
        FROM debts d
        JOIN customers c ON d.customer_id = c.id
        ORDER BY d.created_at DESC
      ''')
      debts = cur.fetchall()
      cur.close(); conn.close()
      return jsonify([dict(d) for d in debts])

    @app.route('/debts', methods=['POST'])
    def add_debt():
      data = request.json
      conn = get_db()
      cur = conn.cursor(cursor_factory=psycopg2.extras.RealDictCursor)
      cur.execute(
        '''INSERT INTO debts (customer_id, description, total_amount, due_date)
           VALUES (%s, %s, %s, %s) RETURNING *''',
        (data['customer_id'], data['description'],
         data['total_amount'], data.get('due_date'))
      )
      debt = cur.fetchone()
      conn.commit(); cur.close(); conn.close()
      return jsonify(dict(debt)), 201

    # ── Payments ──
    @app.route('/payments', methods=['POST'])
    def make_payment():
      data = request.json
      conn = get_db()
      cur = conn.cursor(cursor_factory=psycopg2.extras.RealDictCursor)
      # Record payment
      cur.execute(
        'INSERT INTO payments (debt_id, amount, note) VALUES (%s, %s, %s) RETURNING *',
        (data['debt_id'], data['amount'], data.get('note', ''))
      )
      payment = cur.fetchone()
      # Update debt amount paid
      cur.execute(
        'UPDATE debts SET amount_paid = amount_paid + %s WHERE id = %s RETURNING *',
        (data['amount'], data['debt_id'])
      )
      debt = cur.fetchone()
      # Mark as paid if fully settled
      if float(debt['amount_paid']) >= float(debt['total_amount']):
        cur.execute("UPDATE debts SET status = 'paid' WHERE id = %s", (data['debt_id'],))
      conn.commit(); cur.close(); conn.close()
      return jsonify(dict(payment)), 201

    @app.route('/payments/<int:debt_id>', methods=['GET'])
    def get_payments(debt_id):
      conn = get_db()
      cur = conn.cursor(cursor_factory=psycopg2.extras.RealDictCursor)
      cur.execute('SELECT * FROM payments WHERE debt_id = %s ORDER BY paid_at DESC', (debt_id,))
      payments = cur.fetchall()
      cur.close(); conn.close()
      return jsonify([dict(p) for p in payments])

    # ── Reports ──
    @app.route('/reports', methods=['GET'])
    def get_reports():
      conn = get_db()
      cur = conn.cursor(cursor_factory=psycopg2.extras.RealDictCursor)
      cur.execute('''
        SELECT
          COUNT(DISTINCT c.id) as total_customers,
          COUNT(d.id) as total_debts,
          COALESCE(SUM(d.total_amount), 0) as total_debt_amount,
          COALESCE(SUM(d.amount_paid), 0) as total_collected,
          COALESCE(SUM(d.total_amount - d.amount_paid), 0) as total_outstanding,
          COUNT(CASE WHEN d.status = 'paid' THEN 1 END) as paid_debts,
          COUNT(CASE WHEN d.status = 'unpaid' THEN 1 END) as unpaid_debts,
          COUNT(CASE WHEN d.due_date < NOW() AND d.status != 'paid' THEN 1 END) as overdue_debts
        FROM customers c
        LEFT JOIN debts d ON c.id = d.customer_id
      ''')
      report = cur.fetchone()
      cur.close(); conn.close()
      return jsonify(dict(report))

    # ── Reminders ──
    @app.route('/reminders', methods=['GET'])
    def get_reminders():
      conn = get_db()
      cur = conn.cursor(cursor_factory=psycopg2.extras.RealDictCursor)
      cur.execute('''
        SELECT d.*, c.name as customer_name, c.phone as customer_phone,
          (d.total_amount - d.amount_paid) as balance
        FROM debts d
        JOIN customers c ON d.customer_id = c.id
        WHERE d.status != 'paid'
        AND d.due_date <= NOW() + INTERVAL '7 days'
        ORDER BY d.due_date ASC
      ''')
      reminders = cur.fetchall()
      cur.close(); conn.close()
      return jsonify([dict(r) for r in reminders])

    if __name__ == '__main__':
      init_db()
      app.run(host='0.0.0.0', port=5000, debug=True)