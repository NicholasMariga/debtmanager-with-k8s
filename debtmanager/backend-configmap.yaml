apiVersion: v1
kind: ConfigMap
metadata:
  name: flask-app-config
  namespace: debtmanager
data:
  app.py: |
    from flask import Flask, jsonify, request, session
    from flask_cors import CORS
    import psycopg2
    import psycopg2.extras
    import os
    import hashlib
    import secrets
    from datetime import datetime

    app = Flask(__name__)
    app.secret_key = os.environ.get('SECRET_KEY', 'happywise-secret-key-2024')
    CORS(app, supports_credentials=True)

    def get_db():
      return psycopg2.connect(
        host=os.environ.get('POSTGRES_HOST'),
        database=os.environ.get('POSTGRES_DB'),
        user=os.environ.get('POSTGRES_USER'),
        password=os.environ.get('POSTGRES_PASSWORD')
      )

    def hash_password(password):
      return hashlib.sha256(password.encode()).hexdigest()

    def init_db():
      conn = get_db()
      cur = conn.cursor()
      cur.execute('''
        CREATE TABLE IF NOT EXISTS staff (
          id SERIAL PRIMARY KEY,
          name VARCHAR(100) NOT NULL,
          username VARCHAR(50) UNIQUE NOT NULL,
          password VARCHAR(255) NOT NULL,
          role VARCHAR(20) DEFAULT 'cashier',
          active BOOLEAN DEFAULT TRUE,
          created_at TIMESTAMP DEFAULT NOW()
        );
        CREATE TABLE IF NOT EXISTS customers (
          id SERIAL PRIMARY KEY,
          name VARCHAR(100) NOT NULL,
          phone VARCHAR(20),
          email VARCHAR(100),
          created_at TIMESTAMP DEFAULT NOW()
        );
        CREATE TABLE IF NOT EXISTS debts (
          id SERIAL PRIMARY KEY,
          customer_id INTEGER REFERENCES customers(id),
          description VARCHAR(255),
          total_amount DECIMAL(10,2) NOT NULL,
          amount_paid DECIMAL(10,2) DEFAULT 0,
          due_date DATE,
          status VARCHAR(20) DEFAULT 'unpaid',
          created_by INTEGER REFERENCES staff(id),
          created_at TIMESTAMP DEFAULT NOW()
        );
        CREATE TABLE IF NOT EXISTS payments (
          id SERIAL PRIMARY KEY,
          debt_id INTEGER REFERENCES debts(id),
          amount DECIMAL(10,2) NOT NULL,
          note VARCHAR(255),
          recorded_by INTEGER REFERENCES staff(id),
          paid_at TIMESTAMP DEFAULT NOW()
        );
      ''')
      # Create default owner account if not exists
      cur.execute("SELECT id FROM staff WHERE username = 'owner'")
      if not cur.fetchone():
        cur.execute(
          "INSERT INTO staff (name, username, password, role) VALUES (%s, %s, %s, %s)",
          ('Shop Owner', 'owner', hash_password('happywise2024'), 'owner')
        )
      conn.commit()
      cur.close()
      conn.close()

    def get_current_user():
      token = request.headers.get('Authorization', '').replace('Bearer ', '')
      if not token:
        return None
      conn = get_db()
      cur = conn.cursor(cursor_factory=psycopg2.extras.RealDictCursor)
      cur.execute("SELECT * FROM staff WHERE active = TRUE AND username = (SELECT username FROM staff WHERE password = %s LIMIT 1)", (token,))
      # Simpler token approach
      cur.close(); conn.close()
      return None

    def require_auth(roles=None):
      token = request.headers.get('Authorization', '').replace('Bearer ', '')
      if not token:
        return None
      conn = get_db()
      cur = conn.cursor(cursor_factory=psycopg2.extras.RealDictCursor)
      cur.execute("SELECT * FROM staff WHERE password = %s AND active = TRUE", (token,))
      user = cur.fetchone()
      cur.close(); conn.close()
      if not user:
        return None
      if roles and user['role'] not in roles:
        return None
      return dict(user)

    # ── Auth ──
    @app.route('/login', methods=['POST'])
    def login():
      data = request.json
      conn = get_db()
      cur = conn.cursor(cursor_factory=psycopg2.extras.RealDictCursor)
      cur.execute(
        "SELECT * FROM staff WHERE username = %s AND password = %s AND active = TRUE",
        (data['username'], hash_password(data['password']))
      )
      user = cur.fetchone()
      cur.close(); conn.close()
      if not user:
        return jsonify({"error": "Invalid credentials"}), 401
      # Use hashed password as token (simple approach)
      return jsonify({
        "token": user['password'],
        "user": {
          "id": user['id'],
          "name": user['name'],
          "username": user['username'],
          "role": user['role']
        }
      })

    @app.route('/me', methods=['GET'])
    def me():
      user = require_auth()
      if not user:
        return jsonify({"error": "Unauthorized"}), 401
      return jsonify(user)

    # ── Staff (Owner only) ──
    @app.route('/staff', methods=['GET'])
    def get_staff():
      user = require_auth(roles=['owner'])
      if not user:
        return jsonify({"error": "Unauthorized"}), 401
      conn = get_db()
      cur = conn.cursor(cursor_factory=psycopg2.extras.RealDictCursor)
      cur.execute("SELECT id, name, username, role, active, created_at FROM staff ORDER BY created_at DESC")
      staff = cur.fetchall()
      cur.close(); conn.close()
      return jsonify([dict(s) for s in staff])

    @app.route('/staff', methods=['POST'])
    def add_staff():
      user = require_auth(roles=['owner'])
      if not user:
        return jsonify({"error": "Unauthorized"}), 401
      data = request.json
      conn = get_db()
      cur = conn.cursor(cursor_factory=psycopg2.extras.RealDictCursor)
      try:
        cur.execute(
          "INSERT INTO staff (name, username, password, role) VALUES (%s, %s, %s, %s) RETURNING id, name, username, role",
          (data['name'], data['username'], hash_password(data['password']), data['role'])
        )
        staff = cur.fetchone()
        conn.commit()
      except Exception as e:
        return jsonify({"error": "Username already exists"}), 400
      finally:
        cur.close(); conn.close()
      return jsonify(dict(staff)), 201

    @app.route('/staff/<int:staff_id>', methods=['DELETE'])
    def delete_staff(staff_id):
      user = require_auth(roles=['owner'])
      if not user:
        return jsonify({"error": "Unauthorized"}), 401
      conn = get_db()
      cur = conn.cursor()
      cur.execute("UPDATE staff SET active = FALSE WHERE id = %s", (staff_id,))
      conn.commit(); cur.close(); conn.close()
      return jsonify({"message": "Staff deactivated"})

    # ── Health ──
    @app.route('/health')
    def health():
      return jsonify({"status": "healthy", "message": "Happywise Ent API running"})

    # ── Customers ──
    @app.route('/customers', methods=['GET'])
    def get_customers():
      user = require_auth()
      if not user: return jsonify({"error": "Unauthorized"}), 401
      conn = get_db()
      cur = conn.cursor(cursor_factory=psycopg2.extras.RealDictCursor)
      cur.execute('''
        SELECT c.*,
          COALESCE(SUM(d.total_amount - d.amount_paid), 0) as total_outstanding
        FROM customers c
        LEFT JOIN debts d ON c.id = d.customer_id AND d.status != 'paid'
        GROUP BY c.id ORDER BY c.name
      ''')
      customers = cur.fetchall()
      cur.close(); conn.close()
      return jsonify([dict(c) for c in customers])

