      XLSX.utils.book_append_sheet(wb,XLSX.utils.json_to_sheet(debts.map(d=>({Customer:d.customer_name,Description:d.description,'Date Taken':fmtDate(d.created_at),'Total (KES)':parseFloat(d.total_amount),'Paid (KES)':parseFloat(d.amount_paid),'Balance (KES)':parseFloat(d.balance),'Due Date':fmtDate(d.due_date),Status:d.status}))),'Debts');
