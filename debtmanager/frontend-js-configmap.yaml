          <div class="sum-card" style="background:#fffbeb;border:1px solid #fbbf24"><strong>${b30}</strong>debts 0-30 days<br>KES ${b30a}</div>
          <div class="sum-card" style="background:#fff7ed;border:1px solid #fb923c"><strong>${b60}</strong>debts 31-60 days<br>KES ${b60a}</div>
          <div class="sum-card" style="background:#fef2f2;border:1px solid #f87171"><strong>${b90}</strong>debts 60+ days<br>KES ${b90a}</div>
        </div>
        <table><thead><tr><th>Customer</th><th>Description</th><th>Date Taken</th><th>Balance (KES)</th><th>Days Outstanding</th><th>Aging Band</th></tr></thead>
        <tbody>${rows}</tbody></table>
        <script>window.print();<\/script></body></html>`);
