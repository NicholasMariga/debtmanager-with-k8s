    async function makePayment() {
      const debt_id=document.getElementById('pay-debt').value;
      const amount=document.getElementById('pay-amount').value;
      const note=document.getElementById('pay-note').value;
      if (!debt_id||!amount) return showAlert('alert-payment','Please fill all required fields','error');
      const debts = await fetch(API+'/debts',{headers:headers()}).then(r=>r.json());
      const debt = debts.find(d=>d.id==debt_id);
      const res = await fetch(API+'/payments',{method:'POST',headers:headers(),body:JSON.stringify({debt_id,amount,note})});
      const payment = await res.json();
      showAlert('alert-payment','Payment recorded!','success');
      document.getElementById('pay-amount').value='';
      if (debt) showReceipt(debt,parseFloat(amount),note,payment);
      loadDebtDropdowns();
    }

