    function shareReceiptWhatsApp() {
      if (!lastReceiptData) return;
      const {debt,amount,method,balance,now}=lastReceiptData;
      const msg=`HAPPYWISE ENT - Payment Receipt\n\nDate: ${now.toLocaleString('en-KE')}\nCustomer: ${debt.customer_name}\nItem: ${debt.description}\nAmount Paid: KES ${fmt(amount)}\nMethod: ${method}\nBalance Due: KES ${fmt(balance<0?0:balance)}\n\nThank you for your payment!\nHappywise Ent`;
      window.open(`https://wa.me/${fmtPhone(debt.customer_phone)}?text=${encodeURIComponent(msg)}`,'_blank');
    }

    // ── Reminders ──
    async function loadReminders() {
      renderMessageHistory();
      try {
        const reminders = await fetch(API+'/reminders',{headers:headers()}).then(r=>r.json());
        const el=document.getElementById('reminders-list');
        if (!reminders.length) {
          el.innerHTML=`<div style="text-align:center;padding:30px;color:#34d399"><i class="fa-solid fa-circle-check" style="font-size:2em;margin-bottom:10px;display:block"></i>No overdue debts! All customers are up to date.</div>`;
          return;
        }
        const byC={};
        reminders.forEach(r=>{if(!byC[r.customer_id])byC[r.customer_id]=r;});
        el.innerHTML=Object.values(byC).map(r=>`
          <div class="reminder-card">
            <div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:12px">
              <div style="flex:1;min-width:180px">
                <div style="font-weight:bold;color:#fbbf24;font-size:1em;margin-bottom:4px"><i class="fa-solid fa-user"></i> ${r.customer_name}</div>
                <div style="font-size:0.82em;color:#c4b5fd;margin-top:3px"><i class="fa-solid fa-phone"></i> ${r.customer_phone||'No phone'}</div>
                <div style="font-size:0.82em;color:#c4b5fd;margin-top:2px"><i class="fa-solid fa-triangle-exclamation"></i> Has overdue debts</div>
              </div>
              <div style="text-align:center;min-width:100px">
                <div style="font-size:0.75em;color:#c4b5fd">Balance Due</div>
                <div style="font-size:1.3em;font-weight:bold;color:#f87171">KES ${fmt(r.balance)}</div>
              </div>
              <div style="display:flex;flex-direction:column;gap:8px;min-width:170px">
                ${r.customer_phone?`
                  <button class="btn btn-whatsapp" style="width:100%;justify-content:center" onclick='openReminderModal(${JSON.stringify(r)})'>
                    <i class="fa-brands fa-whatsapp"></i> WhatsApp
                  </button>
                  <button class="btn btn-sms" style="width:100%;justify-content:center" onclick='openSmsOnly(${JSON.stringify(r)})'>
                    <i class="fa-solid fa-message"></i> SMS
                  </button>`
                :`<span style="color:#f87171;font-size:0.82em"><i class="fa-solid fa-circle-exclamation"></i> No phone number</span>`}
              </div>
            </div>
          </div>`).join('');
      } catch(e) { console.error('Reminders error:',e); }
