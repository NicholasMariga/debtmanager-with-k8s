    async function addStaff() {
      const name=document.getElementById('staff-name').value.trim();
      const username=document.getElementById('staff-username').value.trim();
      const password=document.getElementById('staff-password').value;
      const role=document.getElementById('staff-role').value;
      if (!name||!username||!password) return showAlert('alert-staff','Please fill all fields','error');
      const res=await fetch(API+'/staff',{method:'POST',headers:headers(),body:JSON.stringify({name,username,password,role})});
      const data=await res.json();
      if (!res.ok) return showAlert('alert-staff',data.error||'Error','error');
      showAlert('alert-staff','Staff added successfully!','success');
      ['staff-name','staff-username','staff-password'].forEach(id=>document.getElementById(id).value='');
      loadStaff();
    }

    async function toggleStaffActive(id, isActive) {
      const s = allStaffCache.find(x => x.id === id);
      const name = s ? s.name : 'this staff member';
      const action = isActive ? 'Deactivate' : 'Activate';
      if (!confirm(`${action} ${name}?\n\n${isActive ? 'They will immediately lose access to the system.' : 'They will regain access to the system.'}`)) return;
      await fetch(API+'/staff/'+id, {method:'PUT', headers:headers(), body:JSON.stringify({active: !isActive})});
      loadStaff();
    }

    function openResetPasswordModal(id) {
      const s = allStaffCache.find(x => x.id === id);
      currentResetStaffId = id;
      document.getElementById('reset-pwd-name').textContent = `Resetting password for: ${s ? s.name : 'staff member'}`;
      document.getElementById('reset-pwd-input').value = '';
      document.getElementById('reset-pwd-modal').classList.add('open');
    }

    async function saveResetPassword() {
      const pwd = document.getElementById('reset-pwd-input').value;
      if (!pwd) return;
      await fetch(API+'/staff/'+currentResetStaffId, {method:'PUT', headers:headers(), body:JSON.stringify({password: pwd})});
      closeModal('reset-pwd-modal');
      showAlert('alert-staff', 'Password reset successfully!', 'success');
    }

    function openChangeRoleModal(id) {
      const s = allStaffCache.find(x => x.id === id);
      currentChangeRoleStaffId = id;
      document.getElementById('change-role-name').textContent = s ? `${s.name} — current role: ${s.role}` : 'Staff member';
      document.getElementById('change-role-select').value = s ? s.role : 'cashier';
      document.getElementById('change-role-modal').classList.add('open');
    }

    async function saveRoleChange() {
      const role = document.getElementById('change-role-select').value;
      await fetch(API+'/staff/'+currentChangeRoleStaffId, {method:'PUT', headers:headers(), body:JSON.stringify({role})});
      closeModal('change-role-modal');
      showAlert('alert-staff', 'Role updated successfully!', 'success');
      loadStaff();
    }

    // ── Audit Log ──
    async function loadAuditLog() {
      if (currentUser.role === 'owner') {
        const staffSel = document.getElementById('audit-filter-staff');
        if (staffSel && staffSel.children.length <= 1) {
          const staff = await fetch(API+'/staff', {headers:headers()}).then(r=>r.json()).catch(()=>[]);
          if (Array.isArray(staff) && staff.length) {
            staffSel.innerHTML = '<option value="">All Staff</option>' + staff.filter(s=>s.active).map(s=>`<option value="${s.id}">${s.name}</option>`).join('');
          }
        }
      }
      const action = document.getElementById('audit-filter-action').value;
      const staffId = currentUser.role === 'owner' ? document.getElementById('audit-filter-staff').value : '';
      const from = document.getElementById('audit-filter-from').value;
      const to = document.getElementById('audit-filter-to').value;
      const params = new URLSearchParams();
      if (action) params.append('action', action);
      if (staffId) params.append('staff_id', staffId);
      if (from) params.append('date_from', from);
      if (to) params.append('date_to', to);
      const logs = await fetch(API+'/audit?'+params.toString(), {headers:headers()}).then(r=>r.json()).catch(()=>[]);
      renderAuditLog(logs);
    }

    function renderAuditLog(logs) {
      const count = document.getElementById('audit-count');
      if (count) count.textContent = logs.length ? `(${logs.length} records)` : '';
      const tbody = document.getElementById('audit-table');
      if (!logs.length) {
        tbody.innerHTML = '<tr><td colspan="4" style="color:#c4b5fd;text-align:center">No audit records found</td></tr>';
        return;
      }
      const actionMeta = {
        login:               {label:'Login',                color:'#60a5fa'},
        debt_added:          {label:'Debt Added',           color:'#34d399'},
        debt_edited:         {label:'Debt Edited',          color:'#fbbf24'},
        payment_recorded:    {label:'Payment Recorded',     color:'#34d399'},
        writeoff_added:      {label:'Write-off Added',      color:'#9ca3af'},
        writeoff_undone:     {label:'Write-off Undone',     color:'#fb923c'},
        customer_archived:   {label:'Customer Archived',    color:'#f87171'},
        customer_restored:   {label:'Customer Restored',    color:'#a78bfa'},
        credit_limit_changed:{label:'Credit Limit Changed', color:'#fbbf24'},
        staff_deactivated:   {label:'Staff Deactivated',   color:'#f87171'},
        staff_activated:     {label:'Staff Activated',     color:'#34d399'},
        staff_password_reset:{label:'Password Reset',      color:'#60a5fa'},
        staff_role_changed:  {label:'Role Changed',        color:'#a78bfa'}
      };
      tbody.innerHTML = logs.map(l => {
        const meta = actionMeta[l.action] || {label: l.action, color: '#c4b5fd'};
        const det = l.details ? Object.entries(l.details).filter(([k,v])=>v!==null&&v!==undefined).map(([k,v])=>`${k.replace(/_/g,' ')}: ${typeof v==='number'&&k.includes('amount')?'KES '+fmt(v):v}`).join(' | ') : '-';
        return `<tr>
          <td style="font-size:0.82em;white-space:nowrap;color:#9ca3af">${fmtDateTime(l.performed_at)}</td>
          <td><span class="badge" style="background:rgba(100,100,100,0.2);color:${meta.color};white-space:nowrap">${meta.label}</span></td>
          <td style="font-size:0.82em;color:#c4b5fd;max-width:280px">${det}</td>
          <td style="font-size:0.85em">${l.staff_name||'-'}</td>
        </tr>`;
      }).join('');
    }

    // ── Creditors ──
    const CREDITOR_TYPE_BADGE = {
      supplier:  {label:'Supplier',   color:'#60a5fa'},
      wholesaler:{label:'Wholesaler', color:'#a78bfa'},
      delivery:  {label:'Delivery',   color:'#fb923c'},
      internal:  {label:'Internal',   color:'#34d399'}
    };

    async function loadCreditors() {
      const tbody = document.getElementById('creditors-table');
      tbody.innerHTML = '<tr><td colspan="7" style="text-align:center;color:#6b7280">Loading...</td></tr>';
      try {
        const creditors = await fetch(API+'/creditors',{headers:headers()}).then(r=>r.json());
        if (!creditors.length) {
          tbody.innerHTML = '<tr><td colspan="7" style="text-align:center;color:#6b7280">No creditors yet. Add your first creditor.</td></tr>';
          return;
        }
        tbody.innerHTML = creditors.map(c => {
          const tb = CREDITOR_TYPE_BADGE[c.type] || {label:c.type, color:'#c4b5fd'};
          const hasBalance = parseFloat(c.balance) > 0;
          return `<tr>
            <td><strong>${c.name}</strong></td>
            <td><span class="badge" style="background:rgba(100,100,100,0.2);color:${tb.color}">${tb.label}</span></td>
            <td style="color:#9ca3af">${c.phone||'-'}</td>
            <td style="color:#c4b5fd">KES ${fmt(c.total_owed)}</td>
            <td style="color:#34d399">KES ${fmt(c.total_paid)}</td>
            <td style="color:${hasBalance?'#f87171':'#34d399'};font-weight:bold">KES ${fmt(c.balance)}</td>
            <td class="action-btns">
              <button class="btn btn-sm" onclick="openCreditorModal(${JSON.stringify(c)})"><i class="fa-solid fa-pen"></i> Edit</button>
              ${!hasBalance ? `<button class="btn btn-sm btn-red" onclick="deleteCreditor(${c.id},'${c.name}')"><i class="fa-solid fa-trash"></i></button>` : ''}
            </td>
          </tr>`;
        }).join('');
      } catch(e) { tbody.innerHTML = `<tr><td colspan="7" style="color:#f87171">${e.message}</td></tr>`; }
    }

    function openCreditorModal(c) {
      document.getElementById('creditor-id').value = c ? c.id : '';
      document.getElementById('creditor-modal-title').textContent = c ? 'Edit Creditor' : 'Add Creditor';
      document.getElementById('creditor-name').value = c ? c.name : '';
      document.getElementById('creditor-type').value = c ? c.type : 'supplier';
      document.getElementById('creditor-phone').value = c ? (c.phone||'') : '';
      document.getElementById('creditor-email').value = c ? (c.email||'') : '';
      document.getElementById('creditor-notes').value = c ? (c.notes||'') : '';
      openModal('creditor-modal');
    }

    async function saveCreditor() {
      const id = document.getElementById('creditor-id').value;
      const payload = {
        name:  document.getElementById('creditor-name').value.trim(),
        type:  document.getElementById('creditor-type').value,
        phone: document.getElementById('creditor-phone').value.trim() || null,
        email: document.getElementById('creditor-email').value.trim() || null,
        notes: document.getElementById('creditor-notes').value.trim() || null
      };
      if (!payload.name) { alert('Name is required'); return; }
      const url  = id ? `${API}/creditors/${id}` : `${API}/creditors`;
      const method = id ? 'PATCH' : 'POST';
      try {
        const resp = await fetch(url, {method, headers: headers(), body: JSON.stringify(payload)});
        const data = await resp.json();
        if (data.error) throw new Error(data.error);
        closeModal('creditor-modal');
        loadCreditors();
      } catch(e) { alert('Error: ' + e.message); }
    }

    async function deleteCreditor(id, name) {
      if (!confirm(`Delete creditor "${name}"?`)) return;
      try {
        const resp = await fetch(`${API}/creditors/${id}`, {method:'DELETE', headers:headers()});
        const data = await resp.json();
        if (data.error) throw new Error(data.error);
        loadCreditors();
      } catch(e) { alert('Error: ' + e.message); }
    }

    // ── Payables ──
    let allPayables = [];
    let payablesFilter = 'all';

    const STATUS_BADGE = {
      unpaid:  {label:'Unpaid',  color:'#f87171', bg:'rgba(248,113,113,0.15)'},
      partial: {label:'Partial', color:'#fbbf24', bg:'rgba(251,191,36,0.15)'},
      paid:    {label:'Paid',    color:'#34d399', bg:'rgba(52,211,153,0.15)'}
    };

    async function loadPayables() {
      const tbody = document.getElementById('payables-table');
      tbody.innerHTML = '<tr><td colspan="10" style="text-align:center;color:#6b7280">Loading...</td></tr>';
      try {
        allPayables = await fetch(API+'/payables',{headers:headers()}).then(r=>r.json());
        renderPayables();
      } catch(e) { tbody.innerHTML = `<tr><td colspan="10" style="color:#f87171">${e.message}</td></tr>`; }
    }

    function filterPayables(status) {
      payablesFilter = status;
      ['all','unpaid','partial','paid'].forEach(s => {
        document.getElementById('pf-'+s).classList.toggle('active', s===status);
      });
      renderPayables();
    }

    function renderPayables() {
      const tbody = document.getElementById('payables-table');
      const rows = payablesFilter === 'all' ? allPayables : allPayables.filter(p => p.status === payablesFilter);
      if (!rows.length) {
        tbody.innerHTML = `<tr><td colspan="10" style="text-align:center;color:#6b7280">No payables${payablesFilter!=='all'?' with status: '+payablesFilter:''}.</td></tr>`;
        return;
      }
      tbody.innerHTML = rows.map(p => {
        const tb  = CREDITOR_TYPE_BADGE[p.creditor_type] || {label:p.creditor_type, color:'#c4b5fd'};
        const sb  = STATUS_BADGE[p.status] || {label:p.status, color:'#c4b5fd', bg:'rgba(100,100,100,0.2)'};
        const bal = parseFloat(p.balance||0);
        const due = p.due_date ? p.due_date.slice(0,10) : '-';
        const overdue = p.due_date && new Date(p.due_date) < new Date() && p.status !== 'paid';
        return `<tr${p.status==='paid' ? ' style="opacity:0.6"' : ''}>
          <td><strong>${p.creditor_name}</strong></td>
          <td><span class="badge" style="background:rgba(100,100,100,0.2);color:${tb.color}">${tb.label}</span></td>
          <td>${p.description}</td>
          <td style="color:#c4b5fd">KES ${fmt(p.total_amount)}</td>
          <td style="color:#34d399">KES ${fmt(p.amount_paid)}</td>
          <td style="color:${bal>0?'#f87171':'#34d399'};font-weight:bold">KES ${fmt(bal)}</td>
          <td style="color:${overdue?'#f87171':'#9ca3af'}">${due}${overdue?' <i class="fa-solid fa-circle-exclamation"></i>':''}</td>
          <td><span class="badge" style="background:${sb.bg};color:${sb.color}">${sb.label}</span></td>
          <td style="font-size:0.82em;color:#9ca3af">${p.created_by_name||'-'}</td>
          <td class="action-btns">
            ${p.status!=='paid'?`<button class="btn btn-sm btn-green" onclick="openPayablePaymentModal(${JSON.stringify(p)})"><i class="fa-solid fa-money-bill-wave"></i> Pay</button>`:''}
            ${p.status!=='paid'?`<button class="btn btn-sm" onclick="openPayableModal(${JSON.stringify(p)})"><i class="fa-solid fa-pen"></i></button>`:''}
            <button class="btn btn-sm" style="background:rgba(255,255,255,0.06)" onclick="viewPaymentHistory(${p.id},'${p.description.replace(/'/g,"\\'")}')"><i class="fa-solid fa-clock-rotate-left"></i></button>
          </td>
        </tr>`;
      }).join('');
    }

    async function loadCreditorDropdown() {
      const sel = document.getElementById('payable-creditor');
      const creditors = await fetch(API+'/creditors',{headers:headers()}).then(r=>r.json());
      sel.innerHTML = creditors.map(c=>`<option value="${c.id}">${c.name}</option>`).join('');
    }

    async function openPayableModal(p) {
      await loadCreditorDropdown();
      document.getElementById('payable-id').value = p ? p.id : '';
      document.getElementById('payable-modal-title').textContent = p ? 'Edit Payable' : 'Add Payable';
      document.getElementById('payable-creditor').value = p ? p.creditor_id : '';
      document.getElementById('payable-desc').value = p ? p.description : '';
      document.getElementById('payable-amount').value = p ? p.total_amount : '';
      document.getElementById('payable-due').value = p && p.due_date ? p.due_date.slice(0,10) : '';
      openModal('payable-modal');
    }

    async function savePayable() {
      const id = document.getElementById('payable-id').value;
      const payload = {
        creditor_id:  parseInt(document.getElementById('payable-creditor').value),
        description:  document.getElementById('payable-desc').value.trim(),
        total_amount: parseFloat(document.getElementById('payable-amount').value),
        due_date:     document.getElementById('payable-due').value || null
      };
      if (!payload.description || !payload.total_amount) { alert('Description and amount are required'); return; }
      const url    = id ? `${API}/payables/${id}` : `${API}/payables`;
      const method = id ? 'PATCH' : 'POST';
      try {
        const resp = await fetch(url, {method, headers:headers(), body:JSON.stringify(payload)});
        const data = await resp.json();
        if (data.error) throw new Error(data.error);
        closeModal('payable-modal');
        loadPayables();
      } catch(e) { alert('Error: ' + e.message); }
    }

    // ── Payable Payments ──
    function openPayablePaymentModal(p) {
      document.getElementById('pay-payable-id').value = p.id;
      document.getElementById('pay-payable-info').textContent = p.creditor_name + ' - ' + p.description;
      document.getElementById('pay-total').textContent   = 'KES ' + fmt(p.total_amount);
      document.getElementById('pay-paid').textContent    = 'KES ' + fmt(p.amount_paid);
      document.getElementById('pay-balance').textContent = 'KES ' + fmt(p.balance);
      document.getElementById('pay-amount').value = '';
      document.getElementById('pay-amount').max   = parseFloat(p.balance);
      document.getElementById('pay-note').value   = '';
      openModal('payable-pay-modal');
    }

    async function savePayablePayment() {
      const pid    = document.getElementById('pay-payable-id').value;
      const amount = parseFloat(document.getElementById('pay-amount').value);
      const note   = document.getElementById('pay-note').value.trim();
      if (!amount || amount <= 0) { alert('Enter a valid amount'); return; }
      try {
        const resp = await fetch(API+'/payable-payments', {
          method: 'POST',
          headers: headers(),
          body: JSON.stringify({payable_id: parseInt(pid), amount, note: note||null})
        });
        const data = await resp.json();
        if (data.error) throw new Error(data.error);
        closeModal('payable-pay-modal');
        loadPayables();
        loadCreditors();
      } catch(e) { alert('Error: ' + e.message); }
    }

    async function viewPaymentHistory(payableId, description) {
      document.getElementById('history-modal-title').innerHTML =
        '<i class="fa-solid fa-clock-rotate-left"></i> Payment History: ' + description;
      const el = document.getElementById('payable-history-list');
      el.innerHTML = '<p style="color:#6b7280;text-align:center">Loading...</p>';
      openModal('payable-history-modal');
      try {
        const payments = await fetch(API+'/payable-payments/'+payableId, {headers:headers()}).then(r=>r.json());
        if (!payments.length) {
          el.innerHTML = '<p style="color:#6b7280;text-align:center">No payments recorded yet.</p>';
          return;
        }
        el.innerHTML = '<table style="width:100%;font-size:0.85em"><thead><tr><th>Date</th><th>Amount (KES)</th><th>Method</th><th>Paid By</th></tr></thead><tbody>' +
          payments.map(p => `<tr>
            <td style="color:#9ca3af;white-space:nowrap">${fmtDateTime(p.paid_at)}</td>
            <td style="color:#34d399;font-weight:bold">KES ${fmt(p.amount)}</td>
            <td style="color:#c4b5fd">${p.note||'-'}</td>
            <td>${p.paid_by_name||'-'}</td>
          </tr>`).join('') +
          '</tbody></table>';
      } catch(e) { el.innerHTML = `<p style="color:#f87171">${e.message}</p>`; }
    }
