    async function loadStatementDropdown() {
      const c=await fetch(API+'/customers',{headers:headers()}).then(r=>r.json());
      document.getElementById('statement-customer').innerHTML='<option value="">Select customer to view statement</option>'+c.map(x=>`<option value="${x.id}">${x.name}</option>`).join('');
