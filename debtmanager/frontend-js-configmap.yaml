    async function loadReminders() {
      renderMessageHistory();
      try {
        const [reminders, debts] = await Promise.all([
          fetch(API+'/reminders',{headers:headers()}).then(r=>r.json()),
          fetch(API+'/debts',{headers:headers()}).then(r=>r.json())
        ]);
        const activeReminders = reminders; // write-offs already excluded by backend
        const el=document.getElementById('reminders-list');
        if (!activeReminders.length) {
          el.innerHTML=`<div style="text-align:center;padding:30px;color:#34d399"><i class="fa-solid fa-circle-check" style="font-size:2em;margin-bottom:10px;display:block"></i>No overdue debts! All customers are up to date.</div>`;
          return;
        }
        const byC={};
        activeReminders.forEach(r=>{
          if(!byC[r.customer_id]) byC[r.customer_id]={...r, balance:0};
          byC[r.customer_id].balance += parseFloat(r.balance);
        });
        // Split: never paid vs overdue (has paid something before)
        const groups = Object.values(byC).map(r => {
          const cDebts = debts.filter(d => d.customer_id===r.customer_id && !d.writeoff_reason);
          return {...r, everPaid: cDebts.some(d => parseFloat(d.amount_paid) > 0)};
        });
        const neverPaid = groups.filter(r => !r.everPaid);
        const overdue   = groups.filter(r => r.everPaid);
        let html = '';
        if (neverPaid.length) {
          html += `<div style="display:flex;align-items:center;gap:8px;margin:10px 0 8px;color:#f87171;font-size:0.82em;font-weight:bold">
            <i class="fa-solid fa-circle-xmark"></i> NEVER PAID (${neverPaid.length}) - Needs urgent attention
          </div>`;
          html += neverPaid.map(buildReminderCard).join('');
        }
        if (overdue.length) {
          html += `<div style="display:flex;align-items:center;gap:8px;margin:${neverPaid.length?'18px':''} 0 8px;color:#fbbf24;font-size:0.82em;font-weight:bold">
            <i class="fa-solid fa-triangle-exclamation"></i> OVERDUE (${overdue.length}) - Has payment history
          </div>`;
          html += overdue.map(buildReminderCard).join('');
        }
        el.innerHTML = html;
      } catch(e) { console.error('Reminders error:',e); }
    }

    // ── Full Backup ──
    async function exportFullBackup() {
      const sel = {
        customers: document.getElementById('bk-customers').checked,
        debts:     document.getElementById('bk-debts').checked,
        payments:  document.getElementById('bk-payments').checked,
        writeoffs: document.getElementById('bk-writeoffs').checked,
        staff:     document.getElementById('bk-staff').checked,
        audit:     document.getElementById('bk-audit').checked
      };
      if (!Object.values(sel).some(Boolean)) {
        document.getElementById('backup-status').style.color = '#f87171';
        document.getElementById('backup-status').textContent = 'Select at least one data type to export.';
        return;
      }
      const btn = document.getElementById('backup-btn');
      const status = document.getElementById('backup-status');
      btn.disabled = true;
      btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Exporting...';
      status.textContent = '';
      try {
        const resp = await fetch(API + '/export', { headers: headers() });
        if (!resp.ok) throw new Error('Server error ' + resp.status);
        const data = await resp.json();
        if (data.error) throw new Error(data.error);
        const wb = XLSX.utils.book_new();
        const counts = [];
        if (sel.customers) {
          const arr = Array.isArray(data.customers) ? data.customers : [];
          const custRows = arr.map(c => ({'ID':c.id,'Name':c.name,'Phone':c.phone||'','Email':c.email||'','Credit Limit (KES)':c.credit_limit||'','Archived':c.archived?'Yes':'No','Note':c.note||'','Created At':c.created_at}));
          XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(custRows.length?custRows:[{'No Data':''}]), 'Customers');
          counts.push('customers:'+arr.length);
        }
        if (sel.debts) {
          const arr = Array.isArray(data.debts) ? data.debts : [];
          const debtRows = arr.map(d => ({'ID':d.id,'Customer':d.customer_name,'Phone':d.customer_phone||'','Description':d.description,'Category':d.category||'','Total (KES)':d.total_amount,'Paid (KES)':d.amount_paid,'Balance (KES)':d.balance,'Status':d.status,'Date Taken':d.debt_date||d.created_at,'Due Date':d.due_date||'','Notes':d.notes||'','Write-off Reason':d.writeoff_reason||'','Write-off Amount':d.writeoff_amount||'','Recorded By':d.created_by_name||'','Created At':d.created_at}));
          XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(debtRows.length?debtRows:[{'No Data':''}]), 'Debts');
          counts.push('debts:'+arr.length);
        }
        if (sel.payments) {
          const arr = Array.isArray(data.payments) ? data.payments : [];
          const payRows = arr.map(p => ({'ID':p.id,'Customer':p.customer_name,'Debt Description':p.debt_description,'Amount (KES)':p.amount,'Method':p.note||'','Recorded By':p.recorded_by_name||'','Paid At':p.paid_at}));
          XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(payRows.length?payRows:[{'No Data':''}]), 'Payments');
          counts.push('payments:'+arr.length);
        }
        if (sel.writeoffs) {
          const arr = Array.isArray(data.writeoffs) ? data.writeoffs : [];
          const woRows = arr.map(w => ({'ID':w.id,'Customer':w.customer_name,'Debt Description':w.debt_description,'Reason':w.reason,'Amount Written Off (KES)':w.amount||'Full','Written Off By':w.written_off_by_name||'','Written Off At':w.written_off_at}));
          XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(woRows.length?woRows:[{'No Data':''}]), 'Write-offs');
          counts.push('writeoffs:'+arr.length);
        }
        if (sel.staff) {
          const arr = Array.isArray(data.staff) ? data.staff : [];
          const staffRows = arr.map(s => ({'ID':s.id,'Name':s.name,'Username':s.username,'Role':s.role,'Active':s.active?'Yes':'No','Joined':s.created_at}));
          XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(staffRows.length?staffRows:[{'No Data':''}]), 'Staff');
          counts.push('staff:'+arr.length);
        }
        if (sel.audit) {
          const arr = Array.isArray(data.audit_logs) ? data.audit_logs : [];
          const auditRows = arr.map(l => ({'ID':l.id,'Action':l.action,'Entity Type':l.entity_type||'','Details':l.details?JSON.stringify(l.details):'','Performed By':l.staff_name||'','Performed At':l.performed_at}));
          XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(auditRows.length?auditRows:[{'No Data':''}]), 'Audit Log');
          counts.push('audit:'+arr.length);
        }
        // Payables module — always appended when data exists
        const crArr = Array.isArray(data.creditors) ? data.creditors : [];
        if (crArr.length) {
          const crRows = crArr.map(c => ({'ID':c.id,'Name':c.name,'Type':c.type||'supplier','Phone':c.phone||'','Email':c.email||'','Notes':c.notes||'','Created At':c.created_at}));
          XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(crRows), 'Creditors');
          counts.push('creditors:'+crArr.length);
        }
        const pvArr = Array.isArray(data.payables) ? data.payables : [];
        if (pvArr.length) {
          const pvRows = pvArr.map(p => ({'ID':p.id,'Creditor':p.creditor_name,'Description':p.description,'Total (KES)':p.total_amount,'Paid (KES)':p.amount_paid,'Balance (KES)':p.balance,'Status':p.status,'Due Date':p.due_date||'','Created By':p.created_by_name||'','Created At':p.created_at}));
          XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(pvRows), 'Payables');
          counts.push('payables:'+pvArr.length);
        }
        const ppArr = Array.isArray(data.payable_payments) ? data.payable_payments : [];
        if (ppArr.length) {
          const ppRows = ppArr.map(p => ({'ID':p.id,'Creditor':p.creditor_name,'Payable Description':p.payable_description,'Amount (KES)':p.amount,'Note':p.note||'','Paid By':p.paid_by_name||'','Paid At':p.paid_at}));
          XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(ppRows), 'Payable Payments');
          counts.push('payable-pmts:'+ppArr.length);
        }
        const ts = new Date().toISOString().slice(0,10);
        const selectedNames = Object.entries(sel).filter(([,v])=>v).map(([k])=>k);
        const filePart = selectedNames.length === 6 ? 'full'
                       : selectedNames.length <= 3 ? selectedNames.join('-')
                       : selectedNames.slice(0,2).join('-')+'-more';
        XLSX.writeFile(wb, 'happywise-backup-'+filePart+'-'+ts+'.xlsx');
        status.style.color = '#34d399';
        status.textContent = 'Saved: ' + counts.join(', ');
      } catch(e) {
        status.style.color = '#f87171';
        status.textContent = 'Export failed: ' + e.message;
      }
      btn.disabled = false;
      btn.innerHTML = '<i class="fa-solid fa-download"></i> Download Backup (.xlsx)';
    }

    // ── Import from Backup ──
    async function importFromBackup() {
      const fileInput = document.getElementById('import-file');
      const status = document.getElementById('import-status');
      const btn = document.getElementById('import-btn');
      if (!fileInput.files[0]) {
        status.style.color = '#f87171';
        status.textContent = 'Choose an Excel backup file first.';
        return;
      }
      btn.disabled = true;
      btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Importing...';
      status.style.color = '#6b7280';
      status.textContent = 'Reading file...';
      try {
        const ab = await fileInput.files[0].arrayBuffer();
        const wb = XLSX.read(new Uint8Array(ab), {type: 'array'});
        const toRows = (name) => {
          const ws = wb.Sheets[name];
          if (!ws) return [];
          return XLSX.utils.sheet_to_json(ws, {defval: ''}).filter(r => r['ID'] !== '' && r['ID'] !== undefined && r['ID'] !== 'No Data');
        };
        const payload = {
          customers:        toRows('Customers'),
          debts:            toRows('Debts'),
          payments:         toRows('Payments'),
          writeoffs:        toRows('Write-offs'),
          staff:            toRows('Staff'),
          creditors:        toRows('Creditors'),
          payables:         toRows('Payables'),
          payable_payments: toRows('Payable Payments')
        };
        status.textContent = 'Uploading to server...';
        const resp = await fetch(API + '/import', {
          method: 'POST',
          headers: headers(),
          body: JSON.stringify(payload)
        });
        if (!resp.ok) throw new Error('Server error ' + resp.status);
        const result = await resp.json();
        if (result.error) throw new Error(result.error);
        const s = result.imported;
        status.style.color = '#34d399';
        status.textContent = 'Imported - customers:' + s.customers + ', debts:' + s.debts +
          ', payments:' + s.payments + ', writeoffs:' + s.writeoffs + ', staff:' + s.staff +
          ', creditors:' + (s.creditors||0) + ', payables:' + (s.payables||0) +
          ', payable-pmts:' + (s.payable_payments||0) +
          (result.warning ? '  Note: ' + result.warning : '');
      } catch(e) {
        status.style.color = '#f87171';
        status.textContent = 'Import failed: ' + e.message;
      }
      btn.disabled = false;
      btn.innerHTML = '<i class="fa-solid fa-file-import"></i> Import';
    }

    // ── Reports ──
    async function loadReports() {
      const [rep, debts, paySum, payables] = await Promise.all([
        fetch(API+'/reports',{headers:headers()}).then(r=>r.json()),
        fetch(API+'/debts',{headers:headers()}).then(r=>r.json()),
        fetch(API+'/payables/summary',{headers:headers()}).then(r=>r.json()).catch(()=>({by_type:[],totals:{total_balance:0,total_overdue:0}})),
        fetch(API+'/payables',{headers:headers()}).then(r=>r.json()).catch(()=>[])
      ]);
      const woDebts = debts.filter(d => !!d.writeoff_reason);
      const woBalance = woDebts.reduce((s,d)=>s+parseFloat(d.balance),0);
      const woCount = woDebts.length;
      const adjOutstanding = Math.max(0, parseFloat(rep.total_outstanding||0) - woBalance);
      const adjUnpaid = Math.max(0, (rep.unpaid_debts||0) - woCount);
      const totalIssued = parseFloat(rep.total_debt_amount||0);
      const totalCollected = parseFloat(rep.total_collected||0);
      const collRate = totalIssued > 0 ? ((totalCollected / totalIssued) * 100).toFixed(1) : '0.0';
      document.getElementById('rep-total').textContent=fmt(rep.total_debt_amount);
      document.getElementById('rep-collected').textContent=fmt(rep.total_collected);
      document.getElementById('rep-outstanding').textContent=fmt(adjOutstanding);
      document.getElementById('rep-paid').textContent=rep.paid_debts;
      document.getElementById('rep-unpaid').textContent=adjUnpaid;
      document.getElementById('rep-overdue').textContent=rep.overdue_debts;
      document.getElementById('rep-writeoff').textContent=fmt(woBalance);
      document.getElementById('rep-collrate').textContent=collRate+'%';

      // Net Position
      const netPayable = parseFloat(paySum.totals?.total_balance||0);
      const netReceivable = adjOutstanding;
      const netResult = netReceivable - netPayable;
      document.getElementById('net-receivable').textContent='KES '+fmt(netReceivable);
      document.getElementById('net-payable').textContent='KES '+fmt(netPayable);
      const netEl=document.getElementById('net-result');
      const netCard=document.getElementById('net-result-card');
      netEl.textContent='KES '+fmt(Math.abs(netResult));
      if (netResult>=0) { netEl.style.color='#34d399'; if(netCard){netCard.style.background='rgba(52,211,153,0.08)';netCard.style.borderColor='rgba(52,211,153,0.2)';} }
      else { netEl.style.color='#f87171'; if(netCard){netCard.style.background='rgba(248,113,113,0.08)';netCard.style.borderColor='rgba(248,113,113,0.2)';} }

      // Overdue Payables
      const today=new Date(); today.setHours(0,0,0,0);
      const overdue=Array.isArray(payables)?payables.filter(p=>p.status!=='paid'&&p.due_date&&new Date(p.due_date)<today):[];
      overdue.sort((a,b)=>new Date(a.due_date)-new Date(b.due_date));
      const overdueCountEl=document.getElementById('overdue-payables-count');
      const overdueListEl=document.getElementById('overdue-payables-list');
      if(overdueCountEl) overdueCountEl.textContent=overdue.length?'('+overdue.length+')':'';
      if(overdueListEl){
        if(!overdue.length){overdueListEl.innerHTML='<p style="color:#94a3b8;text-align:center;padding:16px">No overdue payables - all clear!</p>';}
        else{
          overdueListEl.innerHTML='<table class="data-table"><thead><tr><th>Creditor</th><th>Description</th><th>Balance (KES)</th><th>Due Date</th><th>Days Overdue</th></tr></thead><tbody>'+
            overdue.map(p=>{
              const due=new Date(p.due_date);
              const days=Math.floor((today-due)/(1000*60*60*24));
              const bal=parseFloat(p.total_amount)-parseFloat(p.amount_paid);
              return '<tr><td>'+(p.creditor_name||'-')+'</td><td>'+p.description+'</td><td style="color:#f87171">'+fmt(bal)+'</td><td>'+fmtDate(p.due_date)+'</td><td style="color:#f87171;font-weight:bold">'+days+'d</td></tr>';
            }).join('')+
          '</tbody></table>';
        }
      }

      // Monthly trend chart — last 6 months
      const months = [];
      for (let i=5; i>=0; i--) {
        const d = new Date(); d.setDate(1); d.setMonth(d.getMonth()-i);
        months.push({label:d.toLocaleDateString('en-KE',{month:'short',year:'numeric'}), year:d.getFullYear(), month:d.getMonth()});
      }
      const activeDebtsR = debts.filter(d=>!d.writeoff_reason);
      const mIssued = months.map(m => activeDebtsR.filter(d=>{ const dt=new Date(d.created_at); return dt.getFullYear()===m.year&&dt.getMonth()===m.month; }).reduce((s,d)=>s+parseFloat(d.total_amount),0));
      const mCollected = months.map(m => activeDebtsR.filter(d=>{ const dt=new Date(d.created_at); return dt.getFullYear()===m.year&&dt.getMonth()===m.month; }).reduce((s,d)=>s+parseFloat(d.amount_paid),0));
      const trendCtx = document.getElementById('trendChart').getContext('2d');
      if (trendChartInstance) trendChartInstance.destroy();
      trendChartInstance = new Chart(trendCtx, {
        type:'line',
        data:{
          labels:months.map(m=>m.label),
          datasets:[
            {label:'Issued (KES)',data:mIssued,borderColor:'#a78bfa',backgroundColor:'rgba(167,139,250,0.1)',tension:0.4,pointBackgroundColor:'#a78bfa',borderWidth:2},
            {label:'Collected (KES)',data:mCollected,borderColor:'#34d399',backgroundColor:'rgba(52,211,153,0.1)',tension:0.4,pointBackgroundColor:'#34d399',borderWidth:2}
          ]
        },
        options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{position:'bottom',labels:{color:'#c4b5fd',font:{size:11},padding:12,boxWidth:12}},tooltip:{callbacks:{label:ctx=>'KES '+ctx.parsed.y.toLocaleString('en-KE',{minimumFractionDigits:2})}}},scales:{x:{ticks:{color:'#c4b5fd',font:{size:11}},grid:{color:'rgba(255,255,255,0.05)'}},y:{ticks:{color:'#c4b5fd',font:{size:11},callback:val=>'KES '+val.toLocaleString()},grid:{color:'rgba(255,255,255,0.05)'}}}}
      });
    }

