    async function loadStatement() {
      const customerId=document.getElementById('statement-customer').value;
      if (!customerId){document.getElementById('statement-content').innerHTML='';return;}
      const [debts,customers]=await Promise.all([
        fetch(API+'/debts',{headers:headers()}).then(r=>r.json()),
        fetch(API+'/customers',{headers:headers()}).then(r=>r.json())
      ]);
      const customer=customers.find(c=>c.id==customerId);
      const cDebts=debts.filter(d=>d.customer_id==customerId);
      let rows='',tDebt=0,tPaid=0;
      for (const d of cDebts) {
        tDebt+=parseFloat(d.total_amount); tPaid+=parseFloat(d.amount_paid);
        rows+=`<tr><td>${fmtDate(d.created_at)}</td><td>${d.description}</td><td>${fmt(d.total_amount)}</td><td style="color:#34d399">${fmt(d.amount_paid)}</td><td style="color:${parseFloat(d.balance)>0?'#f87171':'#34d399'}">${fmt(d.balance)}</td><td>${fmtDate(d.due_date)}</td><td>${statusBadge(d)}</td></tr>`;
        if (parseFloat(d.amount_paid)>0) {
          const pmts=await fetch(API+'/payments/'+d.id,{headers:headers()}).then(r=>r.json());
          pmts.forEach(p=>{rows+=`<tr style="background:rgba(52,211,153,0.03)"><td style="color:#34d399;font-size:.82em">${fmtDate(p.paid_at)}</td><td style="color:#34d399;font-size:.82em"><i class="fa-solid fa-arrow-right"></i> Payment via ${p.note||'N/A'}</td><td>-</td><td style="color:#34d399">KES ${fmt(p.amount)}</td><td>-</td><td>-</td><td>-</td></tr>`;});
        }
      }
      document.getElementById('statement-content').innerHTML=`
        <div class="statement-header">
          <div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:10px">
            <div><div style="font-size:1.1em;font-weight:bold">${customer?customer.name:'Customer'}</div><div style="color:#c4b5fd;font-size:.85em">${customer?customer.phone||'':''}</div></div>
            <div style="text-align:right"><div style="color:#c4b5fd;font-size:.8em">Statement Date</div><div style="font-weight:bold">${fmtDate(new Date())}</div></div>
          </div>
          <div style="display:flex;gap:20px;margin-top:12px;flex-wrap:wrap">
            <div><div style="font-size:.75em;color:#c4b5fd">Total Debt</div><div style="font-weight:bold">KES ${fmt(tDebt)}</div></div>
            <div><div style="font-size:.75em;color:#c4b5fd">Total Paid</div><div style="font-weight:bold;color:#34d399">KES ${fmt(tPaid)}</div></div>
            <div><div style="font-size:.75em;color:#c4b5fd">Balance Due</div><div style="font-weight:bold;color:#f87171">KES ${fmt(tDebt-tPaid)}</div></div>
          </div>
        </div>
        <table><thead><tr><th>Date</th><th>Description</th><th>Debt (KES)</th><th>Paid (KES)</th><th>Balance (KES)</th><th>Due Date</th><th>Status</th></tr></thead><tbody>${rows}</tbody></table>`;
    }

    function printStatement() {
      const content=document.getElementById('statement-content').innerHTML;
      if (!content) return alert('Please select a customer first');
      const win=window.open('','_blank');
      win.document.write(`<html><head><title>Statement - Happywise Ent</title><style>body{font-family:Arial,sans-serif;padding:30px;color:#1a1a2e}table{width:100%;border-collapse:collapse;font-size:.9em;margin-top:15px}th{background:#f0f0f0;padding:8px;text-align:left}td{padding:8px;border-bottom:1px solid #eee}</style></head><body><h1>Happywise Ent</h1><h3>Customer Statement</h3>${content}<script>window.print();<\/script></body></html>`);
      win.document.close();
    }

    // ── Aging ──
    async function loadAging() {
      const debts=await fetch(API+'/debts',{headers:headers()}).then(r=>r.json());
      const now=new Date();
      const customDates=JSON.parse(localStorage.getItem('hw_debt_dates')||'{}');
      const wo=JSON.parse(localStorage.getItem('hw_writeoffs')||'{}');
      const unpaid=debts.filter(d=>d.status!=='paid'&&!wo[d.id]);
      const aged=unpaid.map(d=>{
        const effectiveDate=customDates[d.id]||d.created_at;
        const days=Math.floor((now-new Date(effectiveDate))/(1000*60*60*24));
        return{...d,days,created_at:effectiveDate};
      });
      const b30=aged.filter(d=>d.days<=30), b60=aged.filter(d=>d.days>30&&d.days<=60), b90=aged.filter(d=>d.days>60);
      const sumB=arr=>arr.reduce((s,d)=>s+parseFloat(d.balance),0);
      document.getElementById('age-30-count').textContent=b30.length;
      document.getElementById('age-30-amount').textContent=fmt(sumB(b30));
      document.getElementById('age-60-count').textContent=b60.length;
      document.getElementById('age-60-amount').textContent=fmt(sumB(b60));
      document.getElementById('age-90-count').textContent=b90.length;
      document.getElementById('age-90-amount').textContent=fmt(sumB(b90));
      document.getElementById('aging-table').innerHTML=aged.sort((a,b)=>b.days-a.days).map(d=>`
        <tr><td>${d.customer_name}</td><td>${d.description}</td><td>${fmtDate(d.created_at)}</td><td style="color:#f87171">${fmt(d.balance)}</td><td>${d.days} days</td><td>${agingBadge(d.days)}</td></tr>`).join('');
    }

    function printAging() {
      const b30=document.getElementById('age-30-count').textContent, b30a=document.getElementById('age-30-amount').textContent;
      const b60=document.getElementById('age-60-count').textContent, b60a=document.getElementById('age-60-amount').textContent;
      const b90=document.getElementById('age-90-count').textContent, b90a=document.getElementById('age-90-amount').textContent;
      const rows=document.getElementById('aging-table').innerHTML.replace(/<span[^>]*>([^<]*)<\/span>/g,'$1');
      const win=window.open('','_blank');
      win.document.write(`<html><head><title>Debt Aging - Happywise Ent</title>
        <style>body{font-family:Arial,sans-serif;padding:30px;color:#1a1a2e}.summary{display:flex;gap:15px;margin:15px 0}.sum-card{flex:1;padding:12px;border-radius:8px;text-align:center;font-size:.9em}.sum-card strong{display:block;font-size:1.4em}table{width:100%;border-collapse:collapse;font-size:.88em;margin-top:15px}th{background:#f0f0f0;padding:8px;text-align:left}td{padding:8px;border-bottom:1px solid #eee}</style>
        </head><body>
