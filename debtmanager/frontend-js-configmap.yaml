apiVersion: v1
kind: ConfigMap
metadata:
  name: nginx-js
  namespace: debtmanager
data:
  app.js: |
    const API = '/api';
    const SHOP_NAME = "Lilian's Shop";
    let token = localStorage.getItem('hw_token');
    let currentUser = JSON.parse(localStorage.getItem('hw_user') || 'null');
    let selectedDebtId = null;
    let currentReminderPhone = null;
    let messageLog = JSON.parse(localStorage.getItem('hw_msg_log') || '[]');
    let allDebtsCache = [];
    let allCustomersCache = [];
    let allPaymentsCache = [];
    let allStaffCache = [];
    let barChartInstance = null;
    let donutChartInstance = null;
    let trendChartInstance = null;
    let lastReceiptData = null;
    let dashFilter = 'all';
    let currentNoteCustomerId = null;
    let currentWriteOffDebtId = null;
    let custSortKey = 'name', custSortDir = 1;
    let debtSortKey = 'created_at', debtSortDir = -1;
    let currentEditDebtId = null;
    let currentResetStaffId = null;
    let currentChangeRoleStaffId = null;
    function isFullWO(d) { return !!d.writeoff_reason && !d.writeoff_amount; }
    function isPartialWO(d) { return !!d.writeoff_reason && !!d.writeoff_amount; }

    if (token && currentUser) showApp();

    async function doLogin() {
      const username = document.getElementById('login-username').value.trim();
      const password = document.getElementById('login-password').value;
      if (!username || !password) return showLoginError('Please enter username and password');
      try {
      
        const res = await fetch(API + '/login', {method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({username,password})});
        const data = await res.json();
        if (!res.ok) return showLoginError(data.error || 'Login failed');
        token = data.token; currentUser = data.user;
        localStorage.setItem('hw_token', token);
        localStorage.setItem('hw_user', JSON.stringify(currentUser));
        showApp();
      } catch(e) { showLoginError('Cannot connect to server'); }
    }

    function showLoginError(msg) {
      document.getElementById('login-error-msg').textContent = msg;
      document.getElementById('login-error').style.display = 'block';
    }

    function doLogout() {
      localStorage.removeItem('hw_token'); localStorage.removeItem('hw_user');
      token = null; currentUser = null;
      document.getElementById('app-page').style.display = 'none';
      document.getElementById('login-page').style.display = 'flex';
      document.getElementById('login-password').value = '';
      document.getElementById('login-error').style.display = 'none';
    }

    function showApp() {
      document.getElementById('login-page').style.display = 'none';
      document.getElementById('app-page').style.display = 'block';
      document.getElementById('topbar-name').textContent = currentUser.name;
      const roleEl = document.getElementById('topbar-role');
      roleEl.textContent = currentUser.role.charAt(0).toUpperCase() + currentUser.role.slice(1);
      roleEl.className = 'user-role role-' + currentUser.role;
      const isOwner = currentUser.role === 'owner';
      const isMO = ['owner','manager'].includes(currentUser.role);
      document.querySelectorAll('.nav-reminders').forEach(el => el.classList.toggle('hidden', !isMO));
      document.querySelectorAll('.nav-reports').forEach(el => el.classList.toggle('hidden', !isMO));
      document.querySelectorAll('.nav-aging').forEach(el => el.classList.toggle('hidden', !isMO));
      document.querySelectorAll('.nav-staff').forEach(el => el.classList.toggle('hidden', !isOwner));
      document.querySelectorAll('.nav-audit').forEach(el => el.classList.toggle('hidden', !isMO));
      document.querySelectorAll('.nav-audit-staff').forEach(el => el.classList.toggle('hidden', !isOwner));
      loadDashboard();
    }

    function headers() { return {'Content-Type':'application/json','Authorization':'Bearer '+token}; }

    function showPage(page, event) {
      document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
      document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
      document.getElementById('page-'+page).classList.add('active');
      if (event) event.currentTarget.classList.add('active');
      if (page==='dashboard') loadDashboard();
      if (page==='customers') { loadCustomers(); loadArchivedCustomers(); }
      if (page==='debts') { loadDebts(); loadCustomerDropdown(); }
      if (page==='payments') loadDebtDropdowns();
      if (page==='reminders') loadReminders();
      if (page==='reports') { loadReports(); loadStatementDropdown(); }
      if (page==='aging') loadAging();
      if (page==='staff') loadStaff();
      if (page==='audit') loadAuditLog();
      if (page==='creditors') loadCreditors();
      if (page==='payables') loadPayables();
    }

    function setDashFilter(f) {
      dashFilter = f;
      document.querySelectorAll('.dash-filter .btn').forEach(b => b.classList.remove('active'));
      const btn = document.getElementById('dflt-'+f);
      if (btn) btn.classList.add('active');
      const customDiv = document.getElementById('dflt-custom-inputs');
      if (customDiv) customDiv.style.display = f === 'custom' ? 'flex' : 'none';
      if (f !== 'custom') loadDashboard();
    }

    function getDashFilterRange() {
      if (dashFilter === 'all') return null;
      const now = new Date();
      if (dashFilter === 'week') { const f=new Date(now); f.setDate(now.getDate()-7); return {from:f,to:now}; }
      if (dashFilter === 'month') { return {from:new Date(now.getFullYear(),now.getMonth(),1),to:now}; }
      if (dashFilter === 'year') { return {from:new Date(now.getFullYear(),0,1),to:now}; }
      if (dashFilter === 'custom') {
        const fv=document.getElementById('dflt-from').value, tv=document.getElementById('dflt-to').value;
        return {from:fv?new Date(fv):null, to:tv?new Date(tv+'T23:59:59'):now};
      }
      return null;
    }

    function fmt(n) { return parseFloat(n||0).toLocaleString('en-KE',{minimumFractionDigits:2}); }
    function fmtDate(d) { return d ? new Date(d).toLocaleDateString('en-KE') : '-'; }
    function fmtDateTime(d) { return d ? new Date(d).toLocaleString('en-KE') : '-'; }
    function fmtDateTimeSms(d) {
      if (!d) return '-';
      const dt = new Date(d);
      const date = dt.toLocaleDateString('en-KE');
      const time = dt.toLocaleTimeString('en-KE', {hour:'2-digit', minute:'2-digit', hour12:false});
      return date + ' ' + time;
    }
    function fmtPhone(p) {
      if (!p) return '';
      if (p.startsWith('0')) return '254'+p.slice(1);
      if (p.startsWith('+')) return p.slice(1);
      return p;
    }

    function statusBadge(d) {
      if (d.status==='paid') return '<span class="badge badge-paid">Paid</span>';
      if (parseFloat(d.amount_paid)>0) return '<span class="badge badge-partial">Partial</span>';
      if (d.due_date && new Date(d.due_date)<new Date()) return '<span class="badge badge-overdue">Overdue</span>';
      return '<span class="badge badge-unpaid">Unpaid</span>';
    }

    function agingBadge(days) {
      if (days<=30) return '<span class="badge badge-age30">0-30 Days</span>';
      if (days<=60) return '<span class="badge badge-age60">31-60 Days</span>';
      return '<span class="badge badge-age90">60+ Days</span>';
    }

    function showAlert(id, msg, type) {
      const el = document.getElementById(id);
      el.className = 'alert alert-'+type;
      el.style.display = 'block';
      el.innerHTML = '<i class="fa-solid fa-'+(type==='success'?'circle-check':'circle-xmark')+'"></i> '+msg;
      setTimeout(()=>el.style.display='none', 3000);
    }

    function openModal(id)  { document.getElementById(id).classList.add('open'); }
    function closeModal(id) { document.getElementById(id).classList.remove('open'); }

    // ── Build WhatsApp Message (full detail, \n for WhatsApp) ──
    async function buildWhatsAppMessage(debt) {
      document.getElementById('msg-preview-text').value = 'Loading all debts for '+debt.customer_name+'...';
      const allDebts = await fetch(API+'/debts',{headers:headers()}).then(r=>r.json());
      const cDebts = allDebts.filter(d => d.customer_id===debt.customer_id && d.status!=='paid' && !d.writeoff_reason);
      let lines='', gTotal=0, gPaid=0;
      for (let i=0; i<cDebts.length; i++) {
        const d = cDebts[i];
        gTotal += parseFloat(d.total_amount);
        gPaid += parseFloat(d.amount_paid);
        lines += `${i+1}. ${d.description}\n`;
        lines += `   Date Taken : ${fmtDate(d.created_at)}\n`;
        lines += `   Total      : KES ${fmt(d.total_amount)}\n`;
        lines += `   Due Date   : ${fmtDate(d.due_date)}\n`;
        if (parseFloat(d.amount_paid)>0) {
          try {
            const pmts = await fetch(API+'/payments/'+d.id,{headers:headers()}).then(r=>r.json());
            pmts.forEach(p => { lines += `   Paid       : KES ${fmt(p.amount)} via ${p.note||'N/A'} on ${fmtDateTime(p.paid_at)}\n`; });
          } catch(e) { lines += `   Paid       : KES ${fmt(d.amount_paid)}\n`; }
          lines += `   Balance    : KES ${fmt(d.balance)}\n`;
        } else {
          lines += `   Balance    : KES ${fmt(d.total_amount)} (not yet paid)\n`;
        }
        lines += '\n';
      }
      const bal = gTotal - gPaid;
      return `Happywise Ent - Debt Reminder - (${SHOP_NAME})\n\nDear ${debt.customer_name},\n\nThis is a friendly reminder about your outstanding debt(s) with us:\n\n${lines}---------------------\nTOTAL BALANCE DUE: KES ${fmt(bal)}\n---------------------\n\nKindly make your payment at your earliest convenience.\nYou can reach us for any queries.\n\nThank you for your business!\nHappywise Ent - (${SHOP_NAME})`;
    }

    // ── Build SMS Message (single customer summary: total debt, payments, balance) ──
    async function buildSmsMessage(debt) {
      const allDebts = await fetch(API+'/debts',{headers:headers()}).then(r=>r.json());
      const cDebts = allDebts.filter(d => d.customer_id===debt.customer_id && d.status!=='paid' && !d.writeoff_reason);
      let gTotal=0, gPaid=0, paidLines='';
      for (const d of cDebts) {
        gTotal += parseFloat(d.total_amount);
        if (parseFloat(d.amount_paid)>0) {
          try {
            const pmts = await fetch(API+'/payments/'+d.id,{headers:headers()}).then(r=>r.json());
            pmts.forEach(p => {
              gPaid += parseFloat(p.amount);
              paidLines += `Paid      : KES ${fmt(p.amount)} via ${p.note||'N/A'} on ${fmtDateTimeSms(p.paid_at)}\n`;
            });
          } catch(e) { gPaid += parseFloat(d.amount_paid); paidLines += `Paid      : KES ${fmt(d.amount_paid)}\n`; }
        }
      }
      const bal = gTotal - gPaid;
      const body = `Total Debt: KES ${fmt(gTotal)}\n${paidLines||'Paid      : KES 0.00\n'}Balance   : KES ${fmt(bal)}`;
      return `Happywise Ent - Debt Reminder - (${SHOP_NAME})\n\nDear ${debt.customer_name},\n\n${body}\n\nPlease pay at your earliest convenience.\nThank you!\nHappywise Ent - (${SHOP_NAME})`;
    }

    // ── Open Reminder Modal ──
    async function openReminderModal(debt) {
      currentReminderPhone = debt.customer_phone;
      document.getElementById('msg-modal-title').innerHTML =
        `<i class="fa-solid fa-paper-plane"></i> Send Reminder to ${debt.customer_name}`;
      document.getElementById('msg-preview-text').value = 'Loading all debts...';
      document.getElementById('whatsapp-link').href = '#';
      document.getElementById('sms-link').href = '#';
      document.getElementById('message-modal').classList.add('open');

      // Build both messages in parallel
      const [waMsg, smsMsg] = await Promise.all([
        buildWhatsAppMessage(debt),
        buildSmsMessage(debt)
      ]);

      const phone = fmtPhone(debt.customer_phone);

      // Show WhatsApp message in preview
      document.getElementById('msg-preview-text').value = waMsg;

      // WhatsApp: encodeURIComponent handles \n correctly as %0A
      document.getElementById('whatsapp-link').href =
        `https://wa.me/${phone}?text=${encodeURIComponent(waMsg)}`;

      // SMS: encode newlines only — avoid encodeURIComponent which breaks SMS apps
      const smsEncoded = smsMsg.replace(/\n/g, '%0A');
      document.getElementById('sms-link').href =
        `sms:${debt.customer_phone}?body=${smsEncoded}`;

      document.getElementById('whatsapp-link').dataset.debtId = debt.id;
      document.getElementById('whatsapp-link').dataset.customerName = debt.customer_name;
      document.getElementById('sms-link').dataset.debtId = debt.id;
      document.getElementById('sms-link').dataset.customerName = debt.customer_name;
    }

    // ── Open SMS Only (from reminders page and debts table) ──
    async function openSmsOnly(debt) {
      const smsMsg = await buildSmsMessage(debt);
      // encode newlines only — avoid encodeURIComponent which breaks SMS apps
      const smsEncoded = smsMsg.replace(/\n/g, '%0A');
      const entry = {type:'sms',customerName:debt.customer_name,debtId:debt.id,phone:debt.customer_phone,message:smsMsg,time:new Date().toISOString()};
      messageLog.unshift(entry);
      if (messageLog.length>50) messageLog=messageLog.slice(0,50);
      localStorage.setItem('hw_msg_log', JSON.stringify(messageLog));
      renderMessageHistory();
      window.location.href = `sms:${debt.customer_phone}?body=${smsEncoded}`;
    }

    function logMessage(type) {
      const msg = document.getElementById('msg-preview-text').value;
      const customerName = document.getElementById('whatsapp-link').dataset.customerName;
      const debtId = document.getElementById('whatsapp-link').dataset.debtId;
      const entry = {type,customerName,debtId,phone:currentReminderPhone,message:msg,time:new Date().toISOString()};
      messageLog.unshift(entry);
      if (messageLog.length>50) messageLog=messageLog.slice(0,50);
      localStorage.setItem('hw_msg_log', JSON.stringify(messageLog));
      setTimeout(()=>closeModal('message-modal'), 500);
      renderMessageHistory();
    }

    function renderMessageHistory() {
      const el = document.getElementById('message-history');
      if (!el) return;
      if (!messageLog.length) { el.innerHTML='<p style="color:#c4b5fd;font-size:0.85em">No messages sent yet.</p>'; return; }
      el.innerHTML = messageLog.map(m=>`
        <div class="log-entry">
          <div class="log-icon ${m.type==='whatsapp'?'log-whatsapp':'log-sms'}">
            <i class="fa-${m.type==='whatsapp'?'brands fa-whatsapp':'solid fa-message'}"></i>
          </div>
          <div class="log-info">
            <div class="log-name">${m.customerName}</div>
            <div class="log-desc">${m.type==='whatsapp'?'WhatsApp':'SMS'} sent to ${m.phone}</div>
          </div>
          <div class="log-time">${fmtDate(m.time)}</div>
        </div>`).join('');
    }

    function updateRemindersBadge() {
      const count = allDebtsCache.filter(d =>
        d.due_date && new Date(d.due_date) < new Date() &&
        d.status !== 'paid' && !d.writeoff_reason
      ).length;
      const badge = document.getElementById('reminders-badge');
      if (!badge) return;
      if (count > 0) { badge.textContent = count; badge.style.display = 'inline'; }
      else { badge.style.display = 'none'; }
    }

    // ── Dashboard ──
    async function loadDashboard() {
      try {
        const [rep, debts, customers, paySum] = await Promise.all([
          fetch(API+'/reports',{headers:headers()}).then(r=>r.json()),
          fetch(API+'/debts',{headers:headers()}).then(r=>r.json()),
          fetch(API+'/customers',{headers:headers()}).then(r=>r.json()),
          fetch(API+'/payables/summary',{headers:headers()}).then(r=>r.json()).catch(()=>null)
        ]);
        if (paySum && paySum.totals) {
          const t = paySum.totals;
          document.getElementById('pay-stat-total').textContent   = fmt(t.total_balance||0);
          document.getElementById('pay-stat-overdue').textContent = t.total_overdue||0;
          const byType = {};
          (paySum.by_type||[]).forEach(r => { byType[r.type] = r; });
          document.getElementById('pay-stat-supplier').textContent   = fmt((byType.supplier||{}).balance||0);
          document.getElementById('pay-stat-wholesaler').textContent = fmt((byType.wholesaler||{}).balance||0);
          document.getElementById('pay-stat-delivery').textContent   = fmt((byType.delivery||{}).balance||0);
          document.getElementById('pay-stat-internal').textContent   = fmt((byType.internal||{}).balance||0);
        }
        allDebtsCache = debts;
        allCustomersCache = customers;

        const range = getDashFilterRange();
        const fd = range ? debts.filter(d => {
          const dt = new Date(d.created_at);
          return (!range.from || dt >= range.from) && dt <= range.to;
        }) : debts;

        const activeDebts = fd.filter(d => !isFullWO(d));
        const writtenOffDebts = fd.filter(d => isFullWO(d));

        const gTotal = activeDebts.reduce((s,d)=>s+parseFloat(d.total_amount),0);
        const gPaid  = activeDebts.reduce((s,d)=>s+parseFloat(d.amount_paid),0);
        const gBal   = activeDebts.reduce((s,d)=>s+parseFloat(d.balance),0);
        const now = new Date();
        const in7 = new Date(); in7.setDate(now.getDate()+7);
        const overdueC = activeDebts.filter(d=>d.due_date&&new Date(d.due_date)<now&&d.status!=='paid').length;
        const dueSoonC = activeDebts.filter(d=>d.due_date&&d.status!=='paid'&&new Date(d.due_date)>=now&&new Date(d.due_date)<=in7).length;
        const woTotal = writtenOffDebts.reduce((s,d)=>s+parseFloat(d.balance),0);
        const collRate = gTotal > 0 ? ((gPaid / gTotal) * 100).toFixed(1) : '0.0';

        document.getElementById('stat-customers').textContent = range ? [...new Set(activeDebts.map(d=>d.customer_id))].length : (rep.total_customers||0);
        document.getElementById('stat-debts').textContent = activeDebts.length;
        document.getElementById('stat-outstanding').textContent = fmt(gBal);
        document.getElementById('stat-collected').textContent = fmt(gPaid);
        document.getElementById('stat-overdue').textContent = overdueC;
        document.getElementById('stat-duesoon').textContent = dueSoonC;
        document.getElementById('stat-writeoff').textContent = fmt(woTotal);
        document.getElementById('stat-collrate').textContent = collRate + '%';

        // Overdue rate %
        const activeUnpaid = activeDebts.filter(d=>d.status!=='paid').length;
        const overdueEl = document.getElementById('stat-overdue-pct');
        if (overdueEl) overdueEl.textContent = activeUnpaid > 0 ? `${((overdueC/activeUnpaid)*100).toFixed(0)}% of active debts` : '';

        // Month-over-month new debt change
        const mNow = new Date();
        const thisMonStart = new Date(mNow.getFullYear(), mNow.getMonth(), 1);
        const lastMonStart = new Date(mNow.getFullYear(), mNow.getMonth()-1, 1);
        const thisMonDebt = debts.filter(d=>!d.writeoff_reason&&new Date(d.debt_date||d.created_at)>=thisMonStart).reduce((s,d)=>s+parseFloat(d.total_amount),0);
        const lastMonDebt = debts.filter(d=>!d.writeoff_reason&&new Date(d.debt_date||d.created_at)>=lastMonStart&&new Date(d.debt_date||d.created_at)<thisMonStart).reduce((s,d)=>s+parseFloat(d.total_amount),0);
        const monEl = document.getElementById('stat-month-change');
        if (monEl) {
          if (lastMonDebt > 0) {
            const pct = (((thisMonDebt-lastMonDebt)/lastMonDebt)*100).toFixed(0);
            const up = parseFloat(pct) >= 0;
            monEl.innerHTML = `<span style="color:${up?'#f87171':'#34d399'}">${up?'▲':'▼'} ${Math.abs(pct)}% new debt vs last month</span>`;
          } else {
            monEl.textContent = '';
          }
        }

        // Over credit limit count
        const overLimitCount = customers.filter(c=>parseFloat(c.credit_limit||0)>0&&parseFloat(c.total_outstanding)>=parseFloat(c.credit_limit)).length;
        const olEl = document.getElementById('stat-overlimit');
        if (olEl) olEl.textContent = overLimitCount;

        // Top 5 debtors
        const custBal = {};
        activeDebts.filter(d=>d.status!=='paid').forEach(d=>{
          if (!custBal[d.customer_id]) custBal[d.customer_id] = {name:d.customer_name, bal:0};
          custBal[d.customer_id].bal += parseFloat(d.balance);
        });
        const top5 = Object.values(custBal).sort((a,b)=>b.bal-a.bal).slice(0,5);
        const topMax = top5.length ? top5[0].bal : 1;
        document.getElementById('top-debtors-list').innerHTML = top5.length
          ? top5.map((c,i)=>`
              <div style="margin-bottom:12px">
                <div style="display:flex;justify-content:space-between;margin-bottom:5px">
                  <span style="font-size:.88em">${i+1}. ${c.name}</span>
                  <span style="color:#f87171;font-weight:bold;font-size:.88em">KES ${fmt(c.bal)}</span>
                </div>
                <div style="background:rgba(255,255,255,0.07);border-radius:4px;height:6px">
                  <div style="background:linear-gradient(90deg,#a78bfa,#f87171);height:6px;border-radius:4px;width:${(c.bal/topMax*100).toFixed(1)}%"></div>
                </div>
              </div>`).join('')
          : '<p style="color:#34d399;font-size:.85em"><i class="fa-solid fa-circle-check"></i> No outstanding debts!</p>';

        document.getElementById('recent-debts').innerHTML = activeDebts.slice(0,5).map(d=>`
          <tr><td>${d.customer_name}</td><td>${d.description}</td><td>${fmt(d.total_amount)}</td><td>${fmt(d.balance)}</td><td>${statusBadge(d)}</td></tr>`).join('');

        const barTotal = range ? gTotal : parseFloat(rep.total_debt_amount||0);
        const barPaid  = range ? gPaid  : parseFloat(rep.total_collected||0);
        const barBal   = range ? gBal   : parseFloat(rep.total_outstanding||0);

        const barCtx = document.getElementById('barChart').getContext('2d');
        if (barChartInstance) barChartInstance.destroy();
        barChartInstance = new Chart(barCtx, {
          type:'bar',
          data:{labels:['Total Issued','Collected','Outstanding'],datasets:[{label:'KES',data:[barTotal,barPaid,barBal],backgroundColor:['rgba(167,139,250,0.7)','rgba(52,211,153,0.7)','rgba(248,113,113,0.7)'],borderColor:['#a78bfa','#34d399','#f87171'],borderWidth:1,borderRadius:6}]},
          options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{callbacks:{label:ctx=>'KES '+ctx.parsed.y.toLocaleString('en-KE',{minimumFractionDigits:2})}}},scales:{x:{ticks:{color:'#c4b5fd',font:{size:11}},grid:{color:'rgba(255,255,255,0.05)'}},y:{ticks:{color:'#c4b5fd',font:{size:11},callback:val=>'KES '+val.toLocaleString()},grid:{color:'rgba(255,255,255,0.05)'}}}}
        });

        const donutCtx = document.getElementById('donutChart').getContext('2d');
        if (donutChartInstance) donutChartInstance.destroy();
        const paidC = activeDebts.filter(d=>d.status==='paid').length;
        const partC = activeDebts.filter(d=>parseFloat(d.amount_paid)>0&&d.status!=='paid').length;
        const unpC  = activeDebts.filter(d=>parseFloat(d.amount_paid)===0&&d.status!=='paid'&&!(d.due_date&&new Date(d.due_date)<new Date())).length;
        const woC   = writtenOffDebts.length;
        donutChartInstance = new Chart(donutCtx, {
          type:'doughnut',
          data:{labels:['Paid','Partial','Unpaid','Overdue','Written Off'],datasets:[{data:[paidC,partC,unpC,overdueC,woC],backgroundColor:['rgba(52,211,153,0.8)','rgba(251,191,36,0.8)','rgba(167,139,250,0.8)','rgba(248,113,113,0.8)','rgba(107,114,128,0.8)'],borderColor:['#34d399','#fbbf24','#a78bfa','#f87171','#6b7280'],borderWidth:2}]},
          options:{responsive:true,maintainAspectRatio:false,cutout:'65%',plugins:{legend:{position:'bottom',labels:{color:'#c4b5fd',font:{size:11},padding:10,boxWidth:12}},tooltip:{callbacks:{label:ctx=>ctx.label+': '+ctx.parsed+' debts'}}}}
        });
        updateRemindersBadge();
      } catch(e) { console.error('Dashboard error:',e); }
    }

    function getCustomerRisk(customerId) {
      const cDebts = allDebtsCache.filter(d => d.customer_id === customerId && !d.writeoff_reason);
      if (!cDebts.length) return null;
      const paid = cDebts.filter(d => d.status === 'paid').length;
      const active = cDebts.filter(d => d.status !== 'paid').length;
      const overdue = cDebts.filter(d => d.due_date && new Date(d.due_date) < new Date() && d.status !== 'paid').length;
      const neverPaid = cDebts.filter(d => parseFloat(d.amount_paid) === 0 && d.status !== 'paid').length;
      if (active === 0 && paid > 0) return 'good';
      if (overdue === 0 && paid > 0) return 'good';
      if (neverPaid === active && active > 0 && paid === 0) return 'defaulter';
      if (overdue > 0) return 'slow';
      return null;
    }

    function sortCustomers(key) {
      if (custSortKey === key) custSortDir *= -1; else { custSortKey = key; custSortDir = 1; }
      const iconMap = {name:'sort-cust-name', total_outstanding:'sort-cust-bal'};
      document.querySelectorAll('[id^="sort-cust-"]').forEach(el => { el.className = 'fa-solid fa-sort'; el.style.opacity='0.4'; });
      const icon = document.getElementById(iconMap[key]);
      if (icon) { icon.className = 'fa-solid fa-sort-'+(custSortDir>0?'up':'down'); icon.style.opacity='1'; }
      const sorted = [...allCustomersCache].sort((a,b) => {
        const av = key==='total_outstanding' ? parseFloat(a[key]||0) : (a[key]||'').toString().toLowerCase();
        const bv = key==='total_outstanding' ? parseFloat(b[key]||0) : (b[key]||'').toString().toLowerCase();
        return av < bv ? -custSortDir : av > bv ? custSortDir : 0;
      });
      renderCustomers(sorted);
    }

    function sortDebts(key) {
      if (debtSortKey === key) debtSortDir *= -1; else { debtSortKey = key; debtSortDir = 1; }
      const iconMap = {customer_name:'sort-debt-cust', created_at:'sort-debt-date', total_amount:'sort-debt-total', balance:'sort-debt-bal', due_date:'sort-debt-due'};
      document.querySelectorAll('[id^="sort-debt-"]').forEach(el => { el.className = 'fa-solid fa-sort'; el.style.opacity='0.4'; });
      const icon = document.getElementById(iconMap[key]);
      if (icon) { icon.className = 'fa-solid fa-sort-'+(debtSortDir>0?'up':'down'); icon.style.opacity='1'; }
      const visible = allDebtsCache.filter(d => !d.writeoff_reason);
      const sorted = [...visible].sort((a,b) => {
        const numKeys = ['total_amount','balance'];
        const av = numKeys.includes(key) ? parseFloat(a[key]||0) : (a[key]||'').toString();
        const bv = numKeys.includes(key) ? parseFloat(b[key]||0) : (b[key]||'').toString();
        return av < bv ? -debtSortDir : av > bv ? debtSortDir : 0;
      });
      renderDebts(sorted);
    }

    // ── Customers ──
    async function loadCustomers() {
      const [customers, debts] = await Promise.all([
        fetch(API+'/customers',{headers:headers()}).then(r=>r.json()),
        fetch(API+'/debts',{headers:headers()}).then(r=>r.json())
      ]);
      allDebtsCache = debts;
      const adjusted = customers.map(c => {
        const woBalance = debts.filter(d=>d.customer_id===c.id&&!!d.writeoff_reason).reduce((s,d)=>s+parseFloat(d.balance),0);
        return {...c, total_outstanding: Math.max(0, parseFloat(c.total_outstanding||0) - woBalance)};
      });
      allCustomersCache = adjusted;
      renderCustomers(adjusted);
    }

    function getLastContacted(customerName) {
      const log = JSON.parse(localStorage.getItem('hw_msg_log')||'[]');
      const entry = log.find(m => m.customerName === customerName);
      if (!entry) return null;
      const diffMs = new Date() - new Date(entry.time);
      const days = Math.floor(diffMs / (1000*60*60*24));
      if (days === 0) return 'today';
      if (days === 1) return '1 day ago';
      return days + ' days ago';
    }

    function renderCustomers(customers) {
      const riskColors = {good:['rgba(52,211,153,0.15)','#34d399'],slow:['rgba(251,191,36,0.15)','#fbbf24'],defaulter:['rgba(248,113,113,0.15)','#f87171']};
      const riskLabels = {good:'Good Payer',slow:'Slow Payer',defaulter:'Defaulter'};
      document.getElementById('customers-table').innerHTML = customers.map(c=>{
        const lastContacted = getLastContacted(c.name);
        const risk = getCustomerRisk(c.id);
        const rc = risk ? riskColors[risk] : null;
        const riskBadge = risk ? `<span style="background:${rc[0]};color:${rc[1]};border-radius:4px;padding:1px 6px;font-size:0.7em;margin-left:5px;vertical-align:middle">${riskLabels[risk]}</span>` : '';
        const activeCount = allDebtsCache.filter(d => d.customer_id===c.id && d.status!=='paid' && !d.writeoff_reason).length;
        const custDebts = allDebtsCache.filter(d=>d.customer_id===c.id&&!d.writeoff_reason);
        const custTotal = custDebts.reduce((s,d)=>s+parseFloat(d.total_amount),0);
        const custPaid = custDebts.reduce((s,d)=>s+parseFloat(d.amount_paid),0);
        const custCollRate = custTotal > 0 ? ((custPaid/custTotal)*100).toFixed(0) : null;
        const limit = parseFloat(c.credit_limit||0);
        const remaining = limit > 0 ? limit - parseFloat(c.total_outstanding) : null;
        return `
        <tr>
          <td>
            <i class="fa-solid fa-user" style="color:#a78bfa;margin-right:6px"></i>${c.name}${riskBadge}
            ${lastContacted?`<div style="font-size:0.72em;color:#6b7280;margin-top:2px"><i class="fa-solid fa-paper-plane" style="font-size:0.85em"></i> Contacted: ${lastContacted}</div>`:''}
          </td>
          <td>${c.phone||'-'}</td><td>${c.email||'-'}</td>
          <td style="color:${parseFloat(c.total_outstanding)>0?'#f87171':'#34d399'}">
            ${fmt(c.total_outstanding)}
            ${activeCount>0?`<div style="font-size:0.72em;color:#c4b5fd;margin-top:2px">${activeCount} active debt${activeCount>1?'s':''}</div>`:''}
            ${custCollRate!==null?`<div style="font-size:0.72em;color:#9ca3af;margin-top:2px">Paid ${custCollRate}% overall</div>`:''}
            ${remaining!==null?`<div style="font-size:0.72em;margin-top:2px;color:${remaining<0?'#f87171':'#6b7280'}">Limit: KES ${fmt(limit)} &bull; ${remaining<0?'<span style="color:#f87171">Over by KES '+fmt(Math.abs(remaining))+'</span>':'KES '+fmt(remaining)+' left'}</div>`:''}
          </td>
          <td>
            <div class="action-btns">
              ${c.phone?`
                <a href="https://wa.me/${fmtPhone(c.phone)}" target="_blank" class="btn btn-whatsapp btn-sm"><i class="fa-brands fa-whatsapp"></i> WhatsApp</a>
                <a href="sms:${c.phone}" class="btn btn-sms btn-sm"><i class="fa-solid fa-message"></i> SMS</a>`
              :'-'}
              <button class="btn btn-orange btn-sm" onclick="viewStatement(${c.id})"><i class="fa-solid fa-file-lines"></i> Statement</button>
              <button class="note-btn ${c.note?'has-note':''}" onclick="openNoteModal(${c.id},'${c.name.replace(/'/g,"\\'")}','${(c.note||'').replace(/'/g,"\\'")}' )">${c.note?'<i class="fa-solid fa-note-sticky"></i> Note':'<i class="fa-regular fa-note-sticky"></i> Note'}</button>
              <button class="btn btn-sm" style="background:rgba(96,165,250,0.15);color:#60a5fa" onclick="setCreditLimit(${c.id},'${c.name.replace(/'/g,"\\'")}',${c.credit_limit||0})"><i class="fa-solid fa-credit-card"></i> Limit</button>
              ${parseFloat(c.total_outstanding)<=0?`<button class="btn btn-sm" style="background:rgba(107,114,128,0.2);color:#6b7280" onclick="archiveCustomer(${c.id},'${c.name.replace(/'/g,"\\'")}')"><i class="fa-solid fa-box-archive"></i> Archive</button>`:''}
            </div>
            ${c.note?`<div style="margin-top:5px;font-size:0.75em;color:#fbbf24;white-space:pre-wrap">${c.note}</div>`:''}
          </td>
        </tr>`;
      }).join('');
    }

    function openNoteModal(custId, custName, currentNote) {
      currentNoteCustomerId = custId;
      document.getElementById('note-customer-name').textContent = custName;
      document.getElementById('note-text').value = (currentNote||'').trim();
      document.getElementById('note-modal').classList.add('open');
    }

    async function saveCustomerNote() {
      const note = document.getElementById('note-text').value.trim() || null;
      await fetch(API+'/customers/'+currentNoteCustomerId, {method:'PUT', headers:headers(), body:JSON.stringify({note})});
      closeModal('note-modal');
      loadCustomers();
    }

    async function clearCustomerNote() {
      await fetch(API+'/customers/'+currentNoteCustomerId, {method:'PUT', headers:headers(), body:JSON.stringify({note:null})});
      closeModal('note-modal');
      loadCustomers();
    }

    function filterCustomers() {
      const q = document.getElementById('search-customers').value.toLowerCase();
      renderCustomers(allCustomersCache.filter(c=>c.name.toLowerCase().includes(q)||(c.phone||'').includes(q)));
    }

    async function addCustomer() {
      const name = document.getElementById('cust-name').value.trim();
      if (!name) return showAlert('alert-customer','Name is required','error');
      const limit = parseFloat(document.getElementById('cust-limit').value) || null;
      const res = await fetch(API+'/customers',{method:'POST',headers:headers(),body:JSON.stringify({name,phone:document.getElementById('cust-phone').value,email:document.getElementById('cust-email').value,credit_limit:limit})});
      if (!res.ok) return showAlert('alert-customer','Error adding customer','error');
      showAlert('alert-customer','Customer added successfully!','success');
      ['cust-name','cust-phone','cust-email','cust-limit'].forEach(id=>document.getElementById(id).value='');
      loadCustomers();
    }

    async function setCreditLimit(id, name, current) {
      if (currentUser.role !== 'owner') return showAlert('alert-customer', 'Only the owner can adjust credit limits.', 'error');
      const val = prompt(`Credit limit for ${name} (KES)\nEnter 0 or leave empty to remove limit:`, current > 0 ? current : '');
      if (val === null) return;
      const limit = parseFloat(val) > 0 ? parseFloat(val) : null;
      await fetch(API+'/customers/'+id, {method:'PUT', headers:headers(), body:JSON.stringify({credit_limit: limit})});
      loadCustomers();
    }

    async function archiveCustomer(id, name) {
      const outstanding = allDebtsCache.filter(d=>d.customer_id===id&&d.status!=='paid'&&!d.writeoff_reason).reduce((s,d)=>s+parseFloat(d.balance||0),0);
      if (outstanding > 0) return showAlert('alert-customer',`Cannot archive ${name} - still has KES ${fmt(outstanding)} outstanding`,'error');
      if (!confirm(`Archive ${name}? They will be hidden from the customer list but can be restored anytime.`)) return;
      await fetch(API+'/customers/'+id, {method:'DELETE', headers:headers()});
      loadCustomers();
      loadArchivedCustomers();
    }

    async function loadArchivedCustomers() {
      const data = await fetch(API+'/customers?archived=true', {headers:headers()}).then(r=>r.json());
      const countEl = document.getElementById('archived-count');
      if (countEl) countEl.textContent = data.length > 0 ? `(${data.length})` : '';
      renderArchivedCustomers(data);
    }

    function renderArchivedCustomers(customers) {
      const tbody = document.getElementById('archived-customers-table');
      if (!tbody) return;
      if (customers.length === 0) {
        tbody.innerHTML = '<tr><td colspan="5" style="text-align:center;color:#6b7280;padding:16px">No archived customers</td></tr>';
        return;
      }
      tbody.innerHTML = customers.map(c => `
        <tr style="opacity:0.75">
          <td><i class="fa-solid fa-user" style="color:#6b7280;margin-right:6px"></i>${c.name}</td>
          <td>${c.phone||'-'}</td>
          <td>${c.email||'-'}</td>
          <td style="color:#9ca3af">${fmt(c.total_outstanding)}</td>
          <td>
            <button class="btn btn-sm" style="background:rgba(52,211,153,0.15);color:#34d399" onclick="unarchiveCustomer(${c.id},'${c.name.replace(/'/g,"\\'")}')">
              <i class="fa-solid fa-rotate-left"></i> Restore
            </button>
          </td>
        </tr>`).join('');
    }

    function toggleArchivedCustomers() {
      const section = document.getElementById('archived-section');
      const chevron = document.getElementById('archived-chevron');
      const isOpen = section.style.display !== 'none';
      section.style.display = isOpen ? 'none' : 'block';
      chevron.style.transform = isOpen ? '' : 'rotate(180deg)';
      if (!isOpen) loadArchivedCustomers();
    }

    async function unarchiveCustomer(id, name) {
      if (!confirm(`Restore ${name}? They will appear in the customer list again with full history.`)) return;
      await fetch(API+'/customers/'+id, {method:'PUT', headers:headers(), body:JSON.stringify({archived: false})});
      loadCustomers();
      loadArchivedCustomers();
    }

    // ── Debts ──
    async function loadCustomerDropdown() {
      const c = await fetch(API+'/customers',{headers:headers()}).then(r=>r.json());
      document.getElementById('debt-customer').innerHTML = '<option value="">Select customer</option>'+c.map(x=>`<option value="${x.id}">${x.name} (${x.phone||'No phone'})</option>`).join('');
      const now = new Date();
      now.setMinutes(now.getMinutes() - now.getTimezoneOffset());
      document.getElementById('debt-date').value = now.toISOString().slice(0,16);
    }

    async function loadDebts() {
      const d = await fetch(API+'/debts',{headers:headers()}).then(r=>r.json());
      allDebtsCache=d;
      renderDebts(d.filter(x=>!isFullWO(x)));
    }

    function renderDebts(debts) {
      const nowD = new Date(); const in7D = new Date(); in7D.setDate(nowD.getDate()+7);
      const catColors = {'Weekly':'#34d399','After Two Weeks':'#60a5fa','End of Month':'#fbbf24','One-off':'#a78bfa'};
      document.getElementById('debts-table').innerHTML = debts.map(d=>{
        const fullWO = isFullWO(d);
        const partialWO = isPartialWO(d);
        const isDueSoon = !fullWO && !partialWO && d.due_date && d.status!=='paid' && new Date(d.due_date)>=nowD && new Date(d.due_date)<=in7D;
        const catBadge = d.category ? `<span style="background:rgba(0,0,0,0.25);color:${catColors[d.category]||'#9ca3af'};border:1px solid ${catColors[d.category]||'#9ca3af'};border-radius:4px;padding:0px 5px;font-size:0.68em;margin-left:5px;vertical-align:middle">${d.category}</span>` : '';
        const partialBadge = partialWO ? `<span style="background:rgba(156,163,175,0.15);color:#9ca3af;border:1px solid #9ca3af;border-radius:4px;padding:0px 5px;font-size:0.68em;margin-left:5px;vertical-align:middle"><i class="fa-solid fa-ban"></i> KES ${fmt(d.writeoff_amount)} forgiven</span>` : '';
        const notesBadge = d.notes ? `<div style="font-size:0.72em;color:#fbbf24;margin-top:3px"><i class="fa-solid fa-note-sticky"></i> ${d.notes}</div>` : '';
        return `
        <tr class="${fullWO?'writeoff-row':isDueSoon?'due-soon-row':''}">
          <td>${d.customer_name}</td>
          <td>${d.description}${catBadge}${partialBadge}${notesBadge}</td>
          <td>${fmtDateTime(d.created_at)}</td>
          <td>${fmt(d.total_amount)}</td>
          <td style="color:#34d399">${fmt(d.amount_paid)}</td>
          <td style="color:${parseFloat(d.balance)>0?'#f87171':'#34d399'}">${fmt(d.balance)}</td>
          <td>${fmtDate(d.due_date)}</td>
          <td>${fullWO?`<span class="badge badge-writeoff"><i class="fa-solid fa-ban"></i> Written Off</span>`:statusBadge(d)}</td>
          <td>
            <div class="action-btns">
              ${fullWO?`
                <span style="font-size:0.75em;color:#9ca3af">${d.writeoff_reason}</span>
                <button class="btn btn-sm" onclick="undoWriteOff(${d.id})"><i class="fa-solid fa-rotate-left"></i> Undo</button>`
              :`${d.status!=='paid'?`<button class="btn btn-green btn-sm" onclick="openPayModal(${d.id},'${d.customer_name}',${d.balance})"><i class="fa-solid fa-money-bill-wave"></i> Pay</button>`:''}
                ${d.customer_phone&&d.status!=='paid'?`
                  <button class="btn btn-whatsapp btn-sm" onclick='openReminderModal(${JSON.stringify(d).replace(/"/g,"&quot;")})'>
                    <i class="fa-brands fa-whatsapp"></i> WhatsApp
                  </button>
                  <button class="btn btn-sms btn-sm" onclick='openSmsOnly(${JSON.stringify(d).replace(/"/g,"&quot;")})'>
                    <i class="fa-solid fa-message"></i> SMS
                  </button>`:''}
                <button class="btn btn-sm" style="background:rgba(167,139,250,0.15);color:#a78bfa" onclick='openEditDebtModal(${JSON.stringify(d).replace(/"/g,"&quot;")})'><i class="fa-solid fa-pen"></i> Edit</button>
                <button class="btn btn-sm" style="background:rgba(96,165,250,0.15);color:#60a5fa" onclick='recordAgain(${JSON.stringify(d).replace(/"/g,"&quot;")})'><i class="fa-solid fa-rotate"></i> Record Again</button>
                <button class="btn btn-sm" style="background:rgba(167,139,250,0.1);color:#c4b5fd" onclick='openTimelineModal(${JSON.stringify(d).replace(/"/g,"&quot;")})'><i class="fa-solid fa-timeline"></i> History</button>
                ${d.status!=='paid'?`<button class="btn btn-sm" style="background:rgba(107,114,128,0.3);color:#9ca3af" onclick="openWriteOffModal(${d.id},'${d.description.replace(/'/g,"\\'")}',${d.balance})"><i class="fa-solid fa-ban"></i> Write Off</button>`:''}
                ${partialWO?`<button class="btn btn-sm" onclick="undoWriteOff(${d.id})"><i class="fa-solid fa-rotate-left"></i> Undo Partial W/O</button>`:''}`}
            </div>
          </td>
        </tr>`;
      }).join('');
    }

    function filterDebts() {
      const q = document.getElementById('search-debts').value.toLowerCase();
      const s = document.getElementById('filter-status').value;
      const cat = document.getElementById('filter-category').value;
      let f = allDebtsCache.filter(d=>d.customer_name.toLowerCase().includes(q)||d.description.toLowerCase().includes(q));
      if (s==='writeoff') { f=f.filter(d=>isFullWO(d)); }
      else {
        f=f.filter(d=>!isFullWO(d));
        if (s==='paid') f=f.filter(d=>d.status==='paid');
        else if (s==='unpaid') f=f.filter(d=>d.status!=='paid'&&parseFloat(d.amount_paid)===0);
        else if (s==='partial') f=f.filter(d=>parseFloat(d.amount_paid)>0&&d.status!=='paid');
        else if (s==='overdue') f=f.filter(d=>d.due_date&&new Date(d.due_date)<new Date()&&d.status!=='paid');
      }
      if (cat) f=f.filter(d=>d.category===cat);
      renderDebts(f);
    }

    function openWriteOffModal(debtId, desc, balance) {
      currentWriteOffDebtId = debtId;
      document.getElementById('writeoff-debt-info').textContent = `${desc} - Balance: KES ${fmt(balance)}`;
      document.getElementById('writeoff-reason').value = '';
      document.getElementById('writeoff-amount').value = '';
      document.getElementById('writeoff-modal').classList.add('open');
    }

    async function confirmWriteOff() {
      const reason = document.getElementById('writeoff-reason').value.trim();
      if (!reason) return;
      const amountVal = parseFloat(document.getElementById('writeoff-amount').value);
      const amount = amountVal > 0 ? amountVal : null;
      await fetch(API+'/writeoffs', {method:'POST', headers:headers(), body:JSON.stringify({debt_id:currentWriteOffDebtId, reason, amount})});
      closeModal('writeoff-modal');
      loadDebts();
    }

    async function undoWriteOff(debtId) {
      await fetch(API+'/writeoffs/'+debtId, {method:'DELETE', headers:headers()});
      loadDebts();
    }

    function openEditDebtModal(d) {
      currentEditDebtId = d.id;
      document.getElementById('edit-debt-info').textContent = `${d.customer_name} - recorded ${fmtDateTime(d.created_at)}`;
      document.getElementById('edit-debt-desc').value = d.description || '';
      document.getElementById('edit-debt-category').value = d.category || '';
      document.getElementById('edit-debt-amount').value = d.total_amount;
      const dt = d.debt_date || d.created_at;
      if (dt) {
        const local = new Date(dt); local.setMinutes(local.getMinutes()-local.getTimezoneOffset());
        document.getElementById('edit-debt-date').value = local.toISOString().slice(0,16);
      }
      document.getElementById('edit-debt-due').value = d.due_date ? d.due_date.slice(0,10) : '';
      document.getElementById('edit-debt-notes').value = d.notes || '';
      document.getElementById('edit-debt-modal').classList.add('open');
    }

    async function saveDebtEdit() {
      const desc = document.getElementById('edit-debt-desc').value.trim();
      const amount = document.getElementById('edit-debt-amount').value;
      const due = document.getElementById('edit-debt-due').value || null;
      const ddate = document.getElementById('edit-debt-date').value || null;
      const cat = document.getElementById('edit-debt-category').value || null;
      const notes = document.getElementById('edit-debt-notes').value.trim() || null;
      if (!desc || !amount) return;
      await fetch(API+'/debts/'+currentEditDebtId, {method:'PUT', headers:headers(), body:JSON.stringify({description:desc, total_amount:parseFloat(amount), due_date:due, debt_date:ddate, category:cat, notes})});
      closeModal('edit-debt-modal');
      loadDebts();
    }

    async function addDebt() {
      const customer_id=document.getElementById('debt-customer').value;
      const description=document.getElementById('debt-desc').value.trim();
      const total_amount=document.getElementById('debt-amount').value;
      const debt_date=document.getElementById('debt-date').value;
      if (!customer_id||!description||!total_amount) return showAlert('alert-debt','Please fill all required fields','error');
      const cust = allCustomersCache.find(c=>c.id==customer_id);
      if (cust && parseFloat(cust.credit_limit||0) > 0) {
        const available = parseFloat(cust.credit_limit) - parseFloat(cust.total_outstanding);
        if (parseFloat(total_amount) > available && currentUser.role !== 'owner') {
          return showAlert('alert-debt', `Cannot add debt - ${cust.name} has KES ${fmt(Math.max(available,0))} credit available (limit KES ${fmt(cust.credit_limit)}). Only the owner can adjust the credit limit.`, 'error');
        }
      }
      await fetch(API+'/debts',{method:'POST',headers:headers(),body:JSON.stringify({customer_id,description,total_amount,due_date:document.getElementById('debt-due').value||null,debt_date:debt_date||null,category:document.getElementById('debt-category').value||null,notes:document.getElementById('debt-notes').value.trim()||null})});
      showAlert('alert-debt','Debt recorded successfully!','success');
      ['debt-desc','debt-amount','debt-due','debt-notes'].forEach(id=>document.getElementById(id).value='');
      const now=new Date(); now.setMinutes(now.getMinutes()-now.getTimezoneOffset());
      document.getElementById('debt-date').value=now.toISOString().slice(0,16);
      loadDebts();
    }

    async function recordAgain(d) {
      showPage('debts', null);
      await loadCustomerDropdown();
      document.getElementById('debt-customer').value = d.customer_id;
      document.getElementById('debt-desc').value = d.description;
      document.getElementById('debt-amount').value = d.total_amount;
      document.getElementById('debt-category').value = d.category || '';
      document.getElementById('debt-due').value = '';
      showAlert('alert-debt', `Pre-filled from ${d.customer_name}'s previous debt. Set a new due date and confirm.`, 'success');
    }

    async function openTimelineModal(d) {
      document.getElementById('timeline-debt-info').textContent = `${d.customer_name} - ${d.description} - KES ${fmt(d.total_amount)}`;
      document.getElementById('timeline-content').innerHTML = '<p style="color:#6b7280;text-align:center;padding:16px">Loading...</p>';
      document.getElementById('timeline-modal').classList.add('open');
      const payments = await fetch(API+'/payments/'+d.id, {headers:headers()}).then(r=>r.json());

      // Build events list oldest first
      const events = [];
      events.push({type:'debt', date: new Date(d.debt_date||d.created_at), label:'Debt Recorded', amount: parseFloat(d.total_amount), detail: d.category||'', color:'#a78bfa', icon:'fa-file-invoice-dollar'});
      if (d.due_date) events.push({type:'due', date: new Date(d.due_date), label:'Due Date', amount:null, detail:'', color:'#fbbf24', icon:'fa-calendar-days'});
      payments.slice().reverse().forEach(p => {
        events.push({type:'payment', date: new Date(p.paid_at), label:`Payment - ${p.note||'Cash'}`, amount: parseFloat(p.amount), detail: p.recorded_by_name ? `by ${p.recorded_by_name}` : '', color:'#34d399', icon:'fa-money-bill-wave'});
      });
      if (d.writeoff_reason) events.push({type:'writeoff', date: new Date(d.written_off_at||d.created_at), label:'Written Off', amount:null, detail: d.writeoff_reason, color:'#9ca3af', icon:'fa-ban'});
      events.sort((a,b)=>a.date-b.date);

      // Compute running balance
      let running = parseFloat(d.total_amount);
      const now = new Date();

      document.getElementById('timeline-content').innerHTML = `
        <div style="position:relative;padding-left:28px">
          <div style="position:absolute;left:9px;top:0;bottom:0;width:2px;background:rgba(255,255,255,0.07)"></div>
          ${events.map(e=>{
            if (e.type==='payment') running -= e.amount;
            const isPast = e.date <= now;
            return `
            <div style="position:relative;margin-bottom:18px">
              <div style="position:absolute;left:-24px;top:2px;width:12px;height:12px;border-radius:50%;background:${e.color};${!isPast?'opacity:0.4':''}"></div>
              <div style="font-size:0.82em;color:#6b7280">${fmtDateTime(e.date.toISOString())}</div>
              <div style="display:flex;align-items:center;gap:8px;margin-top:2px">
                <i class="fa-solid ${e.icon}" style="color:${e.color};font-size:0.85em"></i>
                <span style="color:#e2e8f0;font-size:0.9em">${e.label}</span>
                ${e.amount!==null?`<span style="color:${e.type==='debt'?'#f87171':'#34d399'};font-weight:bold;font-size:0.9em">${e.type==='debt'?'+':'-'} KES ${fmt(e.amount)}</span>`:''}
              </div>
              ${e.detail?`<div style="font-size:0.78em;color:#6b7280;margin-top:2px">${e.detail}</div>`:''}
              ${e.type==='payment'?`<div style="font-size:0.78em;color:#9ca3af;margin-top:2px">Balance after: KES ${fmt(running)}</div>`:''}
            </div>`;
          }).join('')}
        </div>
        <div style="border-top:1px solid rgba(255,255,255,0.07);margin-top:8px;padding-top:12px;display:flex;justify-content:space-between;font-size:0.85em">
          <span style="color:#9ca3af">Total Paid</span><span style="color:#34d399;font-weight:bold">KES ${fmt(d.amount_paid)}</span>
        </div>
        <div style="display:flex;justify-content:space-between;font-size:0.85em;margin-top:6px">
          <span style="color:#9ca3af">Balance Remaining</span><span style="color:${parseFloat(d.balance)>0?'#f87171':'#34d399'};font-weight:bold">KES ${fmt(d.balance)}</span>
        </div>`;
    }

    // ── Payments ──
    async function loadDebtDropdowns() {
      const debts = await fetch(API+'/debts',{headers:headers()}).then(r=>r.json());
      const unpaid = debts.filter(d=>d.status!=='paid'&&!d.writeoff_reason);
      document.getElementById('pay-debt').innerHTML = '<option value="">Select debt</option>'+unpaid.map(d=>`<option value="${d.id}">${d.customer_name} - ${d.description} (KES ${fmt(d.balance)})</option>`).join('');
      document.getElementById('filter-debt').innerHTML = '<option value="">Select debt to view history</option>'+debts.map(d=>`<option value="${d.id}">${d.customer_name} - ${d.description}</option>`).join('');
    }

    async function makePayment() {
      const debt_id=document.getElementById('pay-debt').value;
      const amount=document.getElementById('pay-amount').value;
      const note=document.getElementById('pay-note').value;
      if (!debt_id||!amount) return showAlert('alert-payment','Please fill all required fields','error');
      const debts = await fetch(API+'/debts',{headers:headers()}).then(r=>r.json());
      const debt = debts.find(d=>d.id==debt_id);
      const res = await fetch(API+'/payments',{method:'POST',headers:headers(),body:JSON.stringify({debt_id,amount,note})});
      const payment = await res.json();
      showAlert('alert-payment','Payment recorded!','success');
      document.getElementById('pay-amount').value='';
      if (debt) showReceipt(debt,parseFloat(amount),note,payment);
      loadDebtDropdowns();
    }

    async function loadPaymentHistory() {
      const debtId=document.getElementById('filter-debt').value;
      if (!debtId) return;
      const payments = await fetch(API+'/payments/'+debtId,{headers:headers()}).then(r=>r.json());
      allPaymentsCache=payments;
      document.getElementById('payments-table').innerHTML = payments.length
        ? payments.map(p=>`<tr><td style="color:#34d399">${fmt(p.amount)}</td><td>${p.note||'-'}</td><td>${p.recorded_by_name||'-'}</td><td>${fmtDate(p.paid_at)}</td></tr>`).join('')
        : '<tr><td colspan="4" style="color:#c4b5fd;text-align:center">No payments yet</td></tr>';
    }

    function openPayModal(debtId, customerName, balance) {
      selectedDebtId=debtId;
      document.getElementById('modal-debt-info').textContent=`Customer: ${customerName} | Balance: KES ${fmt(balance)}`;
      document.getElementById('payment-modal').classList.add('open');
    }

    async function submitModalPayment() {
      const amount=document.getElementById('modal-amount').value;
      const note=document.getElementById('modal-note').value;
      if (!amount) return;
      const debts = await fetch(API+'/debts',{headers:headers()}).then(r=>r.json());
      const debt = debts.find(d=>d.id==selectedDebtId);
      const res = await fetch(API+'/payments',{method:'POST',headers:headers(),body:JSON.stringify({debt_id:selectedDebtId,amount,note})});
      const payment = await res.json();
      closeModal('payment-modal');
      document.getElementById('modal-amount').value='';
      if (debt) showReceipt(debt,parseFloat(amount),note,payment);
      loadDebts(); loadDashboard();
    }

    // ── Receipt ──
    function showReceipt(debt, amount, method, payment) {
      const now=new Date();
      const balance=parseFloat(debt.total_amount)-parseFloat(debt.amount_paid)-amount;
      lastReceiptData={debt,amount,method,payment,balance,now};
      document.getElementById('receipt-content').innerHTML=generateReceiptHTML(debt,amount,method,balance,now);
      document.getElementById('receipt-modal').classList.add('open');
    }

    function generateReceiptHTML(debt, amount, method, balance, now) {
      return `<div class="receipt-box" id="printable-receipt">
        <h2>HAPPYWISE ENT</h2>
        <div class="receipt-sub">Payment Receipt</div>
        <div class="receipt-sub">${now.toLocaleString('en-KE')}</div><br>
        <div class="receipt-row"><span>Customer:</span><span>${debt.customer_name}</span></div>
        <div class="receipt-row"><span>Phone:</span><span>${debt.customer_phone||'N/A'}</span></div>
        <div class="receipt-row"><span>Item:</span><span>${debt.description}</span></div>
        <div class="receipt-row"><span>Total Debt:</span><span>KES ${fmt(debt.total_amount)}</span></div>
        <div class="receipt-row"><span>Amount Paid:</span><span>KES ${fmt(amount)}</span></div>
        <div class="receipt-row"><span>Method:</span><span>${method}</span></div>
        <div class="receipt-total"><span>Balance Due:</span><span>KES ${fmt(balance<0?0:balance)}</span></div>
