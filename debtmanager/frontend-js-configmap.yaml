      win.document.write(`<html><head><title>Receipt - Happywise Ent</title>
        <style>body{font-family:monospace;padding:20px}.receipt-box{max-width:300px;margin:0 auto}h2{text-align:center}.receipt-sub{text-align:center;color:#666;font-size:.85em}.receipt-row{display:flex;justify-content:space-between;padding:4px 0;border-bottom:1px dashed #eee;font-size:.9em}.receipt-total{display:flex;justify-content:space-between;padding:8px 0;font-weight:bold;border-top:2px solid black;margin-top:8px}.receipt-footer{text-align:center;margin-top:15px;color:#666;font-size:.8em}</style>
        </head><body>${content}<script>window.print();<\/script></body></html>`);
